  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },
      back_auto: { es: 'Volver al Autodiagnóstico', en: 'Back to Self-Diagnosis' },
      go_playbook: { es: 'Ir a Participant Playbook', en: 'Go to Participant Playbook' },

      hero_eyebrow: { es: 'Programa · Accelerate Impact', en: 'Program · Accelerate Impact' },
      hero_title: {
        es: 'Preguntas frecuentes',
        en: 'Frequently Asked Questions'
      },
      hero_subtitle: {
        es: 'Todo lo que necesitas saber sobre el autodiagnóstico de liderazgo de Telefónica.',
        en: 'Everything you need to know about Telefónica\'s Leadership Self-Diagnosis.'
      },
      hero_date: { es: '20 de marzo de 2026', en: 'March 20, 2026' },

      intro_label: { es: 'Introducción', en: 'Introduction' },
      intro_p1: {
        es: 'Bienvenido a tu guía de Preguntas Frecuentes (FAQ) sobre el autodiagnóstico de liderazgo. Este documento está diseñado para responder a las preguntas más habituales y aportar claridad a todos los participantes del autodiagnóstico en Telefónica.',
        en: 'Welcome to your Leadership Self-diagnosis Frequently Asked Questions (FAQ) Guide. This document is designed to answer common questions and provide clarity for all participants taking part in the leadership self-diagnosis across Telefónica.'
      },
      intro_p2: {
        es: 'Queremos que te sientas bien informado y acompañado a lo largo del proceso, con un entendimiento claro de qué implica, por qué importa y qué puedes esperar. A continuación encontrarás respuestas directas a las preguntas más frecuentes para que navegues el autodiagnóstico con confianza y soltura. Si tienes preguntas adicionales que no aparecen aquí, contacta con el equipo de Universitas o con tu HR/People Partner.',
        en: 'We want you to feel well-informed and supported throughout the process, with a clear understanding of what involves, why it matters, and what you can expect. Below you\'ll find straightforward answers to the most frequently asked questions, to help you navigate the self-diagnosis with confidence and ease. If you have any additional questions that aren\'t covered here, please reach out to the Universitas team or your HR/People contact for support.'
      },

      q1_title: { es: '¿Qué es este autodiagnóstico de liderazgo?', en: 'What is this leadership self-diagnosis?' },
      q1_body: {
        es: 'El Autodiagnóstico de Liderazgo de Telefónica es una experiencia de desarrollo diseñada para fortalecer las capacidades de liderazgo y apoyar la evolución del liderazgo en Telefónica hacia una organización más digital, simple y centrada en el cliente, alineada con el nuevo plan estratégico Transform & Grow. Esta experiencia permite a los líderes obtener un diagnóstico de dónde se encuentran respecto al nuevo Modelo de Liderazgo (6 skills clave) y les guía en la preparación de un plan de desarrollo personalizado para sacar el máximo partido al Accelerate Impact journey.',
        en: 'Telefónica\'s Leadership self-diagnosis is a developmental experience designed to strengthen leadership capabilities and support Telefónica\'s leadership evolution toward being more digital, simpler, and more customer-driven, aligned with the new strategic plan Transform & Grow. This experience enables leaders to get a diagnosis of where they stand with regards to the newly defined Leadership Model (6 core leadership skills) and guides them in preparing a customized development plan to get the most out of the Accelerate Impact journey.'
      },

      q2_title: { es: '¿Cuál es el propósito de este autodiagnóstico y cómo me beneficio?', en: 'What is the purpose of this self-diagnosis, and how will you benefit from it?' },
      q2_body: {
        es: 'El autodiagnóstico de talento está diseñado para construir autoconciencia y darte una visión más clara y objetiva de cómo lideras hoy —tus skills de liderazgo— para que puedas identificar fortalezas, oportunidades de desarrollo y dónde enfocar tu energía para lograr el máximo impacto.',
        en: 'The talent self-diagnosis is designed to build self-awareness and give you a clearer, more objective view of how you lead today—your leadership skills—so you can identify strengths, development opportunities, and where to focus for maximum impact.'
      },

      q3_title: { es: '¿Quién realiza este autodiagnóstico?', en: 'Who is conducting this self-diagnosis?' },
      q3_body: {
        es: 'Telefónica se ha aliado con Korn Ferry, una de las firmas líderes mundiales en desarrollo ejecutivo, cuyo propósito es ayudar a personas y organizaciones a superar su potencial. Juntos nos embarcamos en esta iniciativa para alcanzar de forma colectiva los ambiciosos objetivos de la nueva organización futura de Telefónica.',
        en: 'Telefónica has partnered with Korn Ferry, a leading executive development consulting firm whose purpose is to enable people and organizations to exceed their potential. Together, we are embarking on this initiative to collectively achieve our ambitious goals for the new future organization of TELEFÓNICA.'
      },

      q4_title: { es: '¿Recibiré un informe tras el autodiagnóstico?', en: 'Will I get a report after self-diagnosis?' },
      q4_body: {
        es: 'Al completar el autodiagnóstico online recibirás dos informes:',
        en: 'Upon completion of the online self-diagnosis, you will receive two reports:'
      },
      q4_b1_t: { es: 'Telefónica\'s Leadership Snapshot', en: 'Telefónica\'s Leadership Snapshot' },
      q4_b1_b: {
        es: 'Este informe te ofrece una visión clara y visual de tu posición dentro del Modelo de Liderazgo de Telefónica.',
        en: 'This report gives you a clear, visual snapshot of your position within Telefónica\'s Leadership Model.'
      },
      q4_b2_t: { es: 'In-depth Report', en: 'In-depth Report' },
      q4_b2_b: {
        es: 'Este informe va más allá de lo visible en la superficie. Aunque las skills y competencias de liderazgo reflejan lo que haces, hay mucho más debajo: tus traits y drivers, que influyen en por qué actúas como actúas. Mirando los elementos adicionales de este informe podrás profundizar en las palancas que activan el desarrollo de las 6 skills clave de Telefónica.',
        en: 'This report goes beyond what is visible on the surface. While leadership skills and competencies reflect what you do, there is much more beneath, your traits and drivers, which influence why you act the way you do. By looking at the additional elements from this report, you will be able to get a deeper understanding of the root levers that can power the development of the 6 Telefónica core leadership skills.'
      },

      q5_title: { es: '¿Cómo interpretaré mis resultados?', en: 'How will I interpret my self-diagnosis results?' },
      q5_body: {
        es: 'Para ayudarte a interpretar tus resultados y sacar el máximo valor, tendrás acceso a una experiencia de feedback dinámica e impulsada por IA que da vida a tus insights y apoya tu reflexión. Una vez que hayas completado el autodiagnóstico, el avatar te guiará a través de la interpretación de tus resultados, ayudándote a conectar insights entre secciones e identificar sugerencias y recomendaciones de desarrollo prácticas. En la página de Playbook encontrarás un set de prompts diseñados para ayudarte a sacar el máximo partido a la conversación con el avatar.',
        en: 'To help you interpret your results and get the most value from them, you will have access to a dynamic, AI-powered feedback experience that brings your insights to life and supports your reflection. Once you have completed the self-diagnosis, the avatar will guide you through the interpretation of your results, helping you connect insights across sections and identify practical development suggestions and recommendations. In the Playbook page, you will find a set of prompts designed to help you get the most from your conversation with the avatar and maximise its value.'
      },

      q6_title: { es: '¿Cuáles son los componentes del autodiagnóstico y cuánto tiempo lleva?', en: 'What are the components of the self-diagnosis and how much time will they take to complete?' },
      q6_body: {
        es: 'Completarás un autodiagnóstico online que analiza quién eres como líder, compuesto por tres módulos: <strong>Competencias</strong> (incluyendo skills de liderazgo), <strong>Traits</strong> y <strong>Drivers</strong>. Tarda aproximadamente 60 minutos. Esto es solo una orientación. Puedes tomarte el tiempo que necesites, ya que el tiempo invertido no afecta a los resultados. Recomendamos encontrar un espacio tranquilo y responder con naturalidad, sin prisas ni darle muchas vueltas.',
        en: 'You will complete an online self-diagnosis that looks at who you are as a leader, consisting of three modules: <strong>Competencies</strong> (including Leadership skills), <strong>Traits</strong> and <strong>Drivers</strong>. It takes approximately 60 minutes. This is a guideline only. You can take the time you need, as the time spent does not affect the results. We recommend finding a quiet space and answering naturally, without rushing or overthinking.'
      },
      q6_mod1_t: { es: 'Behavioral competencies', en: 'Behavioral competencies' },
      q6_mod1_d: {
        es: 'Evalúa tus skills y comportamientos observables necesarios para tener éxito en un rol. Se te pedirá clasificar afirmaciones según lo bien que reflejan tus comportamientos.',
        en: 'Assess your observable skills and behaviors needed to succeed in a role. You will be asked to rank statements according to how accurately they reflect your behaviors.'
      },
      q6_mod1_time: { es: '20 min', en: '20 mins' },
      q6_mod2_t: { es: 'Drivers', en: 'Drivers' },
      q6_mod2_d: {
        es: 'Evalúa tus motivaciones profundas: valores personales, aspiraciones y otros deseos. Se te pedirá clasificar afirmaciones según lo que te impulsa.',
        en: 'Assess your deep motivations: personal values, aspirations, and other desires. You will be asked to rank statements based upon what drives you.'
      },
      q6_mod2_time: { es: '10 min', en: '10 mins' },
      q6_mod3_t: { es: 'Traits', en: 'Traits' },
      q6_mod3_d: {
        es: 'Evalúa tus tendencias y características. Se te pedirá clasificar afirmaciones que más se parezcan a ti.',
        en: 'Assess your tendencies and characteristics. You will be asked to rank statements that are most like you.'
      },
      q6_mod3_time: { es: '15 min', en: '15 mins' },

      q7_title: { es: '¿Quién tiene acceso a los resultados del autodiagnóstico?', en: 'Who has access to the self-diagnosis results?' },
      q7_body: {
        es: 'Tu privacidad es de la máxima importancia para nosotros. Los resultados individuales solo serán accesibles para el participante y los miembros designados del equipo People involucrados en la iniciativa. Los datos también pueden usarse de forma agregada para informar acciones de desarrollo e insights más amplios, preservando siempre la confidencialidad individual. Si tienes cualquier inquietud sobre el acceso a tus resultados, no dudes en contactar con el equipo People para aclaración y tranquilidad.',
        en: 'Your privacy is of utmost importance to us. Individual results will only be accessible to the participant and the designated members of the People team involved in the initiative. Data may also be used in an aggregated way to inform development actions and broader insights, always preserving individual confidentiality. If you have any concerns about access to your self-diagnosis results, please do not hesitate to contact the People team for clarification and reassurance.'
      },

      q8_title: { es: '¿Es obligatoria mi participación en el autodiagnóstico?', en: 'Is my participation in self-diagnosis compulsory?' },
      q8_body: {
        es: 'Aunque la participación es voluntaria, te animamos enormemente a aprovechar este autodiagnóstico, diseñado para ofrecerte insights significativos que apoyarán tu crecimiento como líder. Completar el autodiagnóstico te dará una visión potente y personal de tu perfil de liderazgo y te ayudará a sacar el máximo partido a tu journey de desarrollo en Accelerate Impact.',
        en: 'While participation is voluntary, we highly encourage you to take advantage of this self-diagnosis, designed to provide meaningful insights that will support your growth as a leader. Completing the self-diagnosis will offer you a powerful, personal view of your leadership profile and help you make the most of your Accelerate Impact development journey.'
      },

      contact_label: { es: '¿Más preguntas?', en: 'More questions?' },
      contact_body: {
        es: 'Si tu pregunta no está cubierta aquí, contacta con el equipo de Universitas o con tu HR/People Partner.',
        en: 'If your question isn\'t covered here, please reach out to the Universitas team or your HR/People contact.'
      },
      contact_cta: { es: 'Ir a Contacto', en: 'Go to Contact' }
    };
  </script>
