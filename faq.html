  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },
      back_auto: { es: 'Volver al Autodiagnóstico', en: 'Back to Self-Diagnosis' },
      go_playbook: { es: 'Ir a Participant Playbook', en: 'Go to Participant Playbook' },

      hero_eyebrow: { es: 'Telefónica\'s Leadership Self-Diagnosis', en: 'Telefónica\'s Leadership Self-Diagnosis' },
      hero_title: {
        es: 'Preguntas frecuentes (FAQs)',
        en: 'FAQs'
      },
      hero_subtitle: {
        es: 'Todo lo que necesitas saber sobre el Leadership Self-diagnosis de Telefónica.',
        en: 'Everything you need to know about Telefónica\'s Leadership Self-diagnosis.'
      },
      hero_date: { es: '20 de marzo de 2026', en: 'March 20, 2026' },

      intro_label: { es: 'Introducción', en: 'Introduction' },
      intro_p1: {
        es: 'Te damos la bienvenida a la guía de preguntas frecuentes (FAQ) sobre el Leadership Self-diagnosis. Este documento ha sido diseñado para responder a preguntas frecuentes y ofrecer claridad a todos los participantes del Leadership Self-diagnosis en Telefónica.',
        en: 'Welcome to your Leadership Self-diagnosis Frequently Asked Questions (FAQ) Guide. This document is designed to answer common questions and provide clarity for all participants taking part in the leadership self-diagnosis across Telefónica.'
      },
      intro_p2: {
        es: 'Queremos que te sientas bien informado y acompañado durante todo el proceso, con una comprensión clara de en qué consiste, por qué importa y qué puedes esperar. A continuación encontrarás respuestas directas a las preguntas más habituales, para ayudarte a navegar el Leadership Self-diagnosis con confianza y facilidad. Si tienes alguna pregunta que no esté recogida aquí, no dudes en contactar con el equipo de Universitas o con tu contacto de People.',
        en: 'We want you to feel well-informed and supported throughout the process, with a clear understanding of what involves, why it matters, and what you can expect. Below you\'ll find straightforward answers to the most frequently asked questions, to help you navigate the self-diagnosis with confidence and ease. If you have any additional questions that aren\'t covered here, please reach out to Universitas team or your People contact for support.'
      },

      q1_title: { es: '¿En qué consiste este leadership self-diagnosis?', en: 'What is this leadership self-diagnosis?' },
      q1_body: {
        es: 'El <em>leadership self-diagnosis</em> de Telefónica es una experiencia diseñada para reforzar las capacidades de liderazgo y apoyar la evolución del liderazgo de Telefónica hacia un modelo más digital, más sencillo y más centrado en el cliente, alineado con el nuevo plan estratégico "Transform & Grow". Esta experiencia permite a los líderes conocer su posición respecto al nuevo Modelo de Liderazgo (6 skills) y les guía en la preparación de un plan de desarrollo personalizado para sacarle el máximo partido a la trayectoria dentro del programa "Accelerate Impact".',
        en: 'Telefónica\'s <em>leadership self-diagnosis</em> is an experience designed to strengthen leadership capabilities and support Telefónica\'s leadership evolution toward being more digital, simpler, and more customer-driven, aligned with the new strategic plan Transform & Grow. This experience enables leaders to get a diagnosis of where they stand with regards to the newly defined Leadership Model (6 core leadership skills) and guides them in preparing a customized development plan to get the most out of the Accelerate Impact journey.'
      },

      q2_title: { es: '¿Cuál es el objetivo de este Leadership Self-diagnosis y cómo te beneficiará?', en: 'What is the purpose of this self-diagnosis, and how will you benefit from it?' },
      q2_body: {
        es: 'El Leadership Self-diagnosis está diseñado para desarrollar tu autoconocimiento y ofrecerte una visión más clara y objetiva de cómo lideras hoy —tus skills de liderazgo— para que identifiques fortalezas, oportunidades de desarrollo y dónde enfocarte para lograr el máximo impacto.',
        en: 'The talent self-diagnosis is designed to build self-awareness and give you a clearer, more objective view of how you lead today—your leadership skills—so you can identify strengths, development opportunities, and where to focus for maximum impact.'
      },

      q3_title: { es: '¿Quién realiza este Leadership Self-diagnosis?', en: 'Who is conducting this self-diagnosis?' },
      q3_body: {
        es: 'Telefónica se ha asociado con Korn Ferry, una consultora líder en desarrollo de ejecutivos cuyo objetivo es ayudar a las personas y a las organizaciones a superar su potencial. Juntos, nos embarcamos en esta iniciativa para alcanzar de forma conjunta nuestros ambiciosos objetivos para la nueva organización de TELEFÓNICA.',
        en: 'Telefónica has partnered with Korn Ferry, a leading executive development consulting firm whose purpose is to enable people and organizations to exceed their potential. Together, we are embarking on this initiative to collectively achieve our ambitious goals for the new future organization of TELEFÓNICA.'
      },

      q4_title: { es: '¿Recibiré un informe tras el Leadership Self-diagnosis?', en: 'Will I get a report after self-diagnosis?' },
      q4_body: {
        es: 'Una vez completado el Leadership Self-diagnosis, recibirás dos informes:',
        en: 'Upon completion of the online self-diagnosis, you will receive two reports:'
      },
      q4_b1_t: { es: 'Telefónica\'s Leadership Snapshot', en: 'Telefónica\'s Leadership Snapshot' },
      q4_b1_b: {
        es: 'Este informe te ofrecerá una visión clara y visual de tu posición dentro del Modelo de Liderazgo de Telefónica.',
        en: 'This report gives you a clear, visual snapshot of your position within Telefónica\'s Leadership Model.'
      },
      q4_b2_t: { es: 'In-depth Report', en: 'In-depth Report' },
      q4_b2_b: {
        es: 'Este informe va más allá de lo visible en la superficie. Mientras que las skills y las competencias reflejan lo que haces, hay mucho más debajo: tus rasgos y motivadores, que influyen en por qué actúas como lo haces. Al analizar los elementos adicionales de este informe, podrás comprender en profundidad las palancas fundamentales que impulsan el desarrollo de las 6 skills de liderazgo de Telefónica.',
        en: 'This report goes beyond what is visible on the surface. While skills and competencies reflect what you do, there is much more beneath, your traits and drivers, which influence why you act the way you do. By looking at the additional elements from this report, you will be able to get a deeper understanding the root levers that can power the development of the 6 Telefónica core leadership skills.'
      },

      q5_title: { es: '¿Cómo debo interpretar los resultados de mi Leadership self-diagnosis?', en: 'How will I interpret my self-diagnosis results?' },
      q5_body: {
        es: 'Para ayudarte a interpretar tus resultados y sacarle el máximo partido, tendrás acceso a una experiencia de feedback interactivo impulsado por IA que facilita tu reflexión.<br><br>Una vez completes el Leadership Self-diagnosis, el avatar te guiará en la interpretación de tus resultados, ayudándote a conectar <em>insights</em> entre secciones e identificando sugerencias y recomendaciones prácticas de desarrollo.<br><br>En la página 5 del Playbook encontrarás un conjunto de <em>prompts</em> diseñados para sacarle el máximo partido a tu conversación con el avatar.<br><br>Ten en cuenta que el benchmark utilizado para la parametrización de los resultados es global y multisectorial, por lo que tu interpretación será clave para diseñar un plan de desarrollo de alto impacto adaptado a tu rol específico.',
        en: 'To help you interpret your results and get the most value from them, you will have access to a dynamic, AI-powered feedback experience that brings your insights to life and supports your reflection.<br><br>Once you have completed the self-diagnosis, the avatar will guide you through the interpretation of your results, helping you connect insights across sections and identify practical development suggestions and recommendations.<br><br>In page 5 of Playbook, you will find a set of prompts designed to help you get the most from your conversation with the avatar and maximise its value.<br><br>Remember the benchmark used for result parametrization is global and multi-sector, and therefore the interpretation you will make will be essential for a high-impact specific role-based development plan.'
      },

      q6_title: { es: '¿En qué consisten los componentes del Leadership Self-diagnosis y cuánto tiempo se tarda en completarlos?', en: 'What are the components of the self-diagnosis and how much time will they take to complete?' },
      q6_body: {
        es: 'Completarás un autodiagnóstico online sobre tu perfil como líder, compuesto por tres módulos: <strong>Competencias</strong> (incluyendo skills de Liderazgo), <strong>Rasgos</strong> y <strong>Motivadores</strong>.<br><br>Dura aproximadamente 60 minutos. Es solo una orientación: tómate el tiempo que necesites, ya que el tiempo no afecta los resultados. Te recomendamos buscar un lugar tranquilo y responder con naturalidad, sin prisas ni pensarlo demasiado.',
        en: 'You will complete an online self-diagnosis that looks at who you are as a leader, consisting of three modules: <strong>Competencies</strong> (including Leadership skills), <strong>Traits</strong> and <strong>Drivers</strong>.<br><br>It takes approximately 60 minutes. This is a guideline only. You can take the time you need, as the time spent does not affect the results. We recommend finding a quiet space and answering naturally, without rushing or overthinking.'
      },
      q6_mod1_t: { es: 'Behavioral competencies', en: 'Behavioral competencies' },
      q6_mod1_d: {
        es: 'Evalúa tus skills y comportamientos observables necesarios para tener éxito en un rol. Se te pedirá clasificar afirmaciones según lo bien que reflejan tus comportamientos.',
        en: 'Assess your observable skills and behaviors needed to succeed in a role. You will be asked to rank statements according to how accurately they reflect your behaviors.'
      },
      q6_mod1_time: { es: '20 min', en: '20 mins' },
      q6_mod2_t: { es: 'Drivers', en: 'Drivers' },
      q6_mod2_d: {
        es: 'Evalúa tus motivaciones profundas: valores personales, aspiraciones y otros deseos. Se te pedirá clasificar afirmaciones según lo que te impulsa.',
        en: 'Assess your deep motivations: personal values, aspirations, and other desires. You will be asked to rank statements based upon what drives you.'
      },
      q6_mod2_time: { es: '10 min', en: '10 mins' },
      q6_mod3_t: { es: 'Traits', en: 'Traits' },
      q6_mod3_d: {
        es: 'Evalúa tus tendencias y características. Se te pedirá clasificar afirmaciones que más se parezcan a ti.',
        en: 'Assess your tendencies and characteristics. You will be asked to rank statements that are most like you.'
      },
      q6_mod3_time: { es: '15 min', en: '15 mins' },

      q7_title: { es: '¿Quién tiene acceso a los resultados del Leadership Self-diagnosis?', en: 'Who has access to the self-diagnosis results?' },
      q7_body: {
        es: 'Tu privacidad es nuestra máxima prioridad. Los resultados individuales solo serán accesibles para el participante y los miembros designados del equipo de Personas involucrados en la iniciativa.<br><br>Los datos podrán utilizarse también para orientar acciones de desarrollo e identificar tendencias globales.<br><br>Si tienes alguna preocupación sobre el acceso a tus resultados de autodiagnóstico, no dudes en contactar con el equipo de People para aclaraciones y tranquilidad.',
        en: 'Your privacy is of utmost importance to us. Individual results will only be accessible to the participant and the designated members of the People team involved in the initiative.<br><br>Data may also be used to inform development actions and broader insights, always preserving individual confidentiality.<br><br>If you have any concerns about access to your self-diagnosis results, please do not hesitate to contact the People team for clarification and reassurance.'
      },

      q8_title: { es: '¿Mi participación en el self-diagnosis es obligatoria?', en: 'Is my participation in self-diagnosis compulsory?' },
      q8_body: {
        es: 'Aunque la participación es voluntaria, te animamos encarecidamente a aprovechar este autodiagnóstico, diseñado para proporcionarte reflexiones valiosas que apoyen tu crecimiento como líder. Completarlo te ofrecerá una visión profunda y personalizada de tu perfil de liderazgo y te ayudará a sacarle el máximo partido a tu recorrido de desarrollo dentro del Programa "Accelerate Impact".',
        en: 'While participation is voluntary, we highly encourage you to take advantage of this self-diagnosis, designed to provide meaningful insights that will support your growth as a leader. Completing the self-diagnosis will offer you a powerful, personal view of your leadership profile and help you make the most of your Accelerate Impact development journey.'
      },

      contact_label: { es: '¿Más preguntas?', en: 'More questions?' },
      contact_body: {
        es: 'Si tu pregunta no está cubierta aquí, contacta con el equipo de Universitas o con tu contacto de People.',
        en: 'If your question isn\'t covered here, please reach out to Universitas team or your People contact for support.'
      },
      contact_cta: { es: 'Ir a Contacto', en: 'Go to Contact' }
    };
  </script>
