        <h1 class="font-light leading-[0.95] tracking-[-0.03em] text-6xl md:text-8xl mb-10">

        <div class="space-y-5 text-[16px] md:text-[17px] leading-relaxed text-ink-soft max-w-md mb-14">

          <p x-text="t('body_2')"></p>

        <div class="flex items-baseline justify-between gap-6 pt-6 border-t border-dashed border-ink/20">

          <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-mute" x-text="t('signoff_team')"></p>
        </div>
      </article>

      <!-- Contact "stamp" card — overlapping slightly rotated -->
      <aside class="md:-mt-10 mt-10 md:ml-auto md:mr-8 md:w-80 relative reveal reveal-3">

          <p class="font-mono text-[9px] tracking-[0.25em] uppercase text-paper/60 mb-5" x-text="t('card_label')"></p>
          <p class="font-light text-xl leading-tight tracking-tight mb-1" x-text="t('card_name')"></p>
          <p class="font-mono text-[10px] tracking-[0.15em] uppercase text-paper/60 mb-6" x-text="t('card_role')"></p>
          <div class="space-y-2 pt-5 border-t border-paper/20">

              <span x-text="t('card_email')"></span>
