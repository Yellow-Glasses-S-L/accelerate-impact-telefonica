<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'lider-telefonica',
  liderPopup: null,
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Líder Telefónica — Accelerate Impact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"Telefonica Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    *, *::before, *::after { font-family: "Telefonica Sans", sans-serif !important; }
    body { font-feature-settings: "cv11", "ss01"; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
    .reveal-1 { animation-delay: 0.1s; }
    .reveal-2 { animation-delay: 0.25s; }
    .reveal-3 { animation-delay: 0.4s; }

    @media (prefers-reduced-motion: reduce) { .reveal { animation: none; } }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    const i18n = {
      nav_journey:        { es: 'Journey', en: 'Journey' },
      nav_nadia:          { es: 'Nadia', en: 'Nadia' },
      nav_lider:          { es: 'Líder Telefónica', en: 'Telefónica Leader' },
      nav_info:           { es: 'Contacto', en: 'Contact' },
      nav_back_journey:   { es: 'Volver a Journey', en: 'Back to Journey' },

      hero_title:    { es: 'El Líder Telefónica.', en: 'The Telefónica Leader.' },
      hero_subtitle: { es: "It's On Us.", en: "It's On Us." },

      pilars_eyebrow: { es: "It's On Us", en: "It's On Us" },
      pilars_title:   { es: 'Tres compromisos que nos definen.', en: 'Three commitments that define us.' },

      p1_claim: { es: 'Damos lo mejor de nosotros', en: 'We give our best' },
      p1_sub:   { es: 'Porque lo bueno no basta.', en: 'Because good is not enough.' },
      p1_body:  { es: 'El negocio necesita relevancia.', en: 'The business needs relevance.' },

      p2_claim: { es: 'Cuestionamos nuestros propios límites', en: 'We challenge our own limits' },
      p2_sub:   { es: 'Y los rompemos.', en: 'And we break them.' },
      p2_body:  { es: 'El negocio necesita velocidad y eficiencia.', en: 'The business needs speed and efficiency.' },

      p3_claim: { es: 'Crecemos juntos', en: 'We grow together' },
      p3_sub:   { es: 'O no crecemos.', en: 'Or we do not grow at all.' },
      p3_body:  { es: 'El negocio necesita resultados y un talento preparado para lograrlos.', en: 'The business needs results and talent ready to achieve them.' },
    };
  </script>
</head>
<body class="flex flex-col min-h-screen bg-paper text-ink font-sans antialiased">

  <!-- HEADER -->
  <header id="site-navbar" class="sticky top-0 z-50 bg-paper/90 backdrop-blur-md border-b border-ink/10"></header>

  <main class="flex-1">

    <!-- HERO -->
    <section class="text-paper relative overflow-hidden flex flex-col justify-end" data-nav-dark style="margin-top:-79px; min-height:100vh;">
      <img src="journey-gif.gif" alt="" aria-hidden="true"
           class="absolute inset-0 w-full h-full object-cover object-center pointer-events-none"
           style="z-index:0; transform:scale(1.03);">
      <div class="absolute inset-0" style="background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); opacity: 0.82; z-index:1;"></div>
      <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse 60vw 40vh at 30% 20%, rgba(0,102,255,0.18) 0%, transparent 60%); z-index:1;"></div>
      <div class="relative w-full max-w-[1920px] mx-auto px-6 md:px-12 lg:px-16 pt-32 pb-20 md:pt-40 md:pb-28" style="z-index:2;">
        <h1 class="font-sans font-normal leading-[0.95] tracking-tight text-4xl md:text-8xl lg:text-[7rem] mb-6 reveal reveal-1">
          <em class="italic text-tef-blue" x-text="lang==='es' ? 'El Líder' : 'The Leader'"></em><span x-text="lang==='es' ? ' Telefónica.' : ' Telefónica.'"></span>
        </h1>
        <p class="text-2xl md:text-4xl lg:text-5xl text-paper/80 font-normal reveal reveal-2"
           x-text="t('hero_subtitle')"></p>
      </div>
    </section>

    <!-- FULL-BLEED IMAGE -->
    <section>
      <img src="its-on-us.png" alt="El Líder Telefónica"
           class="w-full block">
    </section>

    <!-- TRES COMPROMISOS -->
    <section class="bg-paper-warm py-20 md:py-28">
      <div class="max-w-[1920px] mx-auto px-6 md:px-12 lg:px-16">

        <!-- Header -->
        <div class="mb-14 md:mb-20" data-reveal="up">
          <p class="font-mono text-[11px] tracking-[0.25em] uppercase text-tef-blue mb-5" x-text="t('pilars_eyebrow')"></p>
          <h2 class="font-sans font-normal tracking-tight leading-[0.95] text-ink"
              style="font-size: clamp(2rem, 4.5vw, 5.2rem)" data-split-words>
            <span x-text="lang==='es' ? 'Tres compromisos' : 'Three commitments'"></span><br>
            <em class="italic font-normal text-tef-blue" x-text="lang==='es' ? 'que nos definen.' : 'that define us.'"></em>
          </h2>
        </div>

        <!-- 3 tarjetas -->
        <div class="grid grid-cols-1 md:grid-cols-3 divide-x divide-ink/10" data-reveal-stagger data-stagger-delay="0.18">

          <!-- 01 -->
          <div class="bg-paper-warm flex flex-col px-8 md:px-10 py-10 md:py-14" data-stagger-item>
            <span class="font-mono text-tef-blue leading-none mb-8 select-none"
                  style="font-size: clamp(3rem, 7vw, 7rem); letter-spacing:-0.05em;">01</span>
            <h3 class="font-sans font-normal text-2xl md:text-3xl leading-[1.05] tracking-tight text-ink mb-4"
                x-text="t('p1_claim')"></h3>
            <p class="font-sans italic text-tef-blue text-lg md:text-xl leading-snug mb-4"
               x-text="t('p1_sub')"></p>
            <p class="text-[17px] text-ink-soft leading-relaxed pt-6 border-t border-ink/10"
               x-text="t('p1_body')"></p>
            <div class="mt-auto pt-8">
              <button @click="liderPopup = 'p1'"
                      class="group inline-flex items-center gap-2 bg-tef-blue text-white px-4 py-2 text-[11px] font-mono tracking-[0.18em] uppercase hover:bg-blue-700 transition-colors">
                <span>Más información</span>
                <span class="text-[14px] leading-none">+</span>
              </button>
            </div>
          </div>

          <!-- 02 -->
          <div class="bg-paper-warm flex flex-col px-8 md:px-10 py-10 md:py-14" data-stagger-item>
            <span class="font-mono text-tef-blue leading-none mb-8 select-none"
                  style="font-size: clamp(3rem, 7vw, 7rem); letter-spacing:-0.05em;">02</span>
            <h3 class="font-sans font-normal text-2xl md:text-3xl leading-[1.05] tracking-tight text-ink mb-4"
                x-text="t('p2_claim')"></h3>
            <p class="font-sans italic text-tef-blue text-lg md:text-xl leading-snug mb-4"
               x-text="t('p2_sub')"></p>
            <p class="text-[17px] text-ink-soft leading-relaxed pt-6 border-t border-ink/10"
               x-text="t('p2_body')"></p>
            <div class="mt-auto pt-8">
              <button @click="liderPopup = 'p2'"
                      class="group inline-flex items-center gap-2 bg-tef-blue text-white px-4 py-2 text-[11px] font-mono tracking-[0.18em] uppercase hover:bg-blue-700 transition-colors">
                <span>Más información</span>
                <span class="text-[14px] leading-none">+</span>
              </button>
            </div>
          </div>

          <!-- 03 -->
          <div class="bg-paper-warm flex flex-col px-8 md:px-10 py-10 md:py-14" data-stagger-item>
            <span class="font-mono text-tef-blue leading-none mb-8 select-none"
                  style="font-size: clamp(3rem, 7vw, 7rem); letter-spacing:-0.05em;">03</span>
            <h3 class="font-sans font-normal text-2xl md:text-3xl leading-[1.05] tracking-tight text-ink mb-4"
                x-text="t('p3_claim')"></h3>
            <p class="font-sans italic text-tef-blue text-lg md:text-xl leading-snug mb-4"
               x-text="t('p3_sub')"></p>
            <p class="text-[17px] text-ink-soft leading-relaxed pt-6 border-t border-ink/10"
               x-text="t('p3_body')"></p>
            <div class="mt-auto pt-8">
              <button @click="liderPopup = 'p3'"
                      class="group inline-flex items-center gap-2 bg-tef-blue text-white px-4 py-2 text-[11px] font-mono tracking-[0.18em] uppercase hover:bg-blue-700 transition-colors">
                <span>Más información</span>
                <span class="text-[14px] leading-none">+</span>
              </button>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Page navigation -->
    <section class="bg-paper-warm border-t border-ink/10 py-8">
      <div class="max-w-[1920px] mx-auto px-8 md:px-12 lg:px-16 flex items-center justify-end">
        <a href="journey.html"
           class="group inline-flex items-center gap-3 text-ink-mute hover:text-tef-blue transition-colors">
          <span class="font-mono text-[12px] tracking-[0.2em] uppercase">IR A JOURNEY</span>
          <svg class="w-4 h-4 shrink-0 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer id="site-footer" class="bg-tef-dark text-paper mt-auto"></footer>

  <!-- POPUP -->
  <div x-show="liderPopup !== null"
       x-transition.opacity
       @click.self="liderPopup = null"
       class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-tef-dark/60 backdrop-blur-sm"
       style="display:none" x-cloak>
    <div class="max-w-lg w-full bg-paper rounded-br-2xl shadow-2xl pb-20 pt-8 px-8 md:pt-10 md:px-10 relative overflow-hidden">
      <div class="mb-6">
        <img src="accelerate-impact-logo.svg" class="h-7 w-auto" alt="Accelerate Impact">
      </div>

      <template x-if="liderPopup === 'p1'">
        <div>
          <h2 class="font-sans font-normal text-3xl md:text-4xl text-ink leading-tight mb-4">Damos lo mejor de nosotros.</h2>
          <p class="text-sm text-ink-soft leading-relaxed mb-3">Y si queremos convertirnos en socios de confianza de nuestros clientes, necesitamos profesionales que simplifiquen, prioricen y se enfoquen en lo que realmente genera impacto.</p>
          <p class="text-sm text-ink-soft leading-relaxed mb-4">Esto, hoy, en Telefónica, lo expresamos a través de dos skills clave:</p>
          <ul class="space-y-3 text-sm text-ink-soft">
            <li><span class="font-medium text-ink">Customer First:</span> el momento del cliente es ahora. Escuchamos y resolvemos con rapidez.</li>
            <li><span class="font-medium text-ink">Delivering Excellence:</span> la excelencia es nuestro estándar. Menos es más. Obsesión por la simplicidad.</li>
          </ul>
        </div>
      </template>

      <template x-if="liderPopup === 'p2'">
        <div>
          <h2 class="font-sans font-normal text-3xl md:text-4xl text-ink leading-tight mb-4">Cuestionamos nuestros propios límites.</h2>
          <p class="text-sm text-ink-soft leading-relaxed mb-3">Si queremos ser competitivos, necesitamos profesionales valientes y curiosos, que cuestionen los límites, estén dispuestos a tomar decisiones difíciles, asumir riesgos controlados y utilizar la tecnología para resolver problemas reales.</p>
          <p class="text-sm text-ink-soft italic leading-relaxed mb-3">Las compañías que avanzan no son las que convierten sus rutinas en dogma, sino las que se atreven a cuestionarlas.</p>
          <p class="text-sm text-ink-soft leading-relaxed mb-4">Esto, hoy, en Telefónica, lo expresamos a través de dos skills clave:</p>
          <ul class="space-y-3 text-sm text-ink-soft">
            <li><span class="font-medium text-ink">Digital Innovation:</span> creamos entornos para sentirnos libres, compartir ideas, generar soluciones creativas e innovar con propósito.</li>
            <li><span class="font-medium text-ink">Clarity &amp; Courage:</span> la claridad guía decisiones valientes. Impulsamos la toma de decisiones sin miedo, el debate abierto y sincero, y el cuestionamiento riguroso.</li>
          </ul>
        </div>
      </template>

      <template x-if="liderPopup === 'p3'">
        <div>
          <h2 class="font-sans font-normal text-3xl md:text-4xl text-ink leading-tight mb-4">Crecemos juntos.</h2>
          <p class="text-sm text-ink-soft leading-relaxed mb-3">Si queremos transformarnos para liderar el futuro, necesitamos desarrollar hoy las capacidades que el negocio demandará mañana. Necesitamos profesionales que promuevan que cada persona asuma la responsabilidad por el todo, no solo por su parte.</p>
          <p class="text-sm text-ink-soft leading-relaxed mb-4">Esto, hoy, en Telefónica, lo expresamos a través de dos skills clave:</p>
          <ul class="space-y-3 text-sm text-ink-soft mb-4">
            <li><span class="font-medium text-ink">Driving Ownership:</span> el resultado depende de nosotros. Asumimos la responsabilidad por el todo y buscamos soluciones.</li>
            <li><span class="font-medium text-ink">Growing People:</span> el crecimiento construye futuro. Aprendemos de la experiencia, lideramos con el ejemplo e impulsamos a las personas.</li>
          </ul>
          <p class="text-xs text-ink-mute italic leading-relaxed">El crecimiento de la compañía depende del crecimiento de cada equipo. Y el crecimiento de cada equipo comienza con las personas. Depende de nuestra ambición. De nuestra iniciativa. <em class="not-italic font-medium text-ink">It's on us.</em></p>
        </div>
      </template>

      <button @click="liderPopup = null"
              class="absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 hover:bg-blue-700 transition-colors group rounded-br-2xl">
        <span class="font-mono text-xs tracking-[0.18em] uppercase">Cerrar</span>
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <script src="components.js"></script>
  <script src="scroll.js"></script>
</body>
</html>
