<!DOCTYPE html>
<html lang="es" x-data="{ lang: localStorage.getItem('lang') || 'es', variant: 'dark' }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test — It's on Us · Accelerate Impact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }

    /* Fondos oficiales del toolkit */
    .bg-dark   { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-medium { background: radial-gradient(ellipse at 70% 0%, #3ab0c9 0%, #0066FF 45%, #002f8a 100%); }
    .bg-light  { background: radial-gradient(ellipse at 50% 50%, #E8F0FF 0%, #DDE8FF 50%, #F3E8FF 100%); }
    .bg-white2 { background: linear-gradient(180deg, #F7F9FF 0%, #FFFFFF 100%); }

    .text-on-dark  { color: #FFFFFF; }
    .text-on-light { color: #031A34; }
    .loop-dark  { stroke: rgba(255,255,255,0.35); }
    .loop-blue  { stroke: #0066FF; }
    .dot-dark   { fill: rgba(255,255,255,0.35); }
    .dot-blue   { fill: #0066FF; }

    @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .drift { animation: drift 6s ease-in-out infinite; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp .9s cubic-bezier(.2,.7,.2,1) both; }
    .d1{animation-delay:.1s} .d2{animation-delay:.25s} .d3{animation-delay:.4s} .d4{animation-delay:.55s}
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="font-sans antialiased">

  <!-- Toolbar de test -->
  <div class="fixed top-4 right-4 z-50 bg-white/90 backdrop-blur border border-ink/10 rounded-full px-2 py-1 flex gap-1 text-xs font-medium shadow-lg">
    <button @click="variant='dark'"   :class="variant==='dark'?'bg-ink text-white':'text-ink'"   class="px-3 py-1.5 rounded-full">Dark</button>
    <button @click="variant='medium'" :class="variant==='medium'?'bg-tef-blue text-white':'text-ink'" class="px-3 py-1.5 rounded-full">Medium</button>
    <button @click="variant='light'"  :class="variant==='light'?'bg-tef-blue text-white':'text-ink'"  class="px-3 py-1.5 rounded-full">Light</button>
    <button @click="variant='white2'" :class="variant==='white2'?'bg-tef-blue text-white':'text-ink'" class="px-3 py-1.5 rounded-full">White</button>
    <span class="w-px bg-ink/10 mx-1"></span>
    <button @click="lang='es'" :class="lang==='es'?'bg-ink text-white':'text-ink'" class="px-3 py-1.5 rounded-full">ES</button>
    <button @click="lang='en'" :class="lang==='en'?'bg-ink text-white':'text-ink'" class="px-3 py-1.5 rounded-full">EN</button>
  </div>

  <!-- HERO "It's on Us" -->
  <section
    class="relative min-h-screen overflow-hidden"
    :class="{
      'bg-dark text-on-dark':   variant==='dark',
      'bg-medium text-on-dark': variant==='medium',
      'bg-light text-on-light': variant==='light',
      'bg-white2 text-on-light':variant==='white2'
    }">

    <!-- Logo Telefónica arriba centro -->
    <div class="pt-10 pb-6 flex justify-center items-center gap-3 reveal">
      <svg class="w-8 h-9" viewBox="0 0 24 28" aria-hidden="true">
        <circle cx="4"  cy="3"  r="2.2" :fill="variant==='light'||variant==='white2' ? '#0066FF' : '#FFFFFF'"/>
        <circle cx="12" cy="3"  r="2.2" :fill="variant==='light'||variant==='white2' ? '#0066FF' : '#FFFFFF'"/>
        <circle cx="20" cy="3"  r="2.2" :fill="variant==='light'||variant==='white2' ? '#0066FF' : '#FFFFFF'"/>
        <circle cx="12" cy="13" r="2.2" :fill="variant==='light'||variant==='white2' ? '#0066FF' : '#FFFFFF'"/>
        <circle cx="12" cy="23" r="2.2" :fill="variant==='light'||variant==='white2' ? '#0066FF' : '#FFFFFF'"/>
      </svg>
      <span class="text-2xl font-medium tracking-tight">Telefónica</span>
    </div>

    <!-- Orbital loops decorativos -->
    <svg class="absolute left-0 top-1/4 w-[32vw] h-[60vh] pointer-events-none drift" viewBox="0 0 400 600" fill="none" aria-hidden="true">
      <path d="M 280 50 Q 50 120 80 320 Q 110 520 320 560"
            :class="(variant==='light'||variant==='white2') ? 'loop-blue' : 'loop-dark'"
            stroke-width="1.5" stroke-dasharray="4 8" fill="none"/>
      <circle cx="280" cy="50"  r="6" :class="(variant==='light'||variant==='white2') ? 'dot-blue' : 'dot-dark'" fill="none" stroke-width="1.5"/>
      <circle cx="320" cy="560" r="6" :class="(variant==='light'||variant==='white2') ? 'dot-blue' : 'dot-dark'" fill="none" stroke-width="1.5"/>
    </svg>

    <svg class="absolute right-0 top-1/4 w-[32vw] h-[60vh] pointer-events-none drift" style="animation-delay:-3s" viewBox="0 0 400 600" fill="none" aria-hidden="true">
      <path d="M 120 50 Q 350 120 320 320 Q 290 520 80 560"
            :class="(variant==='light'||variant==='white2') ? 'loop-blue' : 'loop-dark'"
            stroke-width="1.5" stroke-dasharray="4 8" fill="none"/>
      <circle cx="120" cy="50"  r="6" :class="(variant==='light'||variant==='white2') ? 'dot-blue' : 'dot-dark'" fill="none" stroke-width="1.5"/>
      <circle cx="80"  cy="560" r="6" :class="(variant==='light'||variant==='white2') ? 'dot-blue' : 'dot-dark'" fill="none" stroke-width="1.5"/>
    </svg>

    <!-- Claim central "It's on Us" -->
    <div class="relative max-w-7xl mx-auto px-8 pt-12 pb-20">
      <div class="grid grid-cols-3 gap-8 items-end">
        <div class="text-center reveal d1">
          <h1 class="font-light leading-none" style="font-size: clamp(5rem, 11vw, 11rem);">It's</h1>
        </div>
        <div class="text-center reveal d2">
          <h1 class="font-light leading-none" style="font-size: clamp(5rem, 11vw, 11rem);">on</h1>
        </div>
        <div class="text-center reveal d3">
          <h1 class="font-light leading-none" style="font-size: clamp(5rem, 11vw, 11rem);">Us</h1>
        </div>
      </div>

      <!-- 3 Subtítulos -->
      <div class="grid grid-cols-3 gap-8 mt-12">
        <div class="text-center reveal d2">
          <p class="text-xl md:text-2xl font-light leading-snug"
             x-text="lang==='es' ? 'Damos lo mejor de nosotros mismos' : 'Give your best.'"></p>
        </div>
        <div class="text-center reveal d3">
          <p class="text-xl md:text-2xl font-light leading-snug"
             x-text="lang==='es' ? 'Cuestionamos nuestros propios límites' : 'Challenge your limits.'"></p>
        </div>
        <div class="text-center reveal d4">
          <p class="text-xl md:text-2xl font-light leading-snug"
             x-text="lang==='es' ? 'Nos superamos juntos' : 'Rise together.'"></p>
        </div>
      </div>

      <!-- 6 valores -->
      <div class="grid grid-cols-3 gap-8 md:gap-12 mt-16 reveal d4">
        <!-- Columna 1 -->
        <div class="space-y-6">
          <div class="flex items-start gap-3">
            <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25">
              <circle cx="20" cy="20" r="16"/>
              <path d="M20 12v8l5 3" stroke-linecap="round"/>
            </svg>
            <p class="text-sm md:text-base leading-snug"
               x-text="lang==='es' ? 'El momento del cliente es ahora' : 'Customer time is now'"></p>
          </div>
          <div class="flex items-start gap-3">
            <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25">
              <circle cx="20" cy="20" r="16"/>
              <path d="M20 12l2.4 5 5.5.8-4 3.9.9 5.5-4.8-2.5-4.8 2.5.9-5.5-4-3.9 5.5-.8z" stroke-linejoin="round"/>
            </svg>
            <p class="text-sm md:text-base leading-snug"
               x-text="lang==='es' ? 'La excelencia es nuestro estándar' : 'Excellence is our standard'"></p>
          </div>
        </div>
        <!-- Columna 2 -->
        <div class="space-y-6">
          <div class="flex items-start gap-3">
            <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25">
              <circle cx="20" cy="20" r="16"/>
              <circle cx="18" cy="18" r="3"/>
              <path d="M20.5 20.5L25 25" stroke-linecap="round"/>
            </svg>
            <p class="text-sm md:text-base leading-snug"
               x-text="lang==='es' ? 'La curiosidad impulsa la innovación' : 'Curiosity drives innovation'"></p>
          </div>
          <div class="flex items-start gap-3">
            <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25">
              <circle cx="20" cy="20" r="16"/>
              <circle cx="20" cy="20" r="6"/>
              <circle cx="20" cy="20" r="1.5" fill="currentColor"/>
            </svg>
            <p class="text-sm md:text-base leading-snug"
               x-text="lang==='es' ? 'La claridad guía decisiones valientes' : 'Clarity leads to bold decisions'"></p>
          </div>
        </div>
        <!-- Columna 3 -->
        <div class="space-y-6">
          <div class="flex items-start gap-3">
            <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25">
              <circle cx="20" cy="20" r="16"/>
              <path d="M14 20l4 4 8-8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p class="text-sm md:text-base leading-snug"
               x-text="lang==='es' ? 'El resultado depende de nosotros' : 'Results depend on us'"></p>
          </div>
          <div class="flex items-start gap-3">
            <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25">
              <circle cx="20" cy="20" r="16"/>
              <path d="M20 27c-4-3-7-5.5-7-9 0-2.2 1.8-4 4-4 1.3 0 2.4.6 3 1.6.6-1 1.7-1.6 3-1.6 2.2 0 4 1.8 4 4 0 3.5-3 6-7 9z"/>
              <circle cx="17.5" cy="22" r=".6" fill="currentColor"/>
              <circle cx="20"   cy="22" r=".6" fill="currentColor"/>
              <circle cx="22.5" cy="22" r=".6" fill="currentColor"/>
              <circle cx="18.75" cy="24" r=".6" fill="currentColor"/>
              <circle cx="21.25" cy="24" r=".6" fill="currentColor"/>
              <circle cx="20" cy="26" r=".6" fill="currentColor"/>
            </svg>
            <p class="text-sm md:text-base leading-snug"
               x-text="lang==='es' ? 'El crecimiento construye futuro' : 'People\'s growth builds our future'"></p>
          </div>
        </div>
      </div>

      <!-- Bajada Accelerate Impact -->
      <div class="mt-24 text-center reveal d4">
        <div class="inline-block">
          <p class="text-xs tracking-[0.3em] uppercase opacity-60 mb-3"
             x-text="lang==='es' ? 'El programa que lo hace real' : 'The program that makes it real'"></p>
          <h2 class="text-4xl md:text-6xl font-medium tracking-tight">Accelerate Impact</h2>
          <div class="mt-6 mx-auto w-16 h-px opacity-30" style="background: currentColor;"></div>
          <p class="mt-6 max-w-2xl mx-auto text-base md:text-lg font-light opacity-80"
             x-text="lang==='es' ? 'Un programa de liderazgo estratégico para el Top 200 de Telefónica. 10 meses. Un compromiso: superarnos juntos.' : 'A strategic leadership program for Telefónica\'s Top 200. 10 months. One commitment: to rise together.'"></p>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
