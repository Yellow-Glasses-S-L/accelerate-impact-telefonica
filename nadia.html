<!DOCTYPE html>
<html
  lang="es"
  x-data="{
    lang: localStorage.getItem('lang') || 'es',
    page: 'nadia',
    init() {
      this.$watch('lang', v => localStorage.setItem('lang', v))
    }
  }"
>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="lang === 'es' ? 'Nadia — Accelerate Impact' : 'Nadia — Accelerate Impact'">Nadia — Accelerate Impact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#0B2739', light: '#E8F0FF' },
            pex: { red: '#E84C48', teal: '#6DAFBF' },
            prog: { gold: '#F5A623', purple: '#7C4DFF', green: '#2EC4B6', orange: '#FF6B35' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-50 font-sans text-gray-900">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-gray-800 rounded-full flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="font-bold text-gray-900 text-sm hidden sm:block">Accelerate Impact</span>
      </div>
      <nav class="hidden md:flex items-center gap-0.5 text-sm">
        <a href="index.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='home'}" x-text="lang==='es' ? 'Inicio' : 'Home'"></a>
        <a href="modelo.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='modelo'}" x-text="lang==='es' ? 'Modelo' : 'Model'"></a>
        <a href="journey.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='journey'}">Journey</a>
        <a href="autodiagnostico.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='auto'}" x-text="lang==='es' ? 'Autodiag.' : 'Self-Diag.'"></a>
        <a href="agenda.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='agenda'}" x-text="lang==='es' ? 'Agenda' : 'Agenda'"></a>
        <a href="nadia.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='nadia'}">Nadia</a>
        <a href="info.html" class="px-3 py-1.5 rounded-lg text-gray-600 hover:text-gray-800 hover:bg-gray-100 transition-colors font-medium" :class="{'text-gray-800 bg-gray-100 font-semibold': page==='info'}" x-text="lang==='es' ? 'Más info' : 'More info'"></a>
      </nav>
      <div class="flex items-center gap-1 border border-gray-200 rounded-full px-1 py-0.5">
        <button @click="lang='es'" :class="lang==='es' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:text-gray-600'" class="text-xs font-bold px-2.5 py-1 rounded-full transition-colors">ES</button>
        <button @click="lang='en'" :class="lang==='en' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:text-gray-600'" class="text-xs font-bold px-2.5 py-1 rounded-full transition-colors">EN</button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-700 text-white">
    <div class="max-w-7xl mx-auto px-6 py-14 flex flex-col items-center text-center gap-6">
      <!-- Avatar -->
      <div class="w-20 h-20 bg-gradient-to-br from-purple-400 to-gray-700 rounded-full flex items-center justify-center text-3xl font-bold text-white shadow-xl ring-4 ring-white/20">
        N
      </div>
      <div>
        <h1 class="text-5xl font-extrabold mb-2 tracking-tight" style="font-family: 'Rubik', sans-serif;">Nadia</h1>
        <p class="text-purple-200 text-lg font-medium mb-1" x-text="lang==='es' ? 'Tu AI Leadership Coach personal' : 'Your personal AI Leadership Coach'"></p>
        <p class="text-purple-300 text-sm" x-text="lang==='es' ? 'Disponible durante todo tu journey de desarrollo' : 'Available throughout your development journey'"></p>
      </div>
      <a
        href="#"
        class="bg-white text-gray-700 font-bold rounded-xl px-8 py-3 hover:bg-gray-50 transition-colors text-base shadow-lg mt-2"
        x-text="lang==='es' ? 'CONÉCTATE A NADIA →' : 'CONNECT TO NADIA →'"
      ></a>
    </div>
  </section>

  <!-- MAIN -->
  <main class="flex-1">
    <div class="max-w-7xl mx-auto px-6 py-8 flex gap-6">

      <!-- CONTENT -->
      <div class="flex-1 min-w-0 space-y-8">

        <!-- How Nadia can help -->
        <div>
          <h2 class="text-xl font-bold text-gray-900 mb-1" x-text="lang==='es' ? '¿Cómo puede ayudarte?' : 'How can Nadia help you?'"></h2>
          <p class="text-gray-500 text-sm mb-5" x-text="lang==='es' ? 'Nadia es tu coach de IA personal durante todo el programa Accelerate Impact.' : 'Nadia is your personal AI coach throughout the Accelerate Impact program.'"></p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <!-- Card 1 -->
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
              <div class="text-3xl mb-3">🎯</div>
              <h3 class="font-bold text-gray-900 mb-2" x-text="lang==='es' ? 'Preparar tu Action Plan' : 'Prepare your Action Plan'"></h3>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="lang==='es' ? 'Kill / Quick Win / Raise the Bar — Define tus compromisos de liderazgo con claridad y propósito.' : 'Kill / Quick Win / Raise the Bar — Define your leadership commitments with clarity and purpose.'"></p>
            </div>

            <!-- Card 2 -->
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
              <div class="text-3xl mb-3">🔍</div>
              <h3 class="font-bold text-gray-900 mb-2" x-text="lang==='es' ? 'Reflexionar sobre resultados' : 'Reflect on your results'"></h3>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="lang==='es' ? 'Conecta tu autodiagnóstico con acciones concretas para maximizar tu impacto como líder.' : 'Connect your self-assessment with concrete actions to maximise your impact as a leader.'"></p>
            </div>

            <!-- Card 3 -->
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
              <div class="text-3xl mb-3">💬</div>
              <h3 class="font-bold text-gray-900 mb-2" x-text="lang==='es' ? 'Practicar conversaciones' : 'Practice conversations'"></h3>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="lang==='es' ? 'Simula diálogos difíciles — Feedback, decisiones, gestión del conflicto — antes de que ocurran de verdad.' : 'Simulate difficult dialogues — Feedback, decisions, conflict management — before they happen for real.'"></p>
            </div>

            <!-- Card 4 -->
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
              <div class="text-3xl mb-3">🌱</div>
              <h3 class="font-bold text-gray-900 mb-2" x-text="lang==='es' ? 'Desarrollo continuo' : 'Continuous development'"></h3>
              <p class="text-sm text-gray-600 leading-relaxed" x-text="lang==='es' ? 'Acompañamiento post-programa — Mantén el momentum y consolida los hábitos de liderazgo.' : 'Post-program support — Maintain momentum and consolidate leadership habits.'"></p>
            </div>

          </div>
        </div>

        <!-- Tips section -->
        <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">
          <div class="flex items-center gap-2 mb-4">
            <span class="text-xl">💡</span>
            <h3 class="font-bold text-gray-900" x-text="lang==='es' ? 'Tips para sacar el máximo partido' : 'Tips to get the most out of Nadia'"></h3>
          </div>
          <ul class="space-y-3">
            <li class="flex items-start gap-3">
              <span class="w-5 h-5 flex-shrink-0 bg-gray-200 rounded-full flex items-center justify-center text-gray-700 font-bold text-xs mt-0.5">1</span>
              <p class="text-sm text-gray-700" x-text="lang==='es' ? 'Sé específico/a: cuanto más contexto des, mejor podrá ayudarte a encontrar soluciones relevantes.' : 'Be specific: the more context you give, the better Nadia can help you find relevant solutions.'"></p>
            </li>
            <li class="flex items-start gap-3">
              <span class="w-5 h-5 flex-shrink-0 bg-gray-200 rounded-full flex items-center justify-center text-gray-700 font-bold text-xs mt-0.5">2</span>
              <p class="text-sm text-gray-700" x-text="lang==='es' ? 'Comparte tus resultados del assessment para personalizar las respuestas a tu perfil de liderazgo.' : 'Share your assessment results to personalise responses to your leadership profile.'"></p>
            </li>
            <li class="flex items-start gap-3">
              <span class="w-5 h-5 flex-shrink-0 bg-gray-200 rounded-full flex items-center justify-center text-gray-700 font-bold text-xs mt-0.5">3</span>
              <p class="text-sm text-gray-700" x-text="lang==='es' ? 'Úsala antes de conversaciones importantes para prepararte, estructurar tu mensaje y anticipar reacciones.' : 'Use it before important conversations to prepare, structure your message and anticipate reactions.'"></p>
            </li>
          </ul>
        </div>

        <!-- Final CTA -->
        <div class="bg-gradient-to-r from-gray-800 to-gray-700 rounded-2xl p-8 text-white text-center">
          <p class="text-2xl font-extrabold mb-2" x-text="lang==='es' ? '¿Listo/a para empezar?' : 'Ready to start?'"></p>
          <p class="text-purple-200 text-sm mb-6" x-text="lang==='es' ? 'Nadia está disponible ahora mismo para acompañarte en tu journey de liderazgo.' : 'Nadia is available right now to support you on your leadership journey.'"></p>
          <a
            href="#"
            class="inline-block bg-white text-gray-700 font-bold rounded-xl px-10 py-3.5 hover:bg-gray-50 transition-colors text-sm shadow-lg"
            x-text="lang==='es' ? 'EMPEZAR CONVERSACIÓN CON NADIA →' : 'START CONVERSATION WITH NADIA →'"
          ></a>
        </div>

      </div>

      <!-- SIDEBAR -->
      <aside class="w-56 flex-shrink-0 space-y-4">
        <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 space-y-3">
          <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest" x-text="lang==='es' ? 'Accesos rápidos' : 'Quick access'"></p>
          <a href="nadia.html" class="block w-full text-center bg-gray-800 text-white text-sm font-semibold rounded-xl px-4 py-2.5 hover:bg-gray-700 transition-colors" x-text="lang==='es' ? '→ Conéctate a Nadia' : '→ Connect to Nadia'"></a>
          <div class="space-y-2 pt-1">
            <a href="journey.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span x-text="lang==='es' ? 'Ver tu Journey' : 'Your Journey'"></span></a>
            <a href="agenda.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span x-text="lang==='es' ? 'Ver Agenda' : 'View Agenda'"></span></a>
            <a href="#" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span x-text="lang==='es' ? 'Descargar agenda' : 'Download agenda'"></span></a>
          </div>
          <hr class="border-gray-200" />
          <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Partners</p>
          <div class="space-y-2">
            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span>Korn Ferry</span></a>
            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span>Universitas</span></a>
            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span>WALK</span></a>
            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 transition-colors"><span class="text-gray-800 font-bold">→</span><span>People Excellence</span></a>
          </div>
        </div>

        <!-- Nadia info card -->
        <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 space-y-2">
          <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Nadia AI</p>
          <p class="text-xs text-gray-600 leading-relaxed" x-text="lang==='es' ? 'Basada en los marcos de liderazgo del programa. Disponible 24/7.' : 'Built on the program leadership frameworks. Available 24/7.'"></p>
          <p class="text-xs text-gray-400" x-text="lang==='es' ? 'Powered by People Excellence' : 'Powered by People Excellence'"></p>
        </div>
      </aside>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-white">
    <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col sm:flex-row items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-6 h-6 bg-gray-800 rounded-full flex items-center justify-center"><svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
        <span class="text-sm text-gray-300">Accelerate Impact Leadership Program</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="mailto:accelerateimpact@universitas.com" class="text-sm text-gray-400 hover:text-white transition-colors" x-text="lang==='es' ? 'Contacto' : 'Contact'"></a>
        <span class="text-gray-600">|</span>
        <div class="flex items-center gap-1.5">
          <button @click="lang='es'" :class="lang==='es' ? 'text-white font-bold' : 'text-gray-400'" class="text-xs hover:text-white transition-colors">ES</button>
          <span class="text-gray-600 text-xs">|</span>
          <button @click="lang='en'" :class="lang==='en' ? 'text-white font-bold' : 'text-gray-400'" class="text-xs hover:text-white transition-colors">EN</button>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
