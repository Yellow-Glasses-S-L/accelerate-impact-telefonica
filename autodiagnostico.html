    /* ── ICEBERG INTERACTIVE MARKERS ── */
    .iceberg-marker {
      position: relative; display: block; width: 18px; height: 18px;
      cursor: pointer; border: 0; padding: 0; background: transparent;
    }
    .marker-core {
      position: absolute; inset: 0; border-radius: 50%;
      background: #0066FF;
      border: 1px solid #fff;
      box-sizing: border-box;
      box-shadow: 0 0 18px rgba(0,102,255,0.85);
      transition: transform 0.25s ease;
    }
    .iceberg-marker:hover .marker-core,
    .iceberg-marker.active .marker-core { transform: scale(1.35); }
    .marker-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid rgba(0,102,255,0.7);
      animation: markerPulse 2.6s ease-out infinite;
    }
    .marker-ring-2 { animation-delay: 1.3s; }
    @keyframes markerPulse {
      0%   { transform: scale(1);   opacity: 0.85; }
      100% { transform: scale(4.2); opacity: 0; }
    }
    .marker-label {
      position: absolute; top: 50%; left: 100%;
      transform: translateY(-50%);
      display: flex; align-items: center;
      pointer-events: none; white-space: nowrap;
    }
    .marker-line {
      display: block; width: 56px; height: 1px;
      background: linear-gradient(to right, rgba(0,102,255,0.75), rgba(255,255,255,0.35));
      margin-left: 14px;
    }
    .marker-label-text {
      margin-left: 14px;
      font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 0 14px rgba(2,9,20,0.7);
    }
    .marker-card {
      position: absolute; top: 50%; left: 100%;
      transform: translateY(-50%);
      margin-left: 96px;
      width: 320px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px);
      border-radius: 0;
      padding: 0; overflow: hidden;
      box-shadow: 0 18px 56px rgba(2,9,20,0.45), 0 0 0 1px rgba(0,102,255,0.18);
      z-index: 30;
    }
    /* Variante: abrir hacia la izquierda */
    .marker-card.marker-card-left {
      left: auto; right: 100%;
      margin-left: 0; margin-right: 96px;
    }
    /* Variante: abrir hacia arriba-derecha (para markers cercanos al borde inferior) */
    .marker-card.marker-card-up {
      top: auto; bottom: 100%;
      transform: translateY(0);
      margin-bottom: 12px;
    }
    .marker-card-img {
      position: relative; width: 100%; aspect-ratio: 16 / 9;

    }

      position: absolute; inset: 0;

  <script>
    (function () {
      var v = document.getElementById('autodiag-hero-video');
      if (!v) return;
      v.muted = true;
      v.play().catch(function () {});
      var lastTs = null;
      function reverse(ts) {
        if (lastTs === null) lastTs = ts;
        var dt = (ts - lastTs) / 1000;
        lastTs = ts;
        v.currentTime = Math.max(0, v.currentTime - dt);
        if (v.currentTime <= 0.05) {
          lastTs = null;
          v.currentTime = 0;
          v.play().catch(function () {});
        } else {
          requestAnimationFrame(reverse);
        }
      }
      v.addEventListener('ended', function () {
        lastTs = null;
        requestAnimationFrame(reverse);
      });
    })();
  </script>
