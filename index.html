<!DOCTYPE html>
<html lang="es" x-data="{

  page: 'home',
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#0B2739', light: '#E8F0FF' },

          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }

        en: 'Your personal AI Leadership Coach'
      },
      card_info_title: { es: 'Más información', en: 'More information' },
      card_info_sub: {
        es: 'Partners, facilitadores y más',
        en: 'Partners, facilitators and more'
      },
      banner_title: {
        es: 'Conoce a tus compañeros',
        en: 'Meet your colleagues'
      },
      banner_sub: {
        es: 'Conéctate con el resto del Top 200 en Teams',
        en: 'Connect with the Top 200 in Microsoft Teams'

</head>
<body class="flex flex-col min-h-screen bg-gray-50 font-sans antialiased">

  <!-- HEADER -->

      <div class="flex items-center gap-3">

          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <span class="font-bold text-tef-dark text-sm hidden sm:block">Accelerate Impact</span>
      </div>
      <nav class="hidden md:flex items-center gap-0.5 text-sm">
        <a href="index.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='home' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'" x-text="t('nav_home')"></a>
        <a href="modelo.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='modelo' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'" x-text="t('nav_modelo')"></a>
        <a href="journey.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='journey' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'" x-text="t('nav_journey')"></a>
        <a href="autodiagnostico.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='auto' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'" x-text="t('nav_auto')"></a>
        <a href="agenda.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='agenda' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'" x-text="t('nav_agenda')"></a>
        <a href="nadia.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='nadia' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'">Nadia</a>
        <a href="info.html" class="px-3 py-1.5 rounded-lg transition-colors font-medium" :class="page==='info' ? 'text-tef-blue bg-tef-light font-semibold' : 'text-gray-600 hover:text-tef-blue hover:bg-tef-light'" x-text="t('nav_info')"></a>
      </nav>
      <div class="flex items-center gap-1 border border-gray-200 rounded-full px-1 py-0.5">
        <button @click="lang='es'" :class="lang==='es' ? 'bg-tef-blue text-white' : 'text-gray-400 hover:text-gray-600'" class="text-xs font-bold px-2.5 py-1 rounded-full transition-colors">ES</button>
        <button @click="lang='en'" :class="lang==='en' ? 'bg-tef-blue text-white' : 'text-gray-400 hover:text-gray-600'" class="text-xs font-bold px-2.5 py-1 rounded-full transition-colors">EN</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1">

    <!-- HERO -->
    <section class="bg-gradient-to-br from-tef-dark to-tef-blue text-white">
      <div class="max-w-7xl mx-auto px-6 py-16 md:py-24">
        <div class="max-w-3xl">
          <!-- Badge -->
          <div class="inline-flex items-center gap-2 bg-white/15 backdrop-blur-sm border border-white/25 rounded-full px-4 py-1.5 mb-6">
            <span class="w-2 h-2 rounded-full bg-prog-gold"></span>
            <span class="text-sm font-semibold tracking-wide" x-text="t('hero_badge')"></span>
          </div>

          <!-- Title -->
          <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold leading-tight mb-4 font-sans" x-text="t('hero_title')"></h1>
          <p class="text-xl md:text-2xl text-blue-100 font-medium mb-10" x-text="t('hero_subtitle')"></p>

          <!-- Phase indicator -->
          <div class="flex items-center gap-0 flex-wrap sm:flex-nowrap">
            <!-- Phase 1: ASSESS (active) -->
            <div class="flex flex-col items-center">

                <span class="text-tef-blue font-extrabold text-xs">1</span>
              </div>
              <span class="mt-2 text-xs font-bold text-white tracking-wider" x-text="t('phase_assess')"></span>
            </div>
            <!-- Connector -->

            <!-- Phase 2: ACTIVATE -->
            <div class="flex flex-col items-center">
              <div class="w-10 h-10 rounded-full bg-white/20 border-2 border-white/40 flex items-center justify-center">
                <span class="text-white font-extrabold text-xs">2</span>
              </div>
              <span class="mt-2 text-xs font-bold text-white/70 tracking-wider" x-text="t('phase_activate')"></span>
            </div>
            <!-- Connector -->
            <div class="flex-1 h-0.5 bg-white/30 mx-2 mt-[-18px] min-w-[40px]"></div>
            <!-- Phase 3: DRIVE ACTION -->
            <div class="flex flex-col items-center">
              <div class="w-10 h-10 rounded-full bg-white/20 border-2 border-white/40 flex items-center justify-center">
                <span class="text-white font-extrabold text-xs">3</span>
              </div>
              <span class="mt-2 text-xs font-bold text-white/70 tracking-wider" x-text="t('phase_drive')"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- MAIN CONTENT + SIDEBAR -->
    <div class="flex gap-6 max-w-7xl mx-auto px-6 py-8 items-start">

      <!-- MAIN COLUMN -->
      <div class="flex-1 min-w-0 space-y-8">

        <!-- EXPLORE SECTION -->
        <section>
          <h2 class="text-xl font-bold text-tef-dark mb-5" x-text="t('explore_title')"></h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

              <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center">

              <div class="flex-1">
                <h3 class="font-bold text-gray-900 mb-1" x-text="t('card_journey_title')"></h3>
                <p class="text-sm text-gray-500 leading-snug" x-text="t('card_journey_sub')"></p>
              </div>
              <span class="text-green-600 font-bold text-sm group-hover:translate-x-1 transition-transform inline-block">→</span>
            </a>

            <!-- Card 3: Autodiagnóstico -->
            <a href="autodiagnostico.html" class="group bg-orange-50 border border-orange-200 rounded-2xl p-5 flex flex-col gap-3 hover:scale-105 hover:shadow-md transition-all duration-200 cursor-pointer">
              <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center">
                <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
              </div>

                <p class="text-sm text-gray-500 leading-snug" x-text="t('card_auto_sub')"></p>
              </div>
              <span class="text-orange-600 font-bold text-sm group-hover:translate-x-1 transition-transform inline-block">→</span>

              </div>
              <div class="flex-1">
                <h3 class="font-bold text-gray-900 mb-1" x-text="t('card_agenda_title')"></h3>
                <p class="text-sm text-gray-500 leading-snug" x-text="t('card_agenda_sub')"></p>
              </div>
              <span class="text-blue-600 font-bold text-sm group-hover:translate-x-1 transition-transform inline-block">→</span>

              </div>
              <span class="text-white font-bold text-sm group-hover:translate-x-1 transition-transform inline-block">→</span>
            </a>

            <a href="info.html" class="group bg-amber-50 border border-amber-200 rounded-2xl p-5 flex flex-col gap-3 hover:scale-105 hover:shadow-md transition-all duration-200 cursor-pointer">
              <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center">
                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

              <div class="flex-1">

              </div>
              <span class="text-amber-600 font-bold text-sm group-hover:translate-x-1 transition-transform inline-block">→</span>

          </div>
        </section>

        <!-- BANNER: Conoce a tus compañeros -->
        <section class="bg-tef-light border border-blue-200 rounded-2xl p-6 flex flex-col sm:flex-row items-center gap-5">

            <p class="text-sm text-gray-500" x-text="t('banner_sub')"></p>

        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 space-y-3">

          <div class="space-y-2 pt-1">
            <a href="journey.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-tef-blue transition-colors group">
              <span class="text-tef-blue font-bold">→</span>
              <span x-text="t('journey_link')"></span>
            </a>
            <a href="agenda.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-tef-blue transition-colors">

              <span x-text="t('agenda_link')"></span>
            </a>
            <a href="#" class="flex items-center gap-2 text-sm text-gray-600 hover:text-tef-blue transition-colors">

              <span x-text="t('dl_agenda')"></span>
            </a>
          </div>
          <hr class="border-amber-200" />

            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-tef-blue transition-colors"><span class="text-tef-blue font-bold">→</span><span>Universitas</span></a>
            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-tef-blue transition-colors"><span class="text-tef-blue font-bold">→</span><span>WALK</span></a>
            <a href="info.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-tef-blue transition-colors"><span class="text-tef-blue font-bold">→</span><span>People Excellence</span></a>

    <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col sm:flex-row items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-6 h-6 bg-tef-blue rounded-full flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>

        <span class="text-gray-600">|</span>
        <div class="flex items-center gap-1.5">
          <button @click="lang='es'" :class="lang==='es' ? 'text-white font-bold' : 'text-gray-400'" class="text-xs hover:text-white transition-colors">ES</button>
          <span class="text-gray-600 text-xs">|</span>
          <button @click="lang='en'" :class="lang==='en' ? 'text-white font-bold' : 'text-gray-400'" class="text-xs hover:text-white transition-colors">EN</button>

</body>
</html>
