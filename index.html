<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'home',
  disclaimerSeen: localStorage.getItem('disclaimerSeen') === '1',
  cohortOpen: false,
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  acceptDisclaimer() {
    localStorage.setItem('disclaimerSeen', '1');
    this.disclaimerSeen = true;
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accelerate Impact — Telefónica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"Telefonica Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light_Italic.woff2') format('woff2'); font-weight: 300; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

    *, *::before, *::after { font-family: "Telefonica Sans", sans-serif !important; }
    body, p, span, a, li, td, th, label, input, button, textarea, select { font-family: "Telefonica Sans", sans-serif !important; }
    body { font-feature-settings: "cv11", "ss01"; }

    /* Fondos oficiales toolkit Telefónica */
    .bg-tef-gradient-dark { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-tef-gradient-white { background: linear-gradient(180deg, #F7F7FF 0%, #ECEEF7 50%, #F7F7FF 100%); }

    /* Animaciones */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
    .reveal-1 { animation-delay: 0.1s; }
    .reveal-2 { animation-delay: 0.25s; }
    .reveal-3 { animation-delay: 0.4s; }
    .reveal-4 { animation-delay: 0.55s; }

    @keyframes dashflow { to { stroke-dashoffset: -140; } }
    .path-breathe { animation: dashflow 18s linear infinite; }

    @keyframes orbital-spin { to { transform: rotate(360deg); } }
    .orbital-spin { animation: orbital-spin 22s linear infinite; transform-origin: center; }
    .orbital-spin-rev { animation: orbital-spin 26s linear infinite reverse; transform-origin: center; }

    @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .drift { animation: drift 6s ease-in-out infinite; }
    .drift-delayed { animation: drift 6s ease-in-out infinite; animation-delay: -3s; }

    @media (prefers-reduced-motion: reduce) {
      .path-breathe, .orbital-spin, .orbital-spin-rev, .drift, .drift-delayed, .reveal { animation: none; }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    const i18n = {
      /* NAV */
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },

      /* HERO It's on Us */
      hero_eyebrow: { es: 'Programa de liderazgo · 2026', en: 'Leadership program · 2026' },
      sub_its: { es: 'Damos lo mejor de nosotros mismos', en: 'Give your best.' },
      sub_on:  { es: 'Cuestionamos nuestros propios límites', en: 'Challenge your limits.' },
      sub_us:  { es: 'Nos superamos juntos', en: 'Rise together.' },

      val_time:    { es: 'El momento del cliente es ahora',     en: 'Customer time is now' },
      val_excel:   { es: 'La excelencia es nuestro estándar',   en: 'Excellence is our standard' },
      val_curio:   { es: 'La curiosidad impulsa la innovación', en: 'Curiosity drives innovation' },
      val_clarity: { es: 'La claridad guía decisiones valientes', en: 'Clarity leads to bold decisions' },
      val_results: { es: 'El resultado depende de nosotros',    en: 'Results depend on us' },
      val_growth:  { es: 'El crecimiento construye futuro',     en: "People's growth builds our future" },

      program_eyebrow: { es: 'El programa que lo hace real', en: 'The program that makes it real' },
      program_lead: {
        es: 'Un programa de liderazgo estratégico para la comunidad de líderes de Telefónica. Diez meses. Un compromiso: superarnos juntos.',
        en: "A strategic leadership program for Telefónica's leadership community. Ten months. One commitment: to rise together."
      },

      /* 4 BLOQUES */
      b_why_label:  { es: 'Por qué ahora', en: 'Why now' },
      b_why_title:  { es: 'Un nuevo capítulo ha empezado', en: 'A new chapter has begun' },
      b_why_body:   {
        es: 'Con Transform & Grow, Telefónica ha marcado una dirección clara hacia el futuro. El presente nos reta, y este programa existe para que nuestro liderazgo esté a la altura de esa nueva ambición.',
        en: 'With Transform & Grow, Telefónica has set a clear direction for the future. The present challenges us, and this program exists so our leadership rises to that ambition.'
      },

      b_how_label:  { es: 'Cómo lo conseguimos', en: 'How we get there' },
      b_how_title:  { es: 'Un modelo de liderazgo, seis conductas', en: 'One leadership model, six behaviours' },
      b_how_body:   {
        es: 'Tres actitudes, dos valores por actitud, seis conductas observables. Un lenguaje común que convierte la cultura de Telefónica en decisiones diarias.',
        en: 'Three attitudes, two values each, six observable behaviours. A common language that turns Telefónica culture into daily decisions.'

      b_what_label: { es: 'Qué es Accelerate Impact', en: 'What is Accelerate Impact' },
      b_what_title: { es: 'No es un curso. Es una pausa estratégica.', en: 'Not a course. A strategic pause.' },
      b_what_body:  {
        es: 'Un espacio para reconectar con lo que importa, fortalecer el liderazgo que Telefónica necesita hoy, y responder con confianza a las tensiones del presente: performance y transformación, cross-boundary, confianza, decisiones mejores.',
        en: 'A space to reconnect with what matters, strengthen the leadership Telefónica needs now, and respond with confidence to the tensions of today: performance and transformation, cross-boundary work, trust, better decisions.'
      },

      b_exp_label:  { es: 'Qué puedes esperar', en: 'What you can expect' },
      b_exp_title:  { es: 'Inmersivo, humano, exigente', en: 'Immersive, human, demanding' },
      b_exp_body:   {
        es: 'Experiencia inmersiva lejos del aula tradicional. Tiempo para pensar tu impacto. Herramientas prácticas. Peer challenge. Un viaje que exige, que energiza y que cambia la conducta — no sólo la información.',
        en: 'An immersive experience far from the traditional classroom. Time to think about your impact. Practical tools. Peer challenge. A journey that is demanding and energizing, designed to change behaviour — not just transfer information.'
      },

      /* TRACK */
      track_eyebrow: { es: 'Tu viaje', en: 'Your journey' },
      track_title_1: { es: 'Cuatro paradas,', en: 'Four stops,' },
      track_title_2: { es: 'un solo programa.', en: 'one program.' },

      n1_meta: { es: 'Virtual · 4 semanas antes', en: 'Virtual · 4 weeks before' },
      n1_title: { es: 'Sesión de bienvenida', en: 'Welcome Session' },
      n1_body: { es: 'Conoce el programa y a tu cohorte antes de empezar.', en: 'Meet the program and your cohort before kick-off.' },

      n2_meta: { es: '1 semana antes de ALW', en: '1 week before ALW' },
      n2_title: { es: 'Autodiagnóstico', en: 'Self-Diagnosis' },
      n2_body: { es: 'Tres cuestionarios Korn Ferry, dos informes personales.', en: 'Three Korn Ferry assessments, two personal reports.' },
      n2_cta: { es: 'Empezar', en: 'Start' },

      n3_meta: { es: 'RESIDENCIAL · UNIVERSITAS', en: 'RESIDENTIAL · UNIVERSITAS' },
      n3_title: { es: 'Action Learning Week', en: 'Action Learning Week' },
      n3_body: { es: 'Tres días residenciales: el corazón del programa.', en: 'Three residential days: the heart of the program.' },
      n3_cta: { es: 'Ver agenda', en: 'See agenda' },

      n4_meta: { es: 'ONLINE · 4 SESIONES', en: 'ONLINE · 4 SESSIONS' },
      n4_title: { es: 'Sesiones con Nadia', en: 'Nadia Sessions' },
      n4_body: { es: 'Tu AI Coach te acompaña durante toda la semana.', en: 'Your AI Coach supports you through the week.' },

      /* NADIA */
      nadia_eyebrow: { es: 'Siempre contigo', en: 'Always with you' },
      nadia_title_1: { es: 'Tu', en: 'Your' },
      nadia_title_2: { es: 'AI Coach.', en: 'AI Coach.' },
      nadia_body: { es: 'Nadia es tu AI Leadership Coach personal. Conversa cuando quieras, desde donde estés.', en: 'Nadia is your personal AI Leadership Coach. Talk to her anytime, from anywhere.' },
      nadia_cta: { es: 'Conectar con Nadia', en: 'Connect with Nadia' },

      /* COHORTES */
      cohort_eyebrow: { es: 'Comunidad', en: 'Community' },
      cohort_title: { es: 'Conecta con tus compañeros', en: 'Connect with your peers' },
      cohort_body: { es: 'Cada cohorte tiene su espacio privado en Microsoft Teams. Elige la tuya.', en: 'Each cohort has its private space in Microsoft Teams. Pick yours.' },
      cohort_cta: { es: 'Elegir cohorte', en: 'Pick cohort' },
      cohort_select: { es: 'Selecciona tu cohorte', en: 'Select your cohort' },

      /* DISCLAIMER */
      disc_title: { es: 'Antes de empezar', en: 'Before you start' },
      disc_body: {
        es: 'Este viaje incluye un autodiagnóstico de liderazgo puramente de desarrollo. Tus resultados individuales sólo son accesibles para ti y el equipo People designado. Los datos agregados preservan la confidencialidad individual. Esto no es una evaluación de desempeño.',
        en: "This journey includes a purely developmental leadership self-diagnosis. Your individual results are only accessible to you and the designated People team. Aggregated data preserves individual confidentiality. This is not a performance evaluation."
      },
      disc_cta: { es: 'Lo entiendo', en: 'I understand' },
      disc_footer: {
        es: '* El autodiagnóstico es confidencial y no evaluativo. Sólo accederás tú y el equipo People designado.',
        en: '* The self-diagnosis is confidential and non-evaluative. Only you and the designated People team have access.'
      }
    };
  </script>
</head>
<body class="flex flex-col min-h-screen bg-paper text-ink font-sans antialiased">

  <!-- HEADER — 4 items -->
  <header id="site-navbar" class="sticky top-0 z-50 bg-paper/90 backdrop-blur-md border-b border-ink/10"></header>

  <!-- DISCLAIMER POP-UP -->
  <div x-show="!disclaimerSeen"
       x-transition.opacity
       class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-tef-dark/60 backdrop-blur-sm"
       style="display:none" x-cloak>
    <div class="max-w-lg w-full bg-paper rounded-2xl shadow-2xl border border-ink/10 p-8 md:p-10">
      <div class="flex items-center gap-3 mb-4">
        <svg class="w-5 h-6" viewBox="0 0 20 24" fill="#0066FF" aria-hidden="true">
          <circle cx="3" cy="3" r="2.5"/><circle cx="10" cy="3" r="2.5"/><circle cx="17" cy="3" r="2.5"/>
          <circle cx="10" cy="12" r="2.5"/><circle cx="10" cy="21" r="2.5"/>
        </svg>
        <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-mute">Accelerate Impact</p>
      </div>
      <h2 class="font-sans font-normal text-3xl md:text-4xl text-ink leading-tight mb-4" x-text="t('disc_title')"></h2>
      <p class="text-sm text-ink-soft leading-relaxed mb-6" x-text="t('disc_body')"></p>
      <button @click="acceptDisclaimer()"
              class="inline-flex items-center gap-3 px-6 py-3 bg-tef-blue text-white rounded-full text-sm font-medium tracking-wide hover:bg-tef-dark transition-colors group">
        <span x-text="t('disc_cta')"></span>
        <span class="transition-transform group-hover:translate-x-1">→</span>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="flex-1">

    <!-- HERO "It's on Us" -->
    <section class="relative bg-tef-gradient-dark text-paper overflow-hidden">
      <!-- Orbital arcs left — aligned with "It's on Us" title level -->
      <!-- Circle center at (150,170) in 270×340 viewBox. Radii 138/112. Gap opens RIGHT (±45°) -->
      <svg class="absolute left-[14%] top-9 md:top-12 pointer-events-none hidden md:block drift"
           width="270" height="340" viewBox="0 0 270 340" fill="none" aria-hidden="true">
        <!-- Outer white arc r=138 -->
        <path d="M 247.6 72.4 A 138 138 0 1 0 247.6 267.6"
              stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-dasharray="5 9" class="path-breathe"/>
        <!-- Inner blue arc r=112 -->
        <path d="M 229.2 90.8 A 112 112 0 1 0 229.2 249.2"
              stroke="#0066FF" stroke-width="1.5" stroke-dasharray="5 9" opacity="0.65" class="path-breathe" style="animation-delay:-6s"/>
        <circle cx="247.6" cy="72.4"  r="4" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <circle cx="247.6" cy="267.6" r="4" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <circle cx="229.2" cy="90.8"  r="3" fill="#0066FF" opacity="0.7"/>
        <circle cx="229.2" cy="249.2" r="3" fill="#0066FF" opacity="0.7"/>
      </svg>

      <!-- Orbital arcs right — mirror: gap opens LEFT (±45° from west) -->
      <!-- Circle center at (120,170) in 270×340 viewBox -->
      <svg class="absolute right-[14%] top-9 md:top-12 pointer-events-none hidden md:block drift-delayed"
           width="270" height="340" viewBox="0 0 270 340" fill="none" aria-hidden="true">
        <!-- Outer white arc r=138 -->
        <path d="M 22.4 72.4 A 138 138 0 1 1 22.4 267.6"
              stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-dasharray="5 9" class="path-breathe" style="animation-delay:-3s"/>
        <!-- Inner blue arc r=112 -->
        <path d="M 40.8 90.8 A 112 112 0 1 1 40.8 249.2"
              stroke="#0066FF" stroke-width="1.5" stroke-dasharray="5 9" opacity="0.65" class="path-breathe" style="animation-delay:-9s"/>
        <circle cx="22.4" cy="72.4"   r="4" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <circle cx="22.4" cy="267.6"  r="4" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <circle cx="40.8" cy="90.8"   r="3" fill="#0066FF" opacity="0.7"/>
        <circle cx="40.8" cy="249.2"  r="3" fill="#0066FF" opacity="0.7"/>
      </svg>

      <div class="relative max-w-7xl mx-auto px-6 md:px-10 pt-16 pb-24 md:pt-20 md:pb-28">
        <!-- Eyebrow -->
        <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-paper/50 text-center mb-10 reveal" x-text="t('hero_eyebrow')"></p>

        <!-- Claim "It's on Us" -->
        <div class="grid grid-cols-3 gap-4 md:gap-8 items-end mb-10">
          <div class="text-center reveal reveal-1">
            <h1 class="font-sans font-normal leading-none hover:text-tef-blue transition-colors duration-300 cursor-default" style="font-size: clamp(4rem, 10vw, 10rem);">It's</h1>
          </div>
          <div class="text-center reveal reveal-2">
            <h1 class="font-sans font-normal leading-none hover:text-tef-blue transition-colors duration-300 cursor-default" style="font-size: clamp(4rem, 10vw, 10rem);">on</h1>
          </div>
          <div class="text-center reveal reveal-3">
            <h1 class="font-sans font-normal leading-none hover:text-tef-blue transition-colors duration-300 cursor-default" style="font-size: clamp(4rem, 10vw, 10rem);">Us</h1>
          </div>
        </div>

        <!-- 3 Subtítulos -->
        <div class="grid grid-cols-3 gap-4 md:gap-8 mb-16 md:mb-20">
          <p class="text-center text-sm md:text-lg lg:text-xl font-normal leading-snug px-2 reveal reveal-2" x-text="t('sub_its')"></p>
          <p class="text-center text-sm md:text-lg lg:text-xl font-normal leading-snug px-2 reveal reveal-3" x-text="t('sub_on')"></p>
          <p class="text-center text-sm md:text-lg lg:text-xl font-normal leading-snug px-2 reveal reveal-4" x-text="t('sub_us')"></p>
        </div>

        <!-- 6 Valores -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-10 reveal reveal-4">
          <div class="space-y-5">
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9 md:w-10 md:h-10 flex-shrink-0 text-paper/90" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
                <circle cx="20" cy="20" r="16"/>
                <path d="M20 12v8l5 3" stroke-linecap="round"/>
              </svg>
              <p class="text-sm md:text-base leading-snug text-paper/90" x-text="t('val_time')"></p>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9 md:w-10 md:h-10 flex-shrink-0 text-paper/90" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
                <circle cx="20" cy="20" r="16"/>
                <path d="M20 12l2.4 5 5.5.8-4 3.9.9 5.5-4.8-2.5-4.8 2.5.9-5.5-4-3.9 5.5-.8z" stroke-linejoin="round"/>
              </svg>
              <p class="text-sm md:text-base leading-snug text-paper/90" x-text="t('val_excel')"></p>
            </div>
          </div>
          <div class="space-y-5">
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9 md:w-10 md:h-10 flex-shrink-0 text-paper/90" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
                <circle cx="20" cy="20" r="16"/>
                <circle cx="18" cy="18" r="3"/>
                <path d="M20.5 20.5L25 25" stroke-linecap="round"/>
              </svg>
              <p class="text-sm md:text-base leading-snug text-paper/90" x-text="t('val_curio')"></p>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9 md:w-10 md:h-10 flex-shrink-0 text-paper/90" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
                <circle cx="20" cy="20" r="16"/>
                <circle cx="20" cy="20" r="6"/>
                <circle cx="20" cy="20" r="1.5" fill="currentColor"/>
              </svg>
              <p class="text-sm md:text-base leading-snug text-paper/90" x-text="t('val_clarity')"></p>
            </div>
          </div>
          <div class="space-y-5">
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9 md:w-10 md:h-10 flex-shrink-0 text-paper/90" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
                <circle cx="20" cy="20" r="16"/>
                <path d="M14 20l4 4 8-8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="text-sm md:text-base leading-snug text-paper/90" x-text="t('val_results')"></p>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-9 h-9 md:w-10 md:h-10 flex-shrink-0 text-paper/90" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
                <circle cx="20" cy="20" r="16"/>
                <path d="M20 27c-4-3-7-5.5-7-9 0-2.2 1.8-4 4-4 1.3 0 2.4.6 3 1.6.6-1 1.7-1.6 3-1.6 2.2 0 4 1.8 4 4 0 3.5-3 6-7 9z"/>
                <circle cx="17.5" cy="22" r=".6" fill="currentColor"/>
                <circle cx="20" cy="22" r=".6" fill="currentColor"/>
                <circle cx="22.5" cy="22" r=".6" fill="currentColor"/>
                <circle cx="18.75" cy="24" r=".6" fill="currentColor"/>
                <circle cx="21.25" cy="24" r=".6" fill="currentColor"/>
                <circle cx="20" cy="26" r=".6" fill="currentColor"/>
              </svg>
              <p class="text-sm md:text-base leading-snug text-paper/90" x-text="t('val_growth')"></p>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- 4 BLOQUES WHY / HOW / WHAT / EXPECT -->
    <section class="bg-paper py-20 md:py-28">
      <div class="max-w-7xl mx-auto px-6 md:px-10">

        <!-- Encabezado de sección -->
        <div class="text-center mb-16 md:mb-20">
          <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-tef-blue mb-4" x-text="t('program_eyebrow')"></p>
          <h2 class="font-sans font-normal text-4xl md:text-6xl lg:text-7xl tracking-tight text-ink mb-6">Accelerate Impact</h2>
          <div class="mx-auto w-16 h-px bg-ink/15 mb-6"></div>
          <p class="max-w-2xl mx-auto text-base md:text-lg font-normal text-ink-soft leading-relaxed" x-text="t('program_lead')"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 md:gap-x-16 gap-y-16 md:gap-y-20">

          <!-- WHY -->
          <article class="relative">
            <div class="flex items-center gap-3 mb-5">
              <span class="font-mono text-[10px] tracking-[0.25em] uppercase text-tef-blue">01 / Why</span>
              <span class="flex-1 h-px bg-ink/10"></span>
            </div>
