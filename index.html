<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'home',
  disclaimerSeen: localStorage.getItem('disclaimerSeen') === '1',
  cohortOpen: false,
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  acceptDisclaimer() {
    localStorage.setItem('disclaimerSeen', '1');
    this.disclaimerSeen = true;
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accelerate Impact — Telefónica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"Telefonica Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light_Italic.woff2') format('woff2'); font-weight: 300; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

    *, *::before, *::after { font-family: "Telefonica Sans", sans-serif !important; }
    body, p, span, a, li, td, th, label, input, button, textarea, select { font-family: "Telefonica Sans", sans-serif !important; }
    body { font-feature-settings: "cv11", "ss01"; }

    /* Fondos oficiales toolkit Telefónica */
    .bg-tef-gradient-dark { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-tef-gradient-white { background: linear-gradient(180deg, #F7F7FF 0%, #ECEEF7 50%, #F7F7FF 100%); }

    /* Animaciones */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
    .reveal-1 { animation-delay: 0.1s; }
    .reveal-2 { animation-delay: 0.25s; }
    .reveal-3 { animation-delay: 0.4s; }
    .reveal-4 { animation-delay: 0.55s; }

    @keyframes dashflow { to { stroke-dashoffset: -140; } }
    .path-breathe { animation: dashflow 18s linear infinite; }

    @keyframes orbital-spin { to { transform: rotate(360deg); } }
    .orbital-spin { animation: orbital-spin 22s linear infinite; transform-origin: center; }
    .orbital-spin-rev { animation: orbital-spin 26s linear infinite reverse; transform-origin: center; }

    @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .drift { animation: drift 6s ease-in-out infinite; }
    .drift-delayed { animation: drift 6s ease-in-out infinite; animation-delay: -3s; }

    @media (prefers-reduced-motion: reduce) {
      .path-breathe, .orbital-spin, .orbital-spin-rev, .drift, .drift-delayed, .reveal { animation: none; }
    }

    /* Fondo oscuro continuo — compartido por intro + hero (sin seams) */
    .intro-hero,
    .hero-sequential {
      background: #020914;
      position: relative;
    }
    .intro-hero { min-height: 100vh; overflow: hidden; }

    /* Glow atmosférico fixed al viewport — visible solo detrás de secciones oscuras */
    .dark-atmosphere {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80vw 60vh at 50% 30%, rgba(0,102,255,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 70vw 55vh at 50% 80%, rgba(0,102,255,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .dark-atmosphere.visible { opacity: 1; }
    .intro-hero::before {
      content:""; position:absolute; inset:0; pointer-events:none;
      background-image:
        radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 24% 62%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 38% 28%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.2px 1.2px at 47% 78%, rgba(255,255,255,0.65), transparent),
        radial-gradient(1.5px 1.5px at 58% 12%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 66% 48%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.2px 1.2px at 72% 82%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1.5px 1.5px at 83% 34%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 92% 68%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,0.5), transparent);
      opacity: 0.8;
    }
    /* Three parallax starfield layers — near/mid/far (handled by data-parallax) */
    .stars-far, .stars-mid, .stars-near { position:absolute; inset:-10% -5%; pointer-events:none; }
    .stars-far {
      background-image:
        radial-gradient(0.8px 0.8px at 3% 12%, rgba(255,255,255,0.35), transparent),
        radial-gradient(0.8px 0.8px at 17% 38%, rgba(255,255,255,0.3), transparent),
        radial-gradient(0.8px 0.8px at 28% 8%, rgba(255,255,255,0.4), transparent),
        radial-gradient(0.8px 0.8px at 52% 52%, rgba(255,255,255,0.25), transparent),
        radial-gradient(0.8px 0.8px at 71% 18%, rgba(255,255,255,0.35), transparent),
        radial-gradient(0.8px 0.8px at 85% 72%, rgba(255,255,255,0.3), transparent),
        radial-gradient(0.8px 0.8px at 94% 46%, rgba(255,255,255,0.4), transparent);
      opacity: 0.55;
    }
    .stars-mid {
      background-image:
        radial-gradient(1.1px 1.1px at 9% 54%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1.1px 1.1px at 23% 22%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.1px 1.1px at 41% 74%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.1px 1.1px at 62% 36%, rgba(255,255,255,0.65), transparent),
        radial-gradient(1.1px 1.1px at 79% 62%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1.1px 1.1px at 88% 26%, rgba(255,255,255,0.5), transparent);
      opacity: 0.7;
    }
    .stars-near {
      background-image:
        radial-gradient(1.8px 1.8px at 14% 44%, rgba(255,255,255,0.9), transparent),
        radial-gradient(2px 2px at 38% 18%, rgba(0,102,255,0.8), transparent),
        radial-gradient(1.8px 1.8px at 57% 68%, rgba(255,255,255,0.95), transparent),
        radial-gradient(2px 2px at 74% 32%, rgba(0,102,255,0.7), transparent),
        radial-gradient(1.8px 1.8px at 91% 82%, rgba(255,255,255,0.85), transparent);
      opacity: 1;
    }

    /* Big intro title */
    .intro-word {
      font-size: clamp(4.5rem, 15vw, 15rem);
      letter-spacing: -0.04em;
      will-change: transform, opacity, filter;
      cursor: default;
      display: inline-block;
      transition: text-shadow 0.6s ease, letter-spacing 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    /* Hover "sale del recuadro" — escala + tracking + glow azul */
    .intro-hero:not(.is-scrolling) .intro-word:hover {
      letter-spacing: -0.01em;
      text-shadow:
        0 0 80px rgba(0, 102, 255, 0.45),
        0 0 160px rgba(0, 102, 255, 0.25),
        0 0 240px rgba(0, 102, 255, 0.12);
    }
    /* El h1 no recorta overflow para permitir escape tipográfico */
    .intro-hero h1 { overflow: visible !important; }

    /* Scroll line indicator */
    .scroll-line {
      width: 1px; height: 48px;
      background: linear-gradient(180deg, rgba(247,247,255,0.6) 0%, transparent 100%);
      position: relative; overflow: hidden;
    }
    .scroll-line::after {
      content:""; position:absolute; inset:0;
      background: linear-gradient(180deg, #0066FF 0%, transparent 60%);
      animation: scroll-drop 2s ease-in-out infinite;
    }
    @keyframes scroll-drop {
      0%   { transform: translateY(-100%); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(100%); opacity: 0; }
    }

    /* Scroll progress bar (global chrome) */
    .scroll-progress {
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #0066FF 0%, #7FB3FF 100%);
      transform-origin: left center;
      transform: scaleX(0);
      z-index: 60;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .scroll-progress.visible { opacity: 1; }

    /* Navbar adaptativa sobre secciones oscuras */
    #site-navbar {
      transition: background-color 0.35s ease, border-color 0.35s ease, backdrop-filter 0.35s ease;
    }
    #site-navbar.nav-on-dark {
      background: rgba(2, 9, 20, 0.55) !important;
      border-bottom-color: rgba(247, 247, 255, 0.08) !important;
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
    }
    #site-navbar.nav-on-dark img {
      filter: brightness(0) invert(1) opacity(0.95);
      transition: filter 0.35s ease;
    }
    #site-navbar.nav-on-dark nav a,
    #site-navbar.nav-on-dark button { color: rgba(247, 247, 255, 0.72) !important; }
    #site-navbar.nav-on-dark nav a:hover,
    #site-navbar.nav-on-dark button:hover { color: #F7F7FF !important; }
    /* Activo (página actual): texto blanco pleno */
    #site-navbar.nav-on-dark a.text-tef-dark,
    #site-navbar.nav-on-dark button.text-tef-dark { color: #F7F7FF !important; }
    /* Separador "/" entre ES/EN */
    #site-navbar.nav-on-dark span.text-tef-dark\/20 { color: rgba(247,247,255,0.3) !important; background: transparent !important; }
    /* Hamburger lines — SOLO los span del botón mobile */
    #site-navbar.nav-on-dark button[aria-label] span { background-color: rgba(247, 247, 255, 0.85) !important; }

    /* Suave transición dark→paper (zonas de encuentro) */
    .section-fade-top::before {
      content:""; position:absolute; top:0; left:0; right:0; height:120px;
      background: linear-gradient(180deg, rgba(2,9,20,0.15) 0%, transparent 100%);
      pointer-events:none; z-index:1;
    }
    .section-fade-bottom::after {
      content:""; position:absolute; bottom:0; left:0; right:0; height:120px;
      background: linear-gradient(180deg, transparent 0%, rgba(2,9,20,0.18) 100%);
      pointer-events:none; z-index:1;
    }

    /* HERO sequential — hereda fondo del .intro-hero/.hero-sequential shared rule */
    .hero-stage { will-change: transform; }
    .hero-act { will-change: opacity, transform, filter; pointer-events: none; }
    .act-label {
      font-family: 'Telefonica Sans', monospace;
      font-size: 10px; letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(0, 102, 255, 0.75);
    }
    .act-word {
      font-family: 'Telefonica Sans', sans-serif;
      font-size: clamp(5.5rem, 17vw, 17rem);
      font-weight: 400;
      line-height: 0.88;
      letter-spacing: -0.04em;
      color: #F7F7FF;
      margin: 0;
    }
    .act-rule {
      width: 64px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,102,255,0.9) 50%, transparent 100%);
    }
    .act-subtitle {
      font-size: clamp(1.1rem, 1.7vw, 1.75rem);
      font-weight: 300;
      color: rgba(247, 247, 255, 0.9);
      line-height: 1.25;
      max-width: 640px;
      margin: 0 auto;
    }
    .act-value {
      display: flex; align-items: center; gap: 14px;
      text-align: left;
      color: rgba(247, 247, 255, 0.85);
      font-size: 0.95rem;
      line-height: 1.35;
    }
    .act-value svg { width: 32px; height: 32px; flex-shrink: 0; color: rgba(247, 247, 255, 0.7); }
    .hero-dot {
      display: inline-block;
      width: 28px; height: 2px;
      background: rgba(247, 247, 255, 0.2);
      border-radius: 1px;
      transition: background 0.5s ease, width 0.5s ease;
    }
    .hero-dot.is-active { background: #0066FF; width: 44px; }

    /* GLOBE SECTION — starfield + aurora */
    .globe-section {
      background:
        radial-gradient(ellipse at 20% 0%, rgba(0,102,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(0,102,255,0.12) 0%, transparent 50%),
        #020914;
      position: relative;
      overflow: hidden;
    }
    .globe-section::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 24% 62%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 38% 28%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 47% 78%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 58% 12%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 66% 48%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 72% 82%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 83% 34%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 92% 68%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 15% 42%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1.5px 1.5px at 31% 8%, rgba(255,255,255,0.9), transparent);
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.65;
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.4; } to { opacity: 0.8; } }

    #globeViz { width: 100%; height: 640px; cursor: grab; }
    #globeViz:active { cursor: grabbing; }
    #globeViz canvas { background: transparent !important; }

    /* Tooltip personalizado */
    .globe-tooltip {
      background: rgba(2,9,20,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,102,255,0.4);
      color: #F7F7FF;
      padding: 10px 14px;
      font-family: "Telefonica Sans", sans-serif;
      font-size: 13px;
      border-radius: 2px;
      box-shadow: 0 8px 32px rgba(0,102,255,0.25);
    }
    .globe-tooltip .tt-name {
      font-size: 15px; font-weight: 500; margin-bottom: 2px;
    }
    .globe-tooltip .tt-count {
      color: #7FB3FF; font-variant-numeric: tabular-nums;
    }
    .globe-tooltip .tt-hint {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(247,247,255,0.45); margin-top: 6px;
    }

    /* Stats counter */
    @keyframes countUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .count-reveal { animation: countUp 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    /* Legend country chips */
    .country-chip {
      transition: all 0.25s cubic-bezier(0.2, 0.7, 0.2, 1);
      cursor: pointer;
    }
    .country-chip:hover {
      background: rgba(0,102,255,0.12);
      border-color: #0066FF;
      transform: translateY(-1px);
    }
    .country-chip.active {
      background: #0066FF;
      color: #F7F7FF;
      border-color: #0066FF;
    }

    /* Flag pulse ring on the globe dots */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.8; }
      80%,100% { transform: scale(2.2); opacity: 0; }
    }

    /* Globe headline split */
    .globe-title span {
      display: inline-block;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }
    .globe-title span:nth-child(2) { animation-delay: 0.12s; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Globe 3D — Three.js + Globe.gl via CDN -->
  <script defer src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <script defer src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
  <!-- Scroll system — Lenis smooth scroll + GSAP ScrollTrigger -->
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script>
    const i18n = {
      /* NAV */
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },

      /* INTRO cinematográfico */
      intro_eyebrow_left:  { es: 'Telefónica · Comunidad de Líderes', en: 'Telefónica · Leadership Community' },
      intro_eyebrow_right: { es: '2026', en: '2026' },
      intro_title:   { es: 'Bienvenidos a Accelerate Impact.', en: 'Welcome to Accelerate Impact.' },
      intro_sub:     { es: 'El programa de liderazgo que convierte la cultura en acción.',
                       en: 'The leadership program that turns culture into action.' },
      intro_scroll:  { es: 'Desliza para empezar', en: 'Scroll to begin' },

      /* HERO It's on Us */
      hero_eyebrow: { es: 'Programa de liderazgo · 2026', en: 'Leadership program · 2026' },
      sub_its: { es: 'Damos lo mejor de nosotros mismos', en: 'Give your best.' },
      sub_on:  { es: 'Cuestionamos nuestros propios límites', en: 'Challenge your limits.' },
      sub_us:  { es: 'Nos superamos juntos', en: 'Rise together.' },

      val_time:    { es: 'El momento del cliente es ahora',     en: 'Customer time is now' },
      val_excel:   { es: 'La excelencia es nuestro estándar',   en: 'Excellence is our standard' },
      val_curio:   { es: 'La curiosidad impulsa la innovación', en: 'Curiosity drives innovation' },
      val_clarity: { es: 'La claridad guía decisiones valientes', en: 'Clarity leads to bold decisions' },
      val_results: { es: 'El resultado depende de nosotros',    en: 'Results depend on us' },
      val_growth:  { es: 'El crecimiento construye futuro',     en: "People's growth builds our future" },

      program_eyebrow: { es: 'El programa que lo hace real', en: 'The program that makes it real' },
      program_lead: {
        es: 'Un programa de liderazgo estratégico para la comunidad de líderes de Telefónica. Diez meses. Un compromiso: superarnos juntos.',
        en: "A strategic leadership program for Telefónica's leadership community. Ten months. One commitment: to rise together."
      },

      /* 4 BLOQUES */
      b_why_label:  { es: 'Por qué ahora', en: 'Why now' },
      b_why_title:  { es: 'Un nuevo capítulo ha empezado', en: 'A new chapter has begun' },
      b_why_body:   {
        es: 'Con Transform & Grow, Telefónica ha marcado una dirección clara hacia el futuro. El presente nos reta, y este programa existe para que nuestro liderazgo esté a la altura de esa nueva ambición.',
        en: 'With Transform & Grow, Telefónica has set a clear direction for the future. The present challenges us, and this program exists so our leadership rises to that ambition.'
      },

      b_how_label:  { es: 'Cómo lo conseguimos', en: 'How we get there' },
      b_how_title:  { es: 'Un modelo de liderazgo, seis conductas', en: 'One leadership model, six behaviours' },
      b_how_body:   {
        es: 'Tres actitudes, dos valores por actitud, seis conductas observables. Un lenguaje común que convierte la cultura de Telefónica en decisiones diarias.',

      b_what_label: { es: 'Qué es Accelerate Impact', en: 'What is Accelerate Impact' },

      b_what_body:  {

      },

      b_exp_label:  { es: 'Qué puedes esperar', en: 'What you can expect' },
      b_exp_title:  { es: 'Inmersivo, humano, exigente', en: 'Immersive, human, demanding' },
      b_exp_body:   {
        es: 'Experiencia inmersiva lejos del aula tradicional. Tiempo para pensar tu impacto. Herramientas prácticas. Peer challenge. Un viaje que exige, que energiza y que cambia la conducta — no sólo la información.',
        en: 'An immersive experience far from the traditional classroom. Time to think about your impact. Practical tools. Peer challenge. A journey that is demanding and energizing, designed to change behaviour — not just transfer information.'
      },

      /* TRACK */
      track_eyebrow: { es: 'Tu viaje', en: 'Your journey' },

  <!-- GLOBE logic (Alpine component) -->
  <script>
    function globeSection() {
      // Datos dummy de la comunidad de líderes — reemplazables cuando Telefónica pase la lista cerrada
      const countries = [
        { code: 'ES', name: 'Spain',         name_es: 'España',    region: 'Europe',        lat: 40.42, lng: -3.70,  count: 78, url: '#' },
        { code: 'BR', name: 'Brazil',        name_es: 'Brasil',    region: 'Latin America', lat: -15.79, lng: -47.88, count: 32, url: '#' },
        { code: 'DE', name: 'Germany',       name_es: 'Alemania',  region: 'Europe',        lat: 52.52, lng: 13.40,  count: 18, url: '#' },
        { code: 'GB', name: 'United Kingdom',name_es: 'Reino Unido', region: 'Europe',      lat: 51.51, lng: -0.13,  count: 12, url: '#' },
        { code: 'AR', name: 'Argentina',     name_es: 'Argentina', region: 'Latin America', lat: -34.60, lng: -58.38, count: 11, url: '#' },
        { code: 'PE', name: 'Peru',          name_es: 'Perú',      region: 'Latin America', lat: -12.05, lng: -77.04, count: 9,  url: '#' },
        { code: 'CL', name: 'Chile',         name_es: 'Chile',     region: 'Latin America', lat: -33.45, lng: -70.67, count: 8,  url: '#' },
        { code: 'CO', name: 'Colombia',      name_es: 'Colombia',  region: 'Latin America', lat: 4.71,   lng: -74.07, count: 8,  url: '#' },
        { code: 'MX', name: 'Mexico',        name_es: 'México',    region: 'Latin America', lat: 19.43,  lng: -99.13, count: 7,  url: '#' },
        { code: 'EC', name: 'Ecuador',       name_es: 'Ecuador',   region: 'Latin America', lat: -0.18,  lng: -78.47, count: 5,  url: '#' },
        { code: 'UY', name: 'Uruguay',       name_es: 'Uruguay',   region: 'Latin America', lat: -34.90, lng: -56.16, count: 4,  url: '#' },
        { code: 'VE', name: 'Venezuela',     name_es: 'Venezuela', region: 'Latin America', lat: 10.48,  lng: -66.90, count: 4,  url: '#' },
        { code: 'US', name: 'United States', name_es: 'EE. UU.',   region: 'North America', lat: 38.90,  lng: -77.04, count: 4,  url: '#' }
      ];

      return {
        countries,
        active: null,
        stats: { total: 0, countries: 0 },
        _globe: null,
        _animationId: null,
        _targetTotal: 0,
        _targetCountries: 0,

        init() {
          // Compute totals
          this._targetTotal = countries.reduce((s,c) => s + c.count, 0);
          this._targetCountries = countries.length;

          this.$nextTick(() => {
            this.animateStats();
            // Lazy init globe when section enters viewport
            const io = new IntersectionObserver((entries) => {
              entries.forEach(e => {
                if (e.isIntersecting && !this._globe) {
                  this.initGlobe();
                  io.disconnect();
                }
              });
            }, { threshold: 0.1 });
            io.observe(this.$el);
          });
        },

        animateStats() {
          const duration = 1800;
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const ease = 1 - Math.pow(1 - t, 3);
            this.stats.total = Math.round(this._targetTotal * ease);
            this.stats.countries = Math.round(this._targetCountries * ease);
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        },

        initGlobe() {
          if (typeof Globe === 'undefined') {
            // Libs not yet loaded — retry
            setTimeout(() => this.initGlobe(), 200);
            return;
          }

          const el = document.getElementById('globeViz');
          if (!el) return;

          const participantCountries = new Set(this.countries.map(c => c.code));

          // Custom HTML markers (pulse dots) for each country
          const markers = this.countries.map(c => ({
            ...c,
            size: 0.6 + Math.log(c.count + 1) * 0.35
          }));

          const world = Globe()(el)
            .backgroundColor('rgba(0,0,0,0)')
            .showGlobe(true)
            .showAtmosphere(true)
            .atmosphereColor('#0066FF')
            .atmosphereAltitude(0.22)
            .globeImageUrl(null)
            .width(el.clientWidth)
            .height(640);

          // Ocean — deep navy, darker than the section background (#020914)
          const globeMat = world.globeMaterial();
          globeMat.color = new THREE.Color(0x000610);
          globeMat.emissive = new THREE.Color(0x00030a);
          globeMat.emissiveIntensity = 0.12;
          globeMat.shininess = 0.6;

          // Soften directional light so countries read evenly
          const scene = world.scene();
          scene.children.forEach(obj => {
            if (obj.isDirectionalLight) obj.intensity = 0.6;
            if (obj.isAmbientLight) obj.intensity = 0.95;
          });

          // Fetch countries GeoJSON (simplified 110m)
          fetch('ne_110m_countries.geojson')
            .then(r => r.json())
            .then(geo => {
              world
                .polygonsData(geo.features.filter(f => f.properties.ISO_A2 !== 'AQ'))
                .polygonAltitude(feat => {
                  const iso = feat.properties.ISO_A2;
                  return participantCountries.has(iso) ? 0.012 : 0.006;
                })
                .polygonCapColor(feat => {
                  const iso = feat.properties.ISO_A2;
                  if (participantCountries.has(iso)) {
                    const c = this.countries.find(x => x.code === iso);
                    const intensity = Math.min(1, c.count / 80);
                    return `rgba(0, 102, 255, ${0.55 + intensity * 0.35})`;
                  }
                  return 'rgba(247, 247, 255, 0.82)';
                })
                .polygonSideColor(() => 'rgba(0, 20, 60, 0.35)')
                .polygonStrokeColor(() => 'rgba(3, 26, 52, 0.4)')
                .polygonLabel(feat => {
                  const iso = feat.properties.ISO_A2;
                  const c = this.countries.find(x => x.code === iso);
                  if (!c) return '';
                  const nm = this.lang === 'es' ? c.name_es : c.name;
                  const tot = this.lang === 'es' ? 'participantes' : 'participants';
                  const hint = this.lang === 'es' ? 'Clic para abrir' : 'Click to open';
                  return `<div class="globe-tooltip">
                    <div class="tt-name">${nm}</div>
                    <div class="tt-count">${c.count} ${tot}</div>
                    <div class="tt-hint">${hint}</div>
                  </div>`;
                })
                .onPolygonClick(feat => {
                  const iso = feat.properties.ISO_A2;
                  const c = this.countries.find(x => x.code === iso);
                  if (c) this.flyTo(c);
                })
                .onPolygonHover(hoverD => {
                  el.style.cursor = hoverD && participantCountries.has(hoverD.properties.ISO_A2) ? 'pointer' : 'grab';
                });
            })
            .catch(err => console.warn('Globe GeoJSON load failed:', err));

          // Glowing ring markers per participant country
          world
            .ringsData(markers)
            .ringLat('lat').ringLng('lng')
            .ringColor(() => (t) => `rgba(0,102,255,${1 - t})`)
            .ringMaxRadius(d => d.size * 3)
            .ringPropagationSpeed(1.2)
            .ringRepeatPeriod(1800)
            .ringAltitude(0.016);

          // Point labels with count
          world
            .pointsData(markers)
            .pointLat('lat').pointLng('lng')
            .pointColor(() => '#0066FF')
            .pointAltitude(d => 0.018 + d.size * 0.008)
            .pointRadius(d => 0.22 + d.size * 0.08)
            .pointLabel(d => {
              const nm = this.lang === 'es' ? d.name_es : d.name;
              return `<div class="globe-tooltip">
                <div class="tt-name">${nm}</div>
                <div class="tt-count">${d.count} ${this.lang === 'es' ? 'participantes' : 'participants'}</div>
              </div>`;
            })
            .onPointClick(d => this.flyTo(d));

          // Auto-rotate
          const controls = world.controls();
          controls.autoRotate = true;
          controls.autoRotateSpeed = 0.35;
          controls.enableZoom = true;
          controls.minDistance = 200;
          controls.maxDistance = 500;

          // Pause auto-rotate when globe is off-screen (saves CPU)
          const visObs = new IntersectionObserver((entries) => {
            entries.forEach(e => { controls.autoRotate = e.isIntersecting && !this.active; });
          }, { threshold: 0.1 });
          visObs.observe(this.$el);

          // Pause rotation when user interacts
          let userActive = false;
          controls.addEventListener('start', () => {
            userActive = true;
            controls.autoRotate = false;
          });
          controls.addEventListener('end', () => {
            setTimeout(() => {
              if (!this.active) controls.autoRotate = true;
            }, 2500);
          });

          // Initial camera angle — tilted towards Atlantic (Spain + Latam visible)
          // Start zoomed out for cinematic entry
          world.pointOfView({ lat: 20, lng: -30, altitude: 3.6 }, 0);

          // Expose globally so ScrollTrigger can scrub camera altitude
          window.__globeInstance = world;
          window.dispatchEvent(new CustomEvent('globe:ready'));

          // Responsive resize
          const ro = new ResizeObserver(() => {
            world.width(el.clientWidth);
          });
          ro.observe(el);

          this._globe = world;
        },

        flyTo(c) {
          if (!this._globe) return;
          this.active = c;
          this._globe.controls().autoRotate = false;
          this._globe.pointOfView({ lat: c.lat, lng: c.lng, altitude: 1.6 }, 1200);
        }
      };
    }
  </script>

  <script src="components.js"></script>
  <script src="scroll.js"></script>

  <!-- Index-specific cinematic choreography -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (typeof gsap === 'undefined') return;

      // Wait for Alpine to hydrate x-text before animating title
      const run = () => {
        // ── INTRO · load sequence ─────────────────────────
        if (!reduced) {
          const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });
          tl.to('.intro-eyebrow', { opacity: 1, y: 0, duration: 1, ease: 'power2.out' }, 0)
            .from('.intro-eyebrow', { y: 20, duration: 1, ease: 'power2.out' }, 0)
            .to('.intro-word', {
              opacity: 1, duration: 1.8, ease: 'power4.out'
            }, 0.25)
            .from('.intro-word', {
              scale: 1.35, filter: 'blur(26px)', y: 80, duration: 1.8, ease: 'power4.out'
            }, 0.25)
            .to('.intro-sub', { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out' }, 1.1)
            .from('.intro-sub', { y: 26, duration: 1.2, ease: 'power3.out' }, 1.1)
            .to('.intro-scroll', { opacity: 1, y: 0, duration: 0.9 }, 1.8)
            .from('.intro-scroll', { y: -8, duration: 0.9 }, 1.8);
        } else {
          gsap.set('.intro-eyebrow, .intro-word, .intro-sub, .intro-scroll', { opacity: 1 });
        }

        // ── INTRO · hover magnetic breakout (Bienvenidos sale del recuadro) ──
        if (!reduced) {
          const word = document.querySelector('.intro-word');
          const container = document.querySelector('.intro-hero h1');
          if (word && container) {
            let hoverTween = null;
            let isHovering = false;
            // Solo activar cuando estamos en la zona visible de la intro (no durante scroll exit)
            const isIntroActive = () => {
              const introSec = document.querySelector('.intro-hero');
              if (!introSec) return false;
              const r = introSec.getBoundingClientRect();
              return r.top <= 0 && r.bottom > window.innerHeight * 0.5;
            };

            container.addEventListener('mouseenter', () => {
              if (!isIntroActive()) return;
              isHovering = true;
              if (hoverTween) hoverTween.kill();
              hoverTween = gsap.to(word, {
                scale: 1.12,
                duration: 0.9,
                ease: 'power3.out'
              });
            });

            container.addEventListener('mousemove', (e) => {
              if (!isHovering || !isIntroActive()) return;
              const r = word.getBoundingClientRect();
              const cx = r.left + r.width / 2;
              const cy = r.top + r.height / 2;
              const dx = (e.clientX - cx) / r.width;
              const dy = (e.clientY - cy) / r.height;
              gsap.to(word, {
                x: dx * 40,
                y: dy * 24,
                rotate: dx * 2,
                duration: 0.6,
                ease: 'power2.out',
                overwrite: 'auto'
              });
            });

            container.addEventListener('mouseleave', () => {
              isHovering = false;
              if (hoverTween) hoverTween.kill();
              hoverTween = gsap.to(word, {
                scale: 1,
                x: 0,
                y: 0,
                rotate: 0,
                duration: 1.1,
                ease: 'power3.out'
              });
            });
          }
        }

        // ── INTRO · scroll exit (pin 80vh con escalado) ──
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          gsap.timeline({
            scrollTrigger: {
              trigger: '.intro-hero',
              start: 'top top',
              end: '+=80%',
              scrub: 0.6,
              pin: window.innerWidth >= 768,
              pinSpacing: true
            }
          })
          .to('.intro-word',    { scale: 2.1, y: -120, opacity: 0, filter: 'blur(14px)' }, 0)
          .to('.intro-sub',     { y: -60, opacity: 0 }, 0)
          .to('.intro-eyebrow', { y: -30, opacity: 0 }, 0)
          .to('.intro-scroll',  { opacity: 0 }, 0);
        }

        // ── M1 · Hero sequential 3 actos (pinned + scrubbed crossfade) ──
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          const heroSequential = document.querySelector('.hero-sequential');
          if (heroSequential && window.innerWidth >= 768) {
            // Estado inicial
            gsap.set('[data-hero-act="1"]', { opacity: 1, filter: 'blur(0px)' });
            gsap.set('[data-hero-act="2"], [data-hero-act="3"]', { opacity: 0, filter: 'blur(8px)' });

            const tl = gsap.timeline({
              scrollTrigger: {
                trigger: heroSequential,
                start: 'top top',
                end: '+=220%',
                pin: '.hero-stage',
                pinSpacing: true,
                scrub: true,
                invalidateOnRefresh: true
              }
            });

            tl
              .to({}, { duration: 0.5 })
              // Acto 1 → 2
              .to('[data-hero-act="1"]', { opacity: 0, filter: 'blur(8px)', duration: 0.25 })
              .to('[data-hero-act="2"]', { opacity: 1, filter: 'blur(0px)', duration: 0.25 }, '<0.05')
              .to('[data-hero-dot="1"]', { backgroundColor: 'rgba(247,247,255,0.2)', width: '28px', duration: 0.2 }, '<')
              .to('[data-hero-dot="2"]', { backgroundColor: '#0066FF', width: '44px', duration: 0.2 }, '<')
              .to({}, { duration: 0.5 })
              // Acto 2 → 3
              .to('[data-hero-act="2"]', { opacity: 0, filter: 'blur(8px)', duration: 0.25 })
              .to('[data-hero-act="3"]', { opacity: 1, filter: 'blur(0px)', duration: 0.25 }, '<0.05')
              .to('[data-hero-dot="2"]', { backgroundColor: 'rgba(247,247,255,0.2)', width: '28px', duration: 0.2 }, '<')
              .to('[data-hero-dot="3"]', { backgroundColor: '#0066FF', width: '44px', duration: 0.2 }, '<')
              .to({}, { duration: 0.4 });
          } else if (heroSequential) {
            // Mobile: dejar los 3 actos visibles en columna (no pin)
            gsap.set('[data-hero-act="1"], [data-hero-act="2"], [data-hero-act="3"]', { position: 'relative', opacity: 1, scale: 1, filter: 'none', inset: 'auto' });
            heroSequential.querySelector('.hero-stage').style.height = 'auto';
          }
        }

        // ── M2 · Transición "Accelerate Impact" zoom scrubbed ──
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          const head = document.querySelector('[data-accelerate-header]');
          if (head) {
            gsap.set(head, { transformOrigin: '50% 50%' });
            gsap.fromTo(head,
              { scale: 0.55, opacity: 0, filter: 'blur(10px)' },
              {
                scale: 1, opacity: 1, filter: 'blur(0px)',
                ease: 'power2.out',
                scrollTrigger: {
                  trigger: head,
                  start: 'top 95%',
                  end: 'top 40%',
                  scrub: 0.7
                }
              }
            );
            // Eyebrow clip-path wipe when it enters viewport naturally
            gsap.from('.accelerate-eyebrow', {
              clipPath: 'inset(0 100% 0 0)',
              duration: 1.4, ease: 'power3.inOut',
              scrollTrigger: { trigger: head, start: 'top 75%' }
            });
          }
        }

        // ── M3 · 3D card entry para 4 bloques ──────────
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          const cards = document.querySelectorAll('[data-cards-3d] article');
          if (cards.length) {
            cards.forEach((card, i) => {
              gsap.from(card, {
                rotateX: 22,
                y: 120,
                scale: 0.88,
                opacity: 0,
                filter: 'blur(12px)',
                duration: 1.3,
                ease: 'power3.out',
                delay: (i % 2) * 0.15,
                scrollTrigger: {
                  trigger: card,
                  start: 'top 88%'
                }
              });
              // Hairline draws left→right after card lands
              const hairline = card.querySelector('.h-px.bg-ink\\/10, .h-px.bg-ink\\/15');
              if (hairline) {
                gsap.from(hairline, {
                  scaleX: 0, transformOrigin: 'left center',
                  duration: 1, ease: 'power3.out', delay: 0.5 + (i % 2) * 0.15,
                  scrollTrigger: { trigger: card, start: 'top 88%' }
                });
              }
              // Eyebrow 01/02/03/04 parallax-drift (slower than content)
              const eyebrow = card.querySelector('.font-mono.text-tef-blue');
              if (eyebrow) {
                gsap.to(eyebrow, {
                  yPercent: -35, ease: 'none',
                  scrollTrigger: {
                    trigger: card,
                    start: 'top bottom',
                    end: 'bottom top',
                    scrub: 0.6
                  }
                });
              }
            });
            // HOW tags cascade
            const howTags = document.querySelectorAll('[data-cards-3d] article:nth-child(2) .flex-wrap span');
            if (howTags.length) {
              gsap.from(howTags, {
                scale: 0.7, opacity: 0, y: 12, filter: 'blur(8px)',
                duration: 0.7, ease: 'back.out(1.6)', stagger: 0.06,
                scrollTrigger: { trigger: howTags[0], start: 'top 85%' }
              });
            }
          }
        }

        // ── M4 · Track pinned + reveal secuencial (4 paradas aparecen al scrollear) ──
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          const trackSection = document.querySelector('[data-track-section]');
          const trackPath = document.getElementById('trackPath');
          const trackNodes = document.querySelectorAll('[data-track-node]');
          const trackDots = document.querySelectorAll('[data-track-section] svg circle');

          if (trackSection && trackPath && trackNodes.length && window.innerWidth >= 768) {
            // Estado inicial: nodos invisibles, path sin trazar, dots escondidos
            const len = trackPath.getTotalLength();
            gsap.set(trackPath, { strokeDasharray: len, strokeDashoffset: len });
            gsap.set(trackNodes, { y: 80, opacity: 0, scale: 0.9, filter: 'blur(10px)' });
            gsap.set(trackDots, { scale: 0, opacity: 0, transformOrigin: 'center' });

            // Timeline pin: cada 25% del scroll revela una parada en orden 1→4
            const tl = gsap.timeline({
              scrollTrigger: {
                trigger: trackSection,
                start: 'top top',
                end: '+=280%',
                pin: true,
                pinSpacing: true,
                scrub: 0.7,
                invalidateOnRefresh: true
              }
            });

            // Introducción (0 → 0.08): sección entra
            tl.to({}, { duration: 0.08 });

            // Para cada nodo: path se traza hasta ese punto, nodo aparece, dot pulsa
            trackNodes.forEach((node, i) => {
              const segmentEnd = len * ((i + 1) / trackNodes.length);
              // Path scrubbed segment
              tl.to(trackPath, {
                strokeDashoffset: len - segmentEnd,
                ease: 'none', duration: 0.5
              }, `+=0`);
              // Dot aparece al llegar path
              if (trackDots[i]) {
                tl.to(trackDots[i], {
                  scale: 1, opacity: 1, duration: 0.25, ease: 'back.out(2)'
                }, '<0.35');
              }
              // Nodo (card) aparece
              tl.to(node, {
                y: 0, opacity: 1, scale: 1, filter: 'blur(0px)',
                duration: 0.55, ease: 'power3.out'
              }, '<0.1');
              // Pequeño hold entre paradas
              tl.to({}, { duration: 0.35 });
            });

            // Ghost numbers 01/02/03/04 con parallax suave durante el pin
            trackNodes.forEach((node) => {
              const ghost = node.querySelector('span.absolute');
              if (ghost) {
                gsap.to(ghost, {
                  yPercent: -18, ease: 'none',
                  scrollTrigger: {
                    trigger: trackSection,
                    start: 'top top',
                    end: '+=280%',
                    scrub: 0.8
                  }
                });
              }
            });
          } else if (trackSection && trackPath && trackNodes.length) {
            // Mobile: reveal simple sin pin
            const len = trackPath.getTotalLength();
            gsap.set(trackPath, { strokeDasharray: len, strokeDashoffset: len });
            gsap.to(trackPath, {
              strokeDashoffset: 0, ease: 'none',
              scrollTrigger: { trigger: trackSection, start: 'top 70%', end: 'bottom 70%', scrub: 0.5 }
            });
            trackNodes.forEach((node) => {
              gsap.from(node, {
                y: 80, opacity: 0, filter: 'blur(8px)',
                duration: 0.9, ease: 'power3.out',
                scrollTrigger: { trigger: node, start: 'top 85%' }
              });
            });
          }
        }

        // ── M5 · Globe cinematic (scrubbed zoom + title wipes + chip stagger) ──
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          const globeSec = document.querySelector('[data-globe-section]');
          if (globeSec) {
            // Titles wipe from opposite sides
            gsap.from('[data-globe-title-1]', {
              clipPath: 'inset(0 100% 0 0)',
              duration: 1.4, ease: 'power3.inOut',
              scrollTrigger: { trigger: globeSec, start: 'top 80%' }
            });
            gsap.from('[data-globe-title-2]', {
              clipPath: 'inset(0 0 0 100%)',
              duration: 1.4, ease: 'power3.inOut', delay: 0.2,
              scrollTrigger: { trigger: globeSec, start: 'top 80%' }
            });

            // Globe camera altitude scrubbed with scroll progress
            const applyCameraScrub = () => {
              if (!window.__globeInstance) return;
              const w = window.__globeInstance;
              ScrollTrigger.create({
                trigger: globeSec,
                start: 'top 85%',
                end: 'bottom 40%',
                scrub: 0.8,
                onUpdate: (self) => {
                  // altitude: 3.6 at start → 2.0 at ~60% of scrub
                  const p = self.progress;
                  const altitude = Math.max(2.0, 3.6 - p * 1.6);
                  w.pointOfView({ altitude }, 0);
                }
              });
            };
            if (window.__globeInstance) applyCameraScrub();
            else window.addEventListener('globe:ready', applyCameraScrub, { once: true });

            // Country chips stagger
            const chipsParent = globeSec.querySelector('.country-chip')?.parentElement;
            if (chipsParent) {
              const chips = chipsParent.querySelectorAll('.country-chip');
              gsap.from(chips, {
                opacity: 0, y: 20, scale: 0.8, filter: 'blur(6px)',
                duration: 0.6, ease: 'power3.out', stagger: 0.04,
                scrollTrigger: { trigger: chipsParent, start: 'top 92%' }
              });
            }

            // Stats row lift
            const statsRow = globeSec.querySelector('.grid.grid-cols-3');
            if (statsRow) {
              gsap.from(statsRow.children, {
                y: 60, opacity: 0, scale: 0.9, filter: 'blur(8px)',
                duration: 1, ease: 'power3.out', stagger: 0.15,
                scrollTrigger: { trigger: statsRow, start: 'top 92%' }
              });
            }
          }
        }

        // ── M6 · Cohort + Nadia collision dramática ────
        if (!reduced && typeof ScrollTrigger !== 'undefined') {
          const cohortSection = document.querySelector('[data-cohort-nadia]');
          if (cohortSection) {
            const [leftCard, rightCard] = cohortSection.querySelectorAll(':scope > div');
            if (leftCard) {
              gsap.from(leftCard, {
                x: -140, opacity: 0, rotate: -2, filter: 'blur(6px)',
                duration: 1.2, ease: 'power3.out',
                scrollTrigger: { trigger: cohortSection, start: 'top 82%' }
              });
            }
            if (rightCard) {
              gsap.from(rightCard, {
                x: 140, opacity: 0, rotate: 2, filter: 'blur(6px)',
                duration: 1.2, ease: 'power3.out',
                scrollTrigger: { trigger: cohortSection, start: 'top 82%' }
              });
            }
          }
        }

        // ── M7 · Navbar adaptativa — scroll listener unificado pin-aware ──
        const navbar = document.getElementById('site-navbar');
        if (navbar) {
          const darkSections = Array.from(document.querySelectorAll('[data-nav-dark]'));
          const navH = 65;

          const atmosphere = document.getElementById('darkAtmosphere');
          const updateNavbar = () => {
            let isDark = false;
            const y = window.scrollY;
            for (const sec of darkSections) {
              // ¿Está la sección pinned por ScrollTrigger? Si sí, usar su rango de pin
              let pinned = null;
              if (typeof ScrollTrigger !== 'undefined') {
                pinned = ScrollTrigger.getAll().find(st => st.pin && st.trigger === sec);
              }
              if (pinned && y >= pinned.start && y <= pinned.end) {
                isDark = true;
                break;
              }
              // Fallback: geometría natural — la sección ocupa el espacio bajo la navbar
              // Usar ≤ para cubrir el caso scrollY=0 donde la intro arranca exactamente en y=navH
              const r = sec.getBoundingClientRect();
              if (r.top <= navH + 1 && r.bottom > navH) {
                isDark = true;
                break;
              }
            }
            navbar.classList.toggle('nav-on-dark', isDark);
            if (atmosphere) atmosphere.classList.toggle('visible', isDark);
          };

          window.addEventListener('scroll', updateNavbar, { passive: true });
          // Lenis no dispara scroll nativo — registrar cuando esté listo (window.load)
          window.addEventListener('load', () => {
            if (window.__lenis) window.__lenis.on('scroll', updateNavbar);
          }, { once: true });
          // Evaluar al arranque y tras ScrollTrigger.refresh
          updateNavbar();
          // Refresh completo después de que todo cargue (Lenis + fuentes + imágenes)
          window.addEventListener('load', () => {
            setTimeout(() => {
              if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.refresh();
              updateNavbar();
            }, 200);
          }, { once: true });
        }
        // ── Global scroll progress bar (hidden during intro) ──
        if (typeof ScrollTrigger !== 'undefined') {
          const bar = document.getElementById('scrollProgress');
          if (bar) {
            const introH = () => (document.querySelector('.intro-hero')?.offsetHeight || 800) * 0.7;
            ScrollTrigger.create({
              start: 0,
              end: () => document.documentElement.scrollHeight - window.innerHeight,
              onUpdate: (self) => {
                bar.style.transform = `scaleX(${self.progress})`;
                const scrolled = self.progress * (document.documentElement.scrollHeight - window.innerHeight);
                bar.classList.toggle('visible', scrolled > introH());
              }
            });
          }
        }
      };

      if (document.querySelector('[x-data]') && !window.Alpine) {
        document.addEventListener('alpine:initialized', run, { once: true });
      } else {
        run();
      }
    });
  </script>
