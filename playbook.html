  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },
      back_auto: { es: 'Volver al Autodiagnóstico', en: 'Back to Self-Diagnosis' },
      go_faq: { es: 'FAQ sobre el proceso', en: 'Process FAQ' },
      pdf_link: { es: 'Descargar PDF original', en: 'Download original PDF' },

      hero_eyebrow: { es: 'Telefónica\'s Leadership Self-Diagnosis', en: 'Telefónica\'s Leadership Self-Diagnosis' },
      hero_title: { es: 'Participant Playbook', en: 'Participant Playbook' },
      hero_subtitle: {
        es: 'Tu guía para el Leadership Self-Diagnosis de Telefónica.',
        en: 'Your guide to the Telefónica Leadership Self-Diagnosis.'
      },
      hero_date: { es: '26 de mayo de 2026', en: 'May 21, 2026' },

      /* 1. Welcome */
      sec1_label: { es: '01 · Bienvenida', en: '01 · Welcome' },
      sec1_title: { es: 'Bienvenido/a', en: 'Welcome' },
      sec1_p1: {
        es: 'Te damos la bienvenida al <strong>Leadership Self-Diagnosis de Telefónica</strong>, y ¡enhorabuena por haber sido seleccionado/a para participar en esta experiencia de desarrollo!',
        en: 'Welcome to <strong>Telefónica\'s Leadership Self-Diagnosis</strong>, and congratulations on being selected to take part in this development experience.'
      },
      sec1_p2: {
        es: 'Te incorporas a este proceso en un momento clave para Telefónica. La compañía avanza hacia una cultura de alto impacto, en la que el liderazgo desempeña un papel fundamental para hacer realidad esta transformación. Tu participación refleja la confianza en la importancia de tu liderazgo y en tu capacidad para contribuir a construir nuestro futuro.',
        en: 'You are joining this journey at an important moment for Telefónica. The company is moving toward a high-impact, future-ready culture, and leadership plays a central role in making this transformation real. Your invitation reflects the belief that your leadership matters and that you can help shape what comes next.'
      },
      sec1_p3: {
        es: 'Este recorrido ha sido diseñado para fomentar <strong>el autoconocimiento y el crecimiento</strong>. A través de un diagnóstico basado en evidencia científica, obtendrás una visión clara de cómo lideras hoy, qué te surge de forma natural, qué puede estar limitando tu impacto y en qué aspectos pequeños cambios pueden generar una diferencia significativa.',
        en: 'This journey has been designed to support <strong>self-knowledge, clarity and growth</strong>. Through a science-based diagnostic, you will gain a clear view of how you lead today, what comes naturally to you, what may limit your impact, and where small shifts can make a meaningful difference.'
      },
      sec1_p4: {
        es: 'Esta experiencia está alineada con el nuevo <strong>Modelo de Liderazgo de Telefónica</strong>, que traduce la ambición cultural de la compañía en comportamientos concretos de liderazgo en el día a día. Refleja la evolución que Telefónica está impulsando: avanzar hacia una mayor claridad y valentía, una responsabilidad más sólida y una forma más innovadora de aprender y trabajar conjuntamente.',
        en: 'The experience is aligned with <strong>Telefónica\'s new Leadership Model</strong>, which translates the company\'s cultural ambition into everyday leadership skills. It reflects the evolution Telefónica is embracing: moving toward greater clarity and courage, stronger ownership, and a more innovative way of learning and working together.'
      },
      sec1_p5: {
        es: 'Las reflexiones que obtengas te ayudarán a tomar decisiones de liderazgo más conscientes y servirán como base para tu desarrollo continuo. Por encima de todo, este proceso es una invitación a detenerte, reflexionar y reforzar tu contribución como líder.',
        en: 'The insights you gain will help you make more intentional leadership decisions and will serve as a foundation for your ongoing development. Above all, this journey is an invitation to pause, reflect and strengthen your contribution as a leader.'
      },
      sec1_p6: {
        es: 'Te damos la bienvenida a un proceso de aprendizaje, desarrollo e impacto en el liderazgo.',
        en: 'Welcome to a journey of insight, growth and leadership impact.'
      },

      /* 2. Why This Journey Matters Now */
      sec2_label: { es: '02 · El contexto', en: '02 · The context' },
      sec2_title: { es: '¿Por qué este proceso es importante ahora?', en: 'Why This Journey Matters Now' },
      sec2_intro: {
        es: 'Telefónica atraviesa un momento relevante de transformación. La compañía está simplificando su forma de trabajar, renovando su cultura y preparándose para lo que viene. En este contexto, el liderazgo desempeña un papel decisivo. La forma en que los líderes actuáis cada día es clave para hacer realidad esta transformación.',
        en: 'Telefónica is going through an important moment of change. The company is simplifying how it works, renewing its culture and preparing for what comes next. In this context, leadership plays a decisive role. How leaders show up every day will shape how this transformation becomes real.'
      },
      sec2_intro2: {
        es: 'Para guiar este cambio, Telefónica ha definido una <strong>cultura de alto impacto</strong> basada en tres actitudes sencillas que describen cómo queremos trabajar y liderar:',
        en: 'To guide this change, Telefónica has defined a <strong>high-impact culture</strong> built around three simple attitudes that describe how we want to work and lead:'
      },

      att1_title: { es: 'DAMOS LO MEJOR DE NOSOTROS', en: 'WE GIVE OUR BEST' },
      att1_sub: { es: 'IMPACTO', en: 'IMPACT' },
      att1_body: {
        es: 'Para generar IMPACTO, creemos en el poder de la simplicidad y en centrarnos en lo que realmente importa. Construimos confianza cuando entendemos a nuestros clientes y ofrecemos lo que marca la diferencia. La excelencia es nuestro estándar para generar impacto hoy y a largo plazo.',
        en: 'To make an IMPACT, we believe in the power of simplicity and focusing on what really matters. We build trust when we understand our customers and deliver what makes a difference. Excellence is our standard for making an impact today and in the long term.'
      },
      att2_title: { es: 'CUESTIONAMOS NUESTROS PROPIOS LÍMITES', en: 'WE CHALLENGE OUR LIMITS' },
      att2_sub: { es: 'TRANSFORMAR', en: 'TRANSFORM' },
      att2_body: {
        es: 'Para TRANSFORMAR, innovamos y asumimos riesgos inteligentes. Fomentamos el debate real, tomamos decisiones claras y actuamos con valentía para que las buenas ideas avancen sin miedo a equivocarnos.',
        en: 'To TRANSFORM, we innovate and take intelligent risks. We encourage real debate, make clear decisions and act with courage so that good ideas can move forward without fear of making mistakes.'
      },
      att3_title: { es: 'NOS SUPERAMOS JUNTOS', en: 'WE RISE TOGETHER' },
      att3_sub: { es: 'CRECER', en: 'GROW' },
      att3_body: {
        es: 'Para CRECER, todos asumimos la responsabilidad de los resultados, nos implicamos de verdad en lo que logramos como equipo y tomamos la iniciativa para que las cosas sucedan. Desarrollar nuestras capacidades y atrevernos a dar pasos personales ambiciosos es lo que impulsa a un líder en Telefónica.',
        en: 'To GROW, we all take responsibility for results, truly engage in what we achieve as a team, and take the initiative to make things happen. Evolving our capabilities and daring to take bold personal steps is what drives a leading Telefónica.'
      },

      model_label: { es: 'El Modelo de Liderazgo de Telefónica', en: 'The Telefónica Leadership Model' },
      model_intro: {
        es: 'Estas actitudes cobran vida a través del Modelo de Liderazgo de Telefónica: seis skills que describen cómo es el liderazgo excelente en la práctica.',
        en: 'These attitudes are brought to life through Telefónica\'s Leadership Model – six core leadership skills that describe what great leadership looks like in practice.'
      },

      ls1_title: { es: 'Foco en el Cliente', en: 'Customer First' },
      ls1_sub: { es: 'El momento del cliente es ahora.', en: 'Customer\'s time is now.' },
      ls1_body: {
        es: 'Ponemos al cliente en el centro. Nos ganamos su confianza entendiéndolo, escuchándolo activamente y resolviendo con rapidez lo que realmente importa, hoy y a largo plazo. Elegimos mirar el negocio desde fuera hacia dentro. Así de simple.',
        en: 'We put customer at the center. We earn their trust through understanding, active listening and resolving with speed what really matters, today and in the long term. With an outside-in view. Simple as that.'
      },
      ls2_title: { es: 'Innovación Digital', en: 'Digital Innovation' },
      ls2_sub: { es: 'La curiosidad impulsa la innovación.', en: 'Curiosity drives innovation.' },
      ls2_body: {
        es: 'Innovamos con propósito y adoptamos lo digital. Cuestionamos el "siempre se ha hecho así". Asumimos riesgos inteligentes y buscamos soluciones creativas para resolver problemas reales, desde mejoras en el día a día hasta grandes avances.',
        en: 'We innovate with purpose and embrace digital. We challenge the "we\'ve always done it this way". We take smart risks and seek creative solutions to real problems, from everyday improvements to big leaps.'
      },
      ls3_title: { es: 'Impulsar la Responsabilidad', en: 'Driving Ownership' },
      ls3_sub: { es: 'El resultado depende de nosotros.', en: 'Result depends on us.' },
      ls3_body: {
        es: 'Asumimos la responsabilidad por el total, no solo de nuestra parte. Buscamos soluciones en lugar de esperar instrucciones. Asumimos nuestra contribución individual, nos empoderamos y confiamos mutuamente como equipo, y multiplicamos nuestro impacto como Telefónica.',
        en: 'We take responsibility of the whole, not just our part. We seek solutions rather than waiting for instructions. We own our contribution as individuals, we trust and empower each other as a team, and we multiply our collective impact as Telefónica.'
      },
      ls4_title: { es: 'Excelencia en la Ejecución', en: 'Delivering Excellence' },
      ls4_sub: { es: 'La Excelencia es nuestro estándar.', en: 'Excellence is our standard.' },
      ls4_body: {
        es: 'Estamos orgullosos del trabajo que hacemos; juntos. No se trata de hacer más, sino de hacer mejor lo que realmente marca la diferencia. Simplicidad, foco y disciplina en la ejecución. Todo en uno.',
        en: 'We are proud of the work we do, together. It is not about doing more but doing better what truly makes a difference. Simplicity, focus, and disciplined execution. All in.'
      },
      ls5_title: { es: 'Claridad y Valentía', en: 'Clarity & Courage' },
      ls5_sub: { es: 'La claridad conduce a decisiones valientes.', en: 'Clarity leads to bold decisions.' },
      ls5_body: {
        es: 'La valentía no es la ausencia de duda, sino la capacidad de avanzar con claridad en medio de la complejidad. Valoramos el debate abierto y sincero por encima del consenso pasivo. Las decisiones valientes requieren debate y la disciplina de seguir los datos.',
        en: 'Courage is not the absence of doubt, but the ability to move forward with complexity. We speak up and value open discussion over passive consensus. Courageous decisions need real debate and the discipline to follow the data.'
      },
      ls6_title: { es: 'Hacer Crecer a las Personas', en: 'Growing People' },
      ls6_sub: { es: 'El crecimiento de las personas construye nuestro futuro.', en: 'People\'s growth builds our future.' },
      ls6_body: {
        es: 'Crecer significa atreverse a dar pasos audaces que nos lleven a desarrollar nuevas capacidades. Lideramos con el ejemplo e impulsamos a las personas a ir siempre más allá de lo conocido; porque nadie está completamente preparado para el mañana.',
        en: 'We dare to take bold steps to build new capabilities. We lead by example and challenge ourselves and others to go beyond the known; because no one is fully ready for tomorrow.'
      },

      /* 3. Overview of the self-diagnosis experience */
      sec3_label: { es: '03 · La experiencia', en: '03 · The experience' },
      sec3_title: { es: 'Visión general de la experiencia del Leadership Self-Diagnosis', en: 'Overview of the Leadership self-diagnosis experience' },
      sec3_intro1: {
        es: 'Este proceso te invita a detenerte un momento y mirar hacia dentro, para reconectar con el líder que eres hoy y el que quieres llegar a ser. Ha sido diseñado como un recorrido sencillo y coherente que te permite avanzar desde la comprensión de tu liderazgo actual hasta el fortalecimiento de tu impacto a lo largo del tiempo.',
        en: 'This journey invites you to slow down for a moment and look inward, to reconnect with the leader you are today and the leader you want to become. This journey has been designed as a simple and coherent pathway that helps you move from understanding your leadership today to strengthening your impact over time.'
      },
      sec3_intro2: {
        es: 'El punto de partida es el autoconocimiento: comprender cómo lideras hoy. Te ofrece la oportunidad de parar y obtener una visión más clara y objetiva de cómo actúas como líder en la actualidad, qué te surge de forma natural, qué impulsa tus decisiones y en qué aspectos podrías querer desarrollarte a continuación.',
        en: 'The starting point is about self-knowledge, understanding how you lead today. It gives you the opportunity to pause and gain a clearer, more objective view of how you show up as a leader today, what comes naturally to you, what drives your decisions, and where you may want to grow next.'
      },
      sec3_intro3: {
        es: 'La experiencia de autodiagnóstico está diseñada para ser reveladora, práctica y plenamente orientada al desarrollo.',
        en: 'The self-diagnosis experience is designed to be insightful, practical and fully developmental.'
      },

      step1_label: { es: 'Paso 01', en: 'Step 01' },
      step1_title: { es: 'Autodiagnóstico online', en: 'Online Self-diagnosis' },
      step1_time: { es: '~60 minutos', en: '~60 minutes' },
      step1_body: {
        es: 'Completarás un cuestionario online de autodiagnóstico que analiza <strong>quién eres como líder, explorando tus habilidades de liderazgo</strong>.<br><br>El autodiagnóstico dura aproximadamente 60 minutos. <strong>Es solo una orientación: tómate el tiempo que necesites, ya que el tiempo no afecta los resultados.</strong> Recomendamos encontrar un espacio tranquilo y responder de forma natural, sin prisas ni sobreanálisis.<br><br><strong>No hay respuestas correctas ni incorrectas.</strong>',
        en: 'You will complete an online self-diagnosis questionnaire that looks at <strong>who you are as a leader, exploring your leadership skills</strong>.<br><br>The self-diagnosis takes approximately 60 minutes. <strong>This is a guideline only. You can take the time you need, as the time spent does not affect the results.</strong> We recommend finding a quiet space and answering naturally, without rushing or overthinking.<br><br><strong>There are no right or wrong answers.</strong>'
      },

      step2_label: { es: 'Paso 02', en: 'Step 02' },
      step2_title: { es: 'Leadership Snapshot de Telefónica', en: 'Telefónica\'s leadership snapshot — "Your View in One Shot"' },
      step2_body: {
        es: 'Tus resultados se traducirán en un informe <strong>claro, visual y fácil de leer</strong>. Este informe te ofrece una visión rápida de cómo te posicionas respecto al <strong>Modelo de Liderazgo de Telefónica</strong>, utilizando una escala sencilla que te permite identificar con agilidad:',
        en: 'Your results will be translated into a <strong>clear, visual and easy-to-read Report</strong>. This report gives you an <em>at-a-glance</em> view of how you are positioned against <strong>Telefónica\'s Leadership Model</strong>, using a simple scale that helps you quickly identify:'
      },
      step2_b1: { es: 'Tus principales fortalezas.', en: 'Your key strengths.' },
      step2_b2: { es: 'Tus principales oportunidades de desarrollo.', en: 'Your main development opportunities.' },
      step2_b3: { es: 'Dónde enfocar tu energía para lograr el máximo impacto.', en: 'Where to focus your energy for the greatest impact.' },
      step2_close: {
        es: 'Está diseñado para ayudarte a conocerte mejor y servir como punto de partida práctico para tu recorrido de desarrollo.',
        en: 'It is designed to help you understand yourself better and serve as a practical starting point for your development journey.'
      },

      step3_label: { es: 'Paso 03', en: 'Step 03' },
      step3_title: { es: 'In-Depth Report: Mirar más allá de la superficie', en: 'In-Depth Report — Looking Beneath the Surface' },
      step3_body: {
        es: 'Además del Leadership Snapshot de Telefónica, tendrás acceso a un <strong>informe más detallado, llamado In-Depth Report,</strong> que te permitirá profundizar en tus resultados.<br><br>Este informe va más allá de lo visible en la superficie. Aunque los comportamientos y las competencias de liderazgo reflejan <em>lo que haces</em>, hay mucho más debajo: tus <strong>rasgos y motivadores</strong>, que influyen en <em>por qué</em> actúas como lo haces.<br><br>Puedes imaginarlo como la <strong>metáfora del iceberg</strong>:',
        en: 'In addition to the Telefónica\'s leadership snapshot, you will have access to a <strong>more detailed report</strong> that allows you to go deeper into your results.<br><br>This report goes beyond what is visible on the surface. While leadership behaviours and competencies reflect <em>what you do</em>, there is much more beneath, your <strong>traits and drivers</strong>, which influence <em>why</em> you act the way you do.<br><br>You can think of this as an <strong>iceberg view</strong>:'
      },
      step3_b1: {
        es: 'La parte visible representa tus comportamientos y competencias.',
        en: 'The visible part represents your leadership skills and competencies.'
      },
      step3_b2: {
        es: 'Bajo la superficie se encuentran tus rasgos y motivadores, que modelan cómo piensas, decides y respondes.',
        en: 'Below the surface sit your traits and drivers, shaping how you think, decide and respond.'
      },
      step3_close: {
        es: 'Esta perspectiva te ayudará a entender no solo lo que haces como líder, sino <em>por qué</em> lo haces, ofreciéndote una comprensión más profunda sobre cómo crecer y adaptarte con el tiempo.',
        en: 'This perspective helps you understand not only <em>what</em> you do as a leader, but <em>why</em> you do it, giving you deeper insight into how to grow and adapt over time.'
      },

      step4_label: { es: 'Paso 04', en: 'Step 04' },
      step4_title: { es: 'Avatar Feedback: cómo interpretar los resultados', en: 'Avatar Feedback — Making Sense of Your Results' },
      step4_body: {
        es: 'Para facilitar la interpretación y ayudarte a obtener el máximo valor de tus insights, interactuarás con un <strong>Avatar de Feedback</strong>: una experiencia conversacional e interactiva diseñada para complementar los informes.<br><br>El Avatar te ayudará a:',
        en: 'To support interpretation and help you get the most value from your insights, you will engage with a <strong>Feedback Avatar</strong> — an interactive, conversational experience designed to complement the reports.<br><br>The Avatar helps you to:'
      },
      step4_b1: {
        es: 'Interpretar tus resultados con claridad y confianza.',
        en: 'Interpret your results with clarity and confidence.'
      },
      step4_b2: {
        es: 'Explorar los comportamientos que hay detrás de tus puntuaciones.',
        en: 'Explore the behaviours behind your scores.'
      },
      step4_b3: {
        es: 'Priorizar acciones concretas de desarrollo adaptadas a tu contexto.',
        en: 'Prioritise concrete development actions that fit your context.'
      },
      step4_close: {
        es: 'Es un espacio seguro y disponible bajo demanda en el que podrás reflexionar, hacer preguntas y transformar los insights en acciones a tu propio ritmo.',
        en: 'It is a safe, on-demand space where you can reflect, ask questions and translate insight into action at your own pace.'
      },

      /* 4. How to Maximize Your Feedback Avatar Session */
      sec4_label: { es: '04 · Prompts', en: '04 · Prompts' },
      sec4_title: { es: 'Cómo maximizar tu sesión con el "Avatar Feedback"', en: 'How to Maximize Your Feedback Avatar Session' },
      sec4_intro: {
        es: 'Tu Avatar Feedback es un espacio privado y disponible bajo demanda, diseñado para ayudarte a interpretar tus resultados y transformar los insights en acciones prácticas de desarrollo.<br><br>Puedes utilizar los siguientes <em>prompts</em> tal cual están redactados en el chat del Avatar:',
        en: 'Your Feedback Avatar is a private, on-demand space designed to help you interpret your results and translate insight into practical development actions.<br><br>You can use the prompts below exactly as written in the Avatar chat:'
      },

      prompt1_title: {
        es: 'Relacionar mis resultados con el Modelo de Liderazgo de Telefónica',
        en: 'Connecting my results to Telefónica\'s Leadership Model'
