  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },
      back_auto: { es: 'Volver al Autodiagnóstico', en: 'Back to Self-Diagnosis' },
      go_faq: { es: 'FAQ sobre el proceso', en: 'Process FAQ' },
      pdf_link: { es: 'Descargar PDF original', en: 'Download original PDF' },

      hero_eyebrow: { es: 'Programa · Accelerate Impact', en: 'Program · Accelerate Impact' },
      hero_title: { es: 'Participant Playbook', en: 'Participant Playbook' },
      hero_subtitle: {
        es: 'Tu guía para el autodiagnóstico de liderazgo Telefónica.',
        en: 'Your guide to the Telefónica Leadership Self-Diagnosis.'
      },
      hero_date: { es: '20 de marzo de 2026', en: 'March 20, 2026' },

      /* 1. Welcome */
      sec1_label: { es: '01 · Bienvenida', en: '01 · Welcome' },
      sec1_title: { es: 'Bienvenido', en: 'Welcome' },
      sec1_p1: {
        es: 'Bienvenido al <strong>Autodiagnóstico de Liderazgo de Telefónica</strong>, y enhorabuena por haber sido seleccionado para participar en esta experiencia de desarrollo.',
        en: 'Welcome to <strong>Telefónica\'s Leadership Self-Diagnosis</strong>, and congratulations on being selected to take part in this development experience.'
      },
      sec1_p2: {
        es: 'Te incorporas a este recorrido en un momento importante para Telefónica. La compañía avanza hacia una cultura de alto impacto y preparada para el futuro, donde el liderazgo juega un papel central para hacer realidad esta transformación. Tu invitación refleja la convicción de que tu liderazgo importa y de que puedes ayudar a dar forma a lo que viene.',
        en: 'You are joining this journey at an important moment for Telefónica. The company is moving toward a high-impact, future-ready culture, and leadership plays a central role in making this transformation real. Your invitation reflects the belief that your leadership matters and that you can help shape what comes next.'
      },
      sec1_p3: {
        es: 'Este viaje está diseñado para apoyar el <strong>autoconocimiento, la claridad y el crecimiento</strong>. A través de un diagnóstico basado en evidencia científica, obtendrás una visión clara de cómo lideras hoy, qué te resulta natural, qué puede estar limitando tu impacto y dónde pequeños cambios pueden marcar una diferencia significativa.',
        en: 'This journey has been designed to support <strong>self-knowledge, clarity and growth</strong>. Through a science-based diagnostic, you will gain a clear view of how you lead today, what comes naturally to you, what may limit your impact, and where small shifts can make a meaningful difference.'
      },
      sec1_p4: {
        es: 'La experiencia está alineada con el <strong>nuevo Modelo de Liderazgo de Telefónica</strong>, que traduce la ambición cultural de la compañía en skills de liderazgo aplicadas al día a día. Refleja la evolución que Telefónica está abrazando: avanzar hacia una mayor claridad y valentía, mayor ownership, y una forma más innovadora de aprender y trabajar juntos.',
        en: 'The experience is aligned with <strong>Telefónica\'s new Leadership Model</strong>, which translates the company\'s cultural ambition into everyday leadership skills. It reflects the evolution Telefónica is embracing: moving toward greater clarity and courage, stronger ownership, and a more innovative way of learning and working together.'
      },
      sec1_p5: {
        es: 'Los insights que obtengas te ayudarán a tomar decisiones de liderazgo más intencionales y servirán como base para tu desarrollo continuo. Sobre todo, este viaje es una invitación a hacer una pausa, reflexionar y fortalecer tu contribución como líder.',
        en: 'The insights you gain will help you make more intentional leadership decisions and will serve as a foundation for your ongoing development. Above all, this journey is an invitation to pause, reflect and strengthen your contribution as a leader.'
      },
      sec1_p6: {
        es: 'Bienvenido a un viaje de comprensión, crecimiento e impacto en el liderazgo.',
        en: 'Welcome to a journey of insight, growth and leadership impact.'
      },

      /* 2. Why This Journey Matters Now */
      sec2_label: { es: '02 · El contexto', en: '02 · The context' },
      sec2_title: { es: 'Por qué este viaje importa ahora', en: 'Why This Journey Matters Now' },
      sec2_intro: {
        es: 'Telefónica atraviesa un momento de cambio importante. La compañía está simplificando su forma de trabajar, renovando su cultura y preparándose para lo que viene. En este contexto, el liderazgo juega un papel decisivo. La forma en que los líderes se muestren cada día dará forma a cómo se hace realidad esta transformación.',
        en: 'Telefónica is going through an important moment of change. The company is simplifying how it works, renewing its culture and preparing for what comes next. In this context, leadership plays a decisive role. How leaders show up every day will shape how this transformation becomes real.'
      },
      sec2_intro2: {
        es: 'Para guiar este cambio, Telefónica ha definido una <strong>cultura de alto impacto</strong> construida en torno a tres actitudes simples que describen cómo queremos trabajar y liderar:',
        en: 'To guide this change, Telefónica has defined a <strong>high-impact culture</strong> built around three simple attitudes that describe how we want to work and lead:'
      },

      att1_title: { es: 'WE GIVE OUR BEST', en: 'WE GIVE OUR BEST' },
      att1_sub: { es: 'IMPACTO', en: 'IMPACT' },
      att1_body: {
        es: 'Creemos en el poder de la simplicidad y de centrarnos en lo que realmente importa. Construimos confianza cuando entendemos a nuestros clientes y entregamos lo que marca la diferencia. La excelencia es nuestro estándar para generar impacto hoy y a largo plazo.',
        en: 'We believe in the power of simplicity and focusing on what really matters. We build trust when we understand our customers and deliver what makes a difference. Excellence is our standard for making an impact today and in the long term.'
      },
      att2_title: { es: 'WE CHALLENGE OUR LIMITS', en: 'WE CHALLENGE OUR LIMITS' },
      att2_sub: { es: 'TRANSFORMACIÓN', en: 'TRANSFORM' },
      att2_body: {
        es: 'Innovamos y tomamos riesgos inteligentes. Fomentamos el debate real, tomamos decisiones claras y actuamos con valentía para que las buenas ideas puedan avanzar sin miedo a equivocarse.',
        en: 'We innovate and take intelligent risks. We encourage real debate, make clear decisions and act with courage so that good ideas can move forward without fear of making mistakes.'
      },
      att3_title: { es: 'WE RISE TOGETHER', en: 'WE RISE TOGETHER' },
      att3_sub: { es: 'CRECIMIENTO', en: 'GROW' },
      att3_body: {
        es: 'Todos asumimos la responsabilidad de los resultados, nos implicamos de verdad en lo que logramos como equipo y tomamos la iniciativa para hacer que las cosas pasen. Evolucionar nuestras capacidades y atrevernos a dar pasos personales audaces es lo que impulsa una Telefónica líder.',
        en: 'We all take responsibility for results, truly engage in what we achieve as a team, and take the initiative to make things happen. Evolving our capabilities and daring to take bold personal steps is what drives a leading Telefónica.'
      },

      model_label: { es: 'El Modelo de Liderazgo de Telefónica', en: 'The Telefónica Leadership Model' },
      model_intro: {
        es: 'Estas actitudes cobran vida a través de seis skills clave de liderazgo que describen cómo se ve el gran liderazgo en la práctica:',
        en: 'These attitudes are brought to life through six core leadership skills that describe what great leadership looks like in practice:'
      },

      ls1_title: { es: 'Customer First', en: 'Customer First' },
      ls1_body: {
        es: 'Ponemos al cliente en el centro. Ganamos confianza entendiéndolo y resolviendo lo que de verdad marca la diferencia, hoy y a largo plazo.',
        en: 'We put the Customer at the centre. We earn trust by understanding the customer, then solving what truly makes a difference, today and for the long term. Simple as that.'
      },
      ls2_title: { es: 'Digital Innovation', en: 'Digital Innovation' },
      ls2_body: {
        es: 'Transformamos y abrazamos lo digital. Asumimos riesgos inteligentes y experimentamos para resolver problemas reales, desde mejoras diarias hasta grandes saltos. Las grandes ideas siguen a la curiosidad, no al organigrama.',
        en: 'We transform and embrace digital. We take smart risks, embrace Digital and experiment to solve real problems, from everyday improvements to big leaps. Great ideas follow curiosity, not org charts.'
      },
      ls3_title: { es: 'Driving Ownership', en: 'Driving Ownership' },
      ls3_body: {
        es: 'Asumimos la responsabilidad de los resultados. Nos apropiamos del resultado con la misma intensidad y accountability, no solo de nuestra parte, sino del conjunto.',
        en: 'We take responsibility for results. We take ownership for the outcome, with the same intensity and accountability, not just for our part, but for the whole.'
      },
      ls4_title: { es: 'Delivering Excellence', en: 'Delivering Excellence' },
      ls4_body: {
        es: 'Hacemos de la excelencia nuestro estándar. Estamos orgullosos del trabajo que hacemos. La excelencia es nuestra firma y subimos el listón cuando lo hacemos juntos. Un equipo, todos dentro.',
        en: 'We make Excellence our standard. We\'re proud of the work we do. Excellence is our signature, and we raise the bar when we do it together. One team, all in.'
      },
      ls5_title: { es: 'Clarity & Courage', en: 'Clarity & Courage' },
      ls5_body: {
        es: 'Hablamos claro y tomamos decisiones audaces. Valoramos la discusión abierta frente al consenso pasivo. Las decisiones claras requieren debate real y la disciplina de seguir los datos.',
        en: 'We speak up and make bold decisions. We value open discussion over passive consensus. Clear decisions need real debate and the discipline to follow the data.'
      },
      ls6_title: { es: 'Growing People', en: 'Growing People' },
      ls6_body: {
        es: 'Crecemos asumiendo nuevos retos. Somos una compañía humana. Nuestras personas importan, y eso también significa impulsar el crecimiento y fomentar pasos personales audaces por encima del confort, porque nadie está totalmente preparado para mañana.',
        en: 'We grow by taking on new challenges. We are a human company. Our people matter and that also means pushing for growth and encouraging personal bold moves over comfort, because no one is fully ready for tomorrow.'
      },

      /* 3. Overview of the self-diagnosis experience */
      sec3_label: { es: '03 · La experiencia', en: '03 · The experience' },
      sec3_title: { es: 'Visión general del autodiagnóstico', en: 'Overview of the self-diagnosis experience' },
      sec3_intro1: {
        es: 'Este viaje te invita a frenar un momento y mirar hacia dentro, a reconectar con el líder que eres hoy y el líder que quieres llegar a ser. Está diseñado como un recorrido simple y coherente que te ayuda a pasar de entender tu liderazgo actual a fortalecer tu impacto con el tiempo.',
        en: 'This journey invites you to slow down for a moment and look inward, to reconnect with the leader you are today and the leader you want to become. This journey has been designed as a simple and coherent pathway that helps you move from understanding your leadership today to strengthening your impact over time.'
      },
      sec3_intro2: {
        es: 'El punto de partida es el autoconocimiento: entender cómo lideras hoy. Te da la oportunidad de hacer una pausa y obtener una visión más clara y objetiva de cómo te muestras como líder, qué te resulta natural, qué impulsa tus decisiones y dónde puedes querer crecer.',
        en: 'The starting point is about self-knowledge, understanding how you lead today. It gives you the opportunity to pause and gain a clearer, more objective view of how you show up as a leader today, what comes naturally to you, what drives your decisions, and where you may want to grow next.'
      },
      sec3_intro3: {
        es: 'La experiencia está diseñada para ser reveladora, práctica y totalmente orientada al desarrollo.',
        en: 'The self-diagnosis experience is designed to be insightful, practical and fully developmental.'
      },

      step1_label: { es: 'Paso 01', en: 'Step 01' },
      step1_title: { es: 'Autodiagnóstico online', en: 'Online Self-diagnosis' },
      step1_time: { es: '~60 minutos', en: '~60 minutes' },
      step1_body: {
        es: 'Completarás un cuestionario online de autodiagnóstico que analiza <strong>quién eres como líder</strong>, explorando tus skills de liderazgo. Tarda aproximadamente 60 minutos. Esto es solo una orientación: puedes tomarte el tiempo que necesites, ya que el tiempo invertido no afecta a los resultados. Recomendamos encontrar un espacio tranquilo y responder con naturalidad, sin prisas ni darle muchas vueltas. <strong>No hay respuestas correctas o incorrectas.</strong>',
        en: 'You will complete an online self-diagnosis questionnaire that looks at <strong>who you are as a leader</strong>, exploring your leadership skills. It takes approximately 60 minutes. This is a guideline only. You can take the time you need, as the time spent does not affect the results. We recommend finding a quiet space and answering naturally, without rushing or overthinking. <strong>There are no right or wrong answers.</strong>'
      },

      step2_label: { es: 'Paso 02', en: 'Step 02' },
      step2_title: { es: 'Leadership Snapshot — "Your View in One Shot"', en: 'Telefónica\'s leadership snapshot — "Your View in One Shot"' },
      step2_body: {
        es: 'Tus resultados se traducen en un informe <strong>claro, visual y de lectura sencilla</strong>. Este informe te ofrece una vista a un golpe de ojo de cómo te posicionas frente al Modelo de Liderazgo de Telefónica, con una escala simple que te ayuda a identificar rápidamente:',
        en: 'Your results will be translated into a <strong>clear, visual and easy-to-read Report</strong>. This report gives you an at-a-glance view of how you are positioned against Telefónica\'s Leadership Model, using a simple scale that helps you quickly identify:'
      },
      step2_b1: { es: 'Tus fortalezas clave.', en: 'Your key strengths.' },
      step2_b2: { es: 'Tus principales oportunidades de desarrollo.', en: 'Your main development opportunities.' },
      step2_b3: { es: 'Dónde concentrar tu energía para el mayor impacto.', en: 'Where to focus your energy for the greatest impact.' },

      step3_label: { es: 'Paso 03', en: 'Step 03' },
      step3_title: { es: 'Informe en profundidad — Mirando bajo la superficie', en: 'In-Depth Report — Looking Beneath the Surface' },
      step3_body: {
        es: 'Además del snapshot, tendrás acceso a un <strong>informe detallado</strong> que te permite profundizar en tus resultados. Va más allá de lo visible en la superficie. Aunque los comportamientos y competencias reflejan <em>lo que haces</em>, hay mucho más debajo: tus <strong>traits y drivers</strong>, que influyen en <em>por qué</em> actúas como actúas. Piénsalo como una vista de iceberg:',
        en: 'In addition to the Telefónica\'s leadership snapshot, you will have access to a <strong>more detailed report</strong> that allows you to go deeper into your results. This report goes beyond what is visible on the surface. While leadership behaviours and competencies reflect <em>what you do</em>, there is much more beneath, your <strong>traits and drivers</strong>, which influence <em>why</em> you act the way you do. You can think of this as an <strong>iceberg view</strong>:'
      },
      step3_b1: {
        es: 'La parte visible representa tus skills y competencias de liderazgo.',
        en: 'The visible part represents your leadership skills and competencies.'
      },
      step3_b2: {
        es: 'Bajo la superficie están tus traits y drivers, que dan forma a cómo piensas, decides y respondes.',
        en: 'Below the surface sit your traits and drivers, shaping how you think, decide and respond.'
      },
      step3_close: {
        es: 'Esta perspectiva te ayuda a entender no solo <em>qué</em> haces como líder, sino <em>por qué</em> lo haces, dándote una comprensión más profunda de cómo crecer y adaptarte con el tiempo.',
        en: 'This perspective helps you understand not only <em>what</em> you do as a leader, but <em>why</em> you do it, giving you deeper insight into how to grow and adapt over time.'
      },

      step4_label: { es: 'Paso 04', en: 'Step 04' },
      step4_title: { es: 'Avatar Feedback — Dándole sentido a tus resultados', en: 'Avatar Feedback — Making Sense of Your Results' },
      step4_body: {
        es: 'Para apoyar la interpretación y ayudarte a sacar el máximo valor de tus insights, interactuarás con un <strong>Feedback Avatar</strong>: una experiencia conversacional interactiva diseñada para complementar los informes. El Avatar te ayuda a:',
        en: 'To support interpretation and help you get the most value from your insights, you will engage with a <strong>Feedback Avatar</strong> — an interactive, conversational experience designed to complement the reports. The Avatar helps you to:'
      },
      step4_b1: {
        es: 'Interpretar tus resultados con claridad y confianza.',
        en: 'Interpret your results with clarity and confidence.'
      },
      step4_b2: {
        es: 'Explorar los comportamientos detrás de tus puntuaciones.',
        en: 'Explore the behaviours behind your scores.'
      },
      step4_b3: {
        es: 'Priorizar acciones de desarrollo concretas que encajen con tu contexto.',
        en: 'Prioritise concrete development actions that fit your context.'
      },
      step4_close: {
        es: 'Es un espacio seguro y on-demand donde puedes reflexionar, hacer preguntas y traducir insights en acción a tu propio ritmo.',
        en: 'It is a safe, on-demand space where you can reflect, ask questions and translate insight into action at your own pace.'
      },

      /* 4. How to Maximize Your Feedback Avatar Session */
      sec4_label: { es: '04 · Prompts', en: '04 · Prompts' },
      sec4_title: { es: 'Cómo aprovechar tu sesión con el Avatar', en: 'How to Maximize Your Feedback Avatar Session' },
      sec4_intro: {
        es: 'Tu Feedback Avatar es un espacio privado y on-demand diseñado para ayudarte a interpretar tus resultados y traducir los insights en acciones prácticas de desarrollo. Puedes usar los prompts a continuación exactamente como están escritos en el chat del Avatar:',
        en: 'Your Feedback Avatar is a private, on-demand space designed to help you interpret your results and translate insight into practical development actions. You can use the prompts below exactly as written in the Avatar chat:'
      },

      prompt1_title: {
        es: 'Conectando mis resultados con el Modelo de Liderazgo de Telefónica',
        en: 'Connecting my results to Telefónica\'s Leadership Model'
      },
      prompt1_body: {
        es: 'Basándote en mis resultados, ¿cuáles de las capacidades de liderazgo de Telefónica están impulsando mi mejor rendimiento? ¿Qué comportamientos específicos parecen contribuir más a estas fortalezas? ¿Y qué capacidades y comportamientos debería priorizar para fortalecer de cara al futuro? Usa el mapeo de skills de Telefónica con las competencias de Korn Ferry de abajo:',
        en: 'Based on my results, which of Telefónica\'s Leadership Capabilities are driving my strongest performance? What specific behaviours seem to be contributing most to these strengths? And which capabilities and behaviours should I prioritise to strengthen going forward? Please use the Telefónica skills mapped to the Korn Ferry competencies below:'
      },

      map_h1: { es: 'Skill de Telefónica', en: 'Telefónica\'s skill' },
      map_h2: { es: 'Competencia de Korn Ferry', en: 'Korn Ferry\'s competency' },
      map_r1a: { es: 'Customer first', en: 'Customer first' },
      map_r1b: { es: 'Customer focus', en: 'Customer focus' },
      map_r2a: { es: 'Delivering excellence', en: 'Delivering excellence' },
      map_r2b: { es: 'Drives results', en: 'Drives results' },
      map_r3a: { es: 'Digital innovation', en: 'Digital innovation' },
      map_r3b: { es: 'Cultivation innovation', en: 'Cultivation innovation' },
      map_r4a: { es: 'Clarity & Courage', en: 'Clarity & Courage' },
      map_r4b: { es: 'Courage', en: 'Courage' },
      map_r5a: { es: 'Driving ownership', en: 'Driving ownership' },
      map_r5b: { es: 'Ensures accountability', en: 'Ensures accountability' },
      map_r6a: { es: 'Growing people', en: 'Growing people' },
      map_r6b: { es: 'Nimble learning', en: 'Nimble learning' },

      prompt2_title: {
        es: 'Entendiendo mis resultados en profundidad',
        en: 'Understanding my results in depth'
      },
