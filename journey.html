<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'journey',
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey — Accelerate Impact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"Telefonica Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    *, *::before, *::after { font-family: "Telefonica Sans", sans-serif !important; }
    body, p, span, a, li, td, th, label, input, button, textarea, select { font-family: "Telefonica Sans", sans-serif !important; }
    body { font-feature-settings: "cv11", "ss01"; }
    .bg-tef-gradient-dark { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-tef-gradient-light { background: linear-gradient(180deg, #F7F7FF 0%, #ECEEF7 50%, #F7F7FF 100%); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    @keyframes dashflow { to { stroke-dashoffset: -170; } }
    .ascent-breathe { animation: dashflow 20s linear infinite; }

    @keyframes orbit { to { transform: rotate(360deg); } }
    .orbit { animation: orbit 24s linear infinite; transform-origin: center; }

    @media (prefers-reduced-motion: reduce) {
      .ascent-breathe, .orbit, .reveal { animation: none; }
    }

    /* Mobile override para track ascendente */
    @media (max-width: 768px) {
      .track-ascend { height: auto !important; }
      .track-ascend > [data-track-node] {
        display: block !important;
        position: relative !important;
        left: auto !important; right: auto !important;
        top: auto !important; bottom: auto !important;
        width: 100% !important;
        margin-bottom: 1.5rem;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },

      hero_eyebrow: { es: 'Your Journey', en: 'Your Journey' },
      hero_title_1: { es: 'Un camino ascendente.', en: 'An ascending path.' },
      hero_title_2: { es: 'El tuyo.', en: 'Yours.' },
      hero_subtitle: {
        es: 'Cinco pasos. Una transformación.',
        en: 'Five steps. One transformation.'
      },

      /* Track nodos — claims rojos Laura + verbatim validados */
      n0_meta: { es: 'Paso 1 · Email', en: 'Step 1 · Email' },
      n0_title: { es: 'El correo que lo cambia todo.', en: 'The email that changes everything.' },
      n0_body: { es: 'Tu primer contacto con el programa. Te dará acceso a este reto y será el punto de partida del recorrido.', en: 'Your first contact with the program. It gives you access to this challenge and marks the start of the journey.' },

      n1_meta: { es: 'Paso 2 · Online', en: 'Step 2 · Online' },
      n1_title: { es: 'Conoce a tu coach. Nunca duerme.', en: 'Meet your coach. She never sleeps.' },
      n1_body: { es: 'Nadia, tu AI Leadership Coach, te acompañará a lo largo de todo el proceso y aprenderás a sacar el máximo partido a su apoyo.', en: 'Nadia, your AI Leadership Coach, will accompany you throughout the whole process and you will learn how to get the most from her support.' },

      n2_meta: { es: 'Paso 3 · Virtual', en: 'Step 3 · Virtual' },
      n2_title: { es: 'Bienvenido a tu cohorte.', en: 'Welcome to your cohort.' },
      n2_body: { es: 'Se presentará el programa y conocerás a tu cohorte, el grupo de personas con las que compartirás esta experiencia.', en: 'The program will be presented and you will meet your cohort — the group you will share this experience with.' },

      n3_meta: { es: 'Paso 4 · Online', en: 'Step 4 · Online' },
      n3_title: { es: 'Mírate al espejo.', en: 'Look in the mirror.' },
      n3_body: { es: 'Un autodiagnóstico diseñado para ayudarte a comprender cómo lideras hoy e identificar cómo puedes amplificar tu impacto como líder.', en: 'A self-diagnosis designed to help you understand how you lead today and identify how to amplify your impact as a leader.' },
      n3_cta: { es: 'Empezar ahora', en: 'Start now' },

      n4_meta: { es: 'Paso 5 · Presencial · Universitas', en: 'Step 5 · In-person · Universitas' },
      n4_title: { es: 'Tres días que no olvidarás.', en: 'Three days you will not forget.' },
      n4_body: { es: 'Vivirás una experiencia presencial de tres días en Universitas. El corazón del programa y el momento donde todo converge: reflexión, aprendizaje y acción.', en: 'Three in-person days at Universitas. The heart of the program — where reflection, learning and action converge.' },
      n4_cta: { es: 'Ver agenda', en: 'See agenda' },

      /* Fases */



      /* CTA final */
      next_title_pre: { es: 'Empieza con ', en: 'Start with your ' },
      next_title_em: { es: 'tu Autodiagnóstico.', en: 'Self-Diagnosis.' },
      next_body: { es: 'El primer paso real del Journey. Confidencial, no evaluativo, tuyo.', en: 'The first real step of the Journey. Confidential, non-evaluative, yours.' },
      next_cta: { es: 'Ir al Autodiagnóstico', en: 'Go to Self-Diagnosis' }
    };
  </script>
</head>
<body class="flex flex-col min-h-screen bg-paper text-ink font-sans antialiased">

  <!-- HEADER -->
  <header id="site-navbar" class="sticky top-0 z-50 bg-paper/90 backdrop-blur-md border-b border-ink/10"></header>

  <main class="flex-1">

    <!-- HERO -->
    <section class="bg-tef-gradient-dark text-paper relative overflow-hidden" data-journey-hero>
      <div class="relative max-w-7xl mx-auto px-6 md:px-10 py-20 md:py-28">
        <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-paper/60 mb-6" data-journey-eyebrow x-text="t('hero_eyebrow')"></p>
        <h1 class="font-sans font-normal leading-[0.95] tracking-tight text-5xl md:text-7xl lg:text-[5.5rem] mb-6">
          <span x-text="t('hero_title_1')"></span>
          <em class="italic font-normal text-tef-blue" x-text="' ' + t('hero_title_2')"></em>
        </h1>
        <p class="text-sm md:text-base text-paper/70 max-w-2xl leading-relaxed" data-journey-sub x-text="t('hero_subtitle')"></p>
      </div>
    </section>

    <!-- TRACK VISUAL ASCENDENTE -->
    <section class="relative w-full overflow-hidden bg-tef-gradient-light py-20 md:py-28">
      <!-- Líneas topográficas -->
      <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
        <div class="absolute top-[40%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[60%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[80%] left-0 right-0 h-px bg-tef-dark/5"></div>
      </div>
      <!-- Orbital ambiente -->
      <svg class="absolute top-12 right-10 w-[420px] h-[420px] opacity-[0.08] pointer-events-none orbit" viewBox="0 0 400 400" fill="none" aria-hidden="true">
        <ellipse cx="200" cy="200" rx="180" ry="85" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 6" transform="rotate(-30 200 200)"/>
        <ellipse cx="200" cy="200" rx="155" ry="65" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 6" transform="rotate(20 200 200)"/>
        <circle cx="380" cy="165" r="4" fill="#0066FF"/>
      </svg>

      <div class="relative max-w-7xl mx-auto px-6">
        <!-- Header -->
        <div class="max-w-2xl mb-10 md:mb-12" data-reveal="up">
          <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-tef-blue mb-4">Track · It's on Us</p>
          <h2 class="font-sans font-normal text-4xl md:text-5xl lg:text-6xl text-tef-dark leading-tight tracking-tight">
            <span x-text="lang==='es' ? 'Cinco paradas.' : 'Five stops.'"></span>
            <em class="text-tef-blue italic font-normal block" x-text="lang==='es' ? 'Una dirección.' : 'One direction.'"></em>
          </h2>
        </div>

        <!-- Track ascendente — 5 paradas -->
        <div class="relative track-ascend" style="height: 700px">
          <!-- SVG path ascendente — 5 círculos -->
          <svg class="absolute inset-0 w-full h-full" style="z-index:0" viewBox="0 0 1200 700" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="pathB" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0066FF" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#0066FF" stop-opacity="1"/>
              </linearGradient>
              <linearGradient id="glowB" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0066FF" stop-opacity="0"/>
                <stop offset="100%" stop-color="#0066FF" stop-opacity="0.12"/>
              </linearGradient>
            </defs>
            <!-- glow bajo el path -->
            <path d="M 60 660 Q 200 630, 280 590 T 520 460 T 760 330 T 1140 280 L 1140 700 L 60 700 Z" fill="url(#glowB)"/>
            <!-- path principal -->
            <path d="M 60 660 Q 200 630, 280 590 T 520 460 T 760 330 T 1140 280"
                  stroke="url(#pathB)" stroke-width="2" fill="none"
                  stroke-dasharray="8 6" class="ascent-breathe"/>
            <!-- marcadores — 5 paradas -->
            <circle cx="60"   cy="660" r="7" fill="#0066FF"/>
            <circle cx="280"  cy="590" r="7" fill="#0066FF"/>
            <circle cx="520"  cy="460" r="8" fill="#0066FF"/>
            <circle cx="760"  cy="330" r="8" fill="#0066FF"/>
            <circle cx="1140" cy="280" r="7" fill="#0066FF"/>
          </svg>

          <!-- NODO 0 — El correo (punto de partida, abajo izquierda) -->
          <div class="absolute left-[1%] top-[86%] w-[260px] z-10" data-track-node>
            <div class="relative bg-white rounded-br-2xl p-5 border border-tef-dark/15 shadow-[0_6px_20px_rgba(3,26,52,0.06)]">
              <div class="absolute -top-3 right-6 w-6 h-6 bg-white border-2 border-tef-blue/40 rotate-45"></div>
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-dark/60 mb-2" x-text="t('n0_meta')"></p>
              <h3 class="font-sans text-base font-normal text-tef-dark mb-1.5" x-text="t('n0_title')"></h3>
              <p class="text-[12px] text-tef-dark/70 leading-snug" x-text="t('n0_body')"></p>
            </div>
          </div>

          <!-- NODO 1 — Nadia (izq, posición baja) -->
          <div class="absolute left-[14%] top-[70%] w-[270px] z-10" data-track-node>
            <div class="relative bg-white rounded-br-2xl p-5 border border-tef-dark/15 shadow-[0_6px_20px_rgba(3,26,52,0.06)]">
              <div class="absolute -top-3 right-6 w-6 h-6 bg-white border-2 border-tef-blue rotate-45"></div>
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-dark/60 mb-2" x-text="t('n1_meta')"></p>
              <h3 class="font-sans text-lg font-normal text-tef-dark mb-2" x-text="t('n1_title')"></h3>
              <p class="text-[13px] text-tef-dark/70 leading-snug" x-text="t('n1_body')"></p>
            </div>
          </div>

          <!-- NODO 2 — Bienvenida (informativo) -->
          <div class="absolute left-[30%] top-[50%] w-[270px] z-10" data-track-node>
            <div class="relative bg-white rounded-br-2xl p-5 border border-tef-dark/15 shadow-[0_6px_20px_rgba(3,26,52,0.06)]">
              <div class="absolute -top-3 right-6 w-6 h-6 bg-white border-2 border-tef-dark rotate-45"></div>
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-dark/60 mb-2" x-text="t('n2_meta')"></p>
              <h3 class="font-sans text-lg font-normal text-tef-dark mb-2" x-text="t('n2_title')"></h3>
              <p class="text-[13px] text-tef-dark/70 leading-snug" x-text="t('n2_body')"></p>
            </div>
          </div>

          <!-- NODO 3 — Autodiagnóstico (CLICKABLE) -->
          <a href="autodiagnostico.html"
             class="absolute left-[48%] top-[22%] w-[290px] z-10 group focus:outline-none focus-visible:ring-4 focus-visible:ring-tef-blue/40 rounded-br-2xl" data-track-node
             :aria-label="lang==='es' ? 'Autodiagnóstico, abrir' : 'Self-diagnosis, open'">
            <div class="relative bg-white rounded-br-2xl pb-20 pt-6 px-6 border border-tef-blue shadow-[0_12px_40px_rgba(0,102,255,0.18)] transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-[0_20px_50px_rgba(0,102,255,0.28)] overflow-hidden">
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-blue mb-3" x-text="t('n3_meta')"></p>
              <h3 class="font-sans text-xl font-normal text-tef-dark mb-2" x-text="t('n3_title')"></h3>
              <p class="text-sm text-tef-dark/75 leading-relaxed" x-text="t('n3_body')"></p>
              <span class="absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 group-hover:bg-blue-700 transition-colors">
                <span class="font-mono text-xs tracking-[0.18em] uppercase" x-text="t('n3_cta')"></span>
                <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </span>
            </div>
          </a>

          <!-- NODO 4 — ALW (CLICKABLE, destacado, arriba-derecha) -->
          <a href="agenda.html"
             class="absolute right-[1%] top-[2%] w-[300px] z-10 group focus:outline-none focus-visible:ring-4 focus-visible:ring-tef-blue/40 rounded-br-2xl" data-track-node
             :aria-label="lang==='es' ? 'Action Learning Week, abrir agenda' : 'Action Learning Week, open agenda'">
            <div class="relative bg-tef-dark rounded-br-2xl pb-20 pt-6 px-6 border border-tef-blue shadow-[0_12px_40px_rgba(0,102,255,0.25)] transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-[0_20px_55px_rgba(0,102,255,0.38)] overflow-hidden">
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-[#7FB3FF] mb-3" x-text="t('n4_meta')"></p>
              <h3 class="font-sans text-xl font-normal text-white mb-2" x-text="t('n4_title')"></h3>
              <p class="text-sm text-white/75 leading-relaxed" x-text="t('n4_body')"></p>
              <span class="absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 group-hover:bg-blue-700 transition-colors">
                <span class="font-mono text-xs tracking-[0.18em] uppercase" x-text="t('n4_cta')"></span>
                <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </span>
            </div>
          </a>
        </div>
      </div>
    </section>


    <!-- CTA NEXT -->
    <section class="bg-paper py-14 md:py-16">
      <div class="max-w-7xl mx-auto px-6 md:px-10">
        <div class="relative bg-tef-dark text-paper rounded-br-2xl px-8 md:px-12 pt-12 pb-20 overflow-hidden" data-reveal="up">
          <h3 class="font-sans font-normal text-3xl md:text-5xl leading-[1.05] tracking-tight mb-3" data-split-words>
            <span x-text="t('next_title_pre')"></span><em class="italic text-tef-blue" x-text="t('next_title_em')"></em>
          </h3>
          <p class="text-[15px] text-paper/70 max-w-xl leading-relaxed" x-text="t('next_body')"></p>
          <a href="autodiagnostico.html" class="group absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 rounded-br-2xl hover:bg-blue-700 transition-colors">
            <span class="font-mono text-xs tracking-[0.18em] uppercase" x-text="t('next_cta')"></span>
            <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer id="site-footer" class="bg-tef-dark text-paper mt-auto"></footer>

  <script src="components.js"></script>
  <script src="scroll.js"></script>
</body>
</html>
