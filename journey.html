<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'journey',
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey — Accelerate Impact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"Telefonica Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    *, *::before, *::after { font-family: "Telefonica Sans", sans-serif !important; }
    body, p, span, a, li, td, th, label, input, button, textarea, select { font-family: "Telefonica Sans", sans-serif !important; }
    body { font-feature-settings: "cv11", "ss01"; }
    .bg-tef-gradient-dark { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-tef-gradient-light { background: linear-gradient(180deg, #F7F7FF 0%, #ECEEF7 50%, #F7F7FF 100%); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
    .reveal-1 { animation-delay: 0.1s; } .reveal-2 { animation-delay: 0.2s; } .reveal-3 { animation-delay: 0.3s; }

    @keyframes dashflow { to { stroke-dashoffset: -170; } }
    .ascent-breathe { animation: dashflow 20s linear infinite; }

    @keyframes orbit { to { transform: rotate(360deg); } }
    .orbit { animation: orbit 24s linear infinite; transform-origin: center; }
    .orbit-rev { animation: orbit 30s linear infinite reverse; transform-origin: center; }

    @media (prefers-reduced-motion: reduce) {
      .ascent-breathe, .orbit, .orbit-rev, .reveal { animation: none; }
    }

    /* Mobile override para track ascendente */
    @media (max-width: 768px) {
      .track-ascend { height: auto !important; }
      .track-ascend > [data-track-node] {
        position: relative !important;
        left: auto !important; right: auto !important;
        top: auto !important; bottom: auto !important;
        width: 100% !important;
        margin-bottom: 1rem;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },

      hero_eyebrow: { es: 'Your Journey', en: 'Your Journey' },
      hero_title_1: { es: 'Un camino', en: 'An ascending' },
      hero_title_2: { es: 'ascendente.', en: 'path.' },
      hero_subtitle: {
        es: 'Cuatro paradas conectadas. Dos clickables donde tú actúas. Dos que te acompañan.',
        en: 'Four connected stops. Two clickable where you act. Two that accompany you.'
      },

      /* Track nodos */
      n1_meta: { es: 'Virtual · antes de empezar', en: 'Virtual · before kick-off' },
      n1_title: { es: 'Sesión de bienvenida', en: 'Welcome Session' },
      n1_body: { es: 'Conoces el programa, a tu cohorte y el sentido del viaje que empiezas.', en: 'You meet the program, your cohort and the meaning of the journey ahead.' },
      n1_tag: { es: 'Informativo', en: 'Informational' },

      n2_meta: { es: 'Online · antes del ALW', en: 'Online · before ALW' },
      n2_title: { es: 'Autodiagnóstico', en: 'Self-Diagnosis' },
      n2_body: { es: 'Tres cuestionarios, dos informes. El punto de partida más honesto.', en: 'Three assessments, two reports. The most honest starting point.' },
      n2_cta: { es: 'Empezar ahora', en: 'Start now' },
      n2_tag: { es: 'Acción', en: 'Action' },

      n3_meta: { es: 'Presencial · Universitas', en: 'In-person · Universitas' },
      n3_title: { es: 'Action Learning Week', en: 'Action Learning Week' },
      n3_body: { es: 'Tres días residenciales. El corazón del programa y el momento donde todo converge.', en: 'Three residential days. The heart of the program where everything converges.' },
      n3_cta: { es: 'Ver agenda completa', en: 'See full agenda' },
      n3_tag: { es: 'Acción', en: 'Action' },

      n4_meta: { es: 'Online · todo el recorrido', en: 'Online · the whole journey' },
      n4_title: { es: 'Sesiones con Nadia', en: 'Nadia Sessions' },
      n4_body: { es: 'Tu AI Coach personal te acompaña antes, durante y después.', en: 'Your personal AI Coach accompanies you before, during and after.' },
      n4_tag: { es: 'Siempre disponible', en: 'Always on' },

      /* Fases */
      phase_eyebrow: { es: 'Tres fases. Un mismo compromiso.', en: 'Three phases. One commitment.' },
      phase1_label: { es: 'Fase 01', en: 'Phase 01' },
      phase1_title: { es: 'Assess', en: 'Assess' },
      phase1_sub: { es: 'Conócete antes de actuar', en: 'Know yourself before acting' },
      phase1_body: { es: 'Entiendes tu perfil de liderazgo y el punto desde el que partes. Sin diagnóstico no hay viaje.', en: 'You understand your leadership profile and the point from which you start. No diagnosis, no journey.' },

      phase2_label: { es: 'Fase 02', en: 'Phase 02' },
      phase2_title: { es: 'Activate', en: 'Activate' },
      phase2_sub: { es: 'Inmersión presencial', en: 'In-person immersion' },
      phase2_body: { es: 'Tres días de Action Learning Week en Universitas. Aprendizaje, pares y decisiones reales.', en: 'Three Action Learning Week days at Universitas. Learning, peers and real decisions.' },

      phase3_label: { es: 'Fase 03', en: 'Phase 03' },
      phase3_title: { es: 'Drive Action', en: 'Drive Action' },
      phase3_sub: { es: 'Del insight al impacto', en: 'From insight to impact' },
      phase3_body: { es: 'Aplicación sostenida con pares, comunidad y Nadia. Cambio de conducta, no sólo de información.', en: 'Sustained application with peers, community and Nadia. Behaviour change, not just information.' },

      /* CTA final */
      next_title_pre: { es: 'Empieza con ', en: 'Start with your ' },
      next_title_em: { es: 'tu Autodiagnóstico.', en: 'Self-Diagnosis.' },
      next_body: { es: 'El primer paso real del Journey. Confidencial, no evaluativo, tuyo.', en: 'The first real step of the Journey. Confidential, non-evaluative, yours.' },
      next_cta: { es: 'Ir al Autodiagnóstico', en: 'Go to Self-Diagnosis' }
    };
  </script>
</head>
<body class="flex flex-col min-h-screen bg-paper text-ink font-sans antialiased">

  <!-- HEADER -->
  <header id="site-navbar" class="sticky top-0 z-50 bg-paper/90 backdrop-blur-md border-b border-ink/10"></header>

  <main class="flex-1">

    <!-- HERO -->
    <section class="bg-tef-gradient-dark text-paper relative overflow-hidden">
      <div class="relative max-w-7xl mx-auto px-6 md:px-10 py-20 md:py-28">
        <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-paper/60 mb-6 reveal reveal-1" x-text="t('hero_eyebrow')"></p>
        <h1 class="font-sans font-normal leading-[0.95] tracking-tight text-5xl md:text-7xl lg:text-[5.5rem] mb-6 reveal reveal-2">
          <span x-text="t('hero_title_1')"></span>
          <em class="italic font-normal text-tef-blue" x-text="' ' + t('hero_title_2')"></em>
        </h1>
        <p class="text-sm md:text-base text-paper/70 max-w-2xl leading-relaxed reveal reveal-3" x-text="t('hero_subtitle')"></p>
      </div>
    </section>

    <!-- TRACK VISUAL ASCENDENTE -->
    <section class="relative w-full overflow-hidden bg-tef-gradient-light py-20 md:py-28">
      <!-- Líneas topográficas -->
      <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
        <div class="absolute top-[40%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[60%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[80%] left-0 right-0 h-px bg-tef-dark/5"></div>
      </div>
      <!-- Orbital ambiente -->
      <svg class="absolute top-12 right-10 w-[420px] h-[420px] opacity-[0.08] pointer-events-none orbit" viewBox="0 0 400 400" fill="none" aria-hidden="true">
        <ellipse cx="200" cy="200" rx="180" ry="85" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 6" transform="rotate(-30 200 200)"/>
        <ellipse cx="200" cy="200" rx="155" ry="65" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 6" transform="rotate(20 200 200)"/>
        <circle cx="380" cy="165" r="4" fill="#0066FF"/>
      </svg>

      <div class="relative max-w-7xl mx-auto px-6">
        <!-- Header -->
        <div class="max-w-2xl mb-16 md:mb-20 reveal">
          <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-tef-blue mb-4">Track · It's on Us</p>
          <h2 class="font-sans font-normal text-4xl md:text-5xl lg:text-6xl text-tef-dark leading-tight tracking-tight">
            <span x-text="lang==='es' ? 'Cuatro paradas.' : 'Four stops.'"></span>
            <em class="text-tef-blue italic font-normal block" x-text="lang==='es' ? 'Una dirección.' : 'One direction.'"></em>
          </h2>
        </div>

        <!-- Track ascendente -->
        <div class="relative track-ascend" style="height: 620px">
          <!-- SVG path ascendente -->
          <svg class="absolute inset-0 w-full h-full" style="z-index:0" viewBox="0 0 1200 620" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="pathB" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0066FF" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#0066FF" stop-opacity="1"/>
              </linearGradient>
              <linearGradient id="glowB" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0066FF" stop-opacity="0"/>
                <stop offset="100%" stop-color="#0066FF" stop-opacity="0.12"/>
              </linearGradient>
            </defs>
            <!-- glow bajo el path -->
            <path d="M 60 610 Q 250 555, 380 460 T 700 330 T 1140 190 L 1140 620 L 60 620 Z" fill="url(#glowB)"/>
            <!-- path principal — queda bajo los nodos con espacio visible -->
            <path d="M 60 610 Q 250 555, 380 460 T 700 330 T 1140 190"
                  stroke="url(#pathB)" stroke-width="2" fill="none"
                  stroke-dasharray="8 6" class="ascent-breathe"/>
            <!-- marcadores -->
            <circle cx="60"   cy="610" r="7" fill="#0066FF"/>
            <circle cx="380"  cy="460" r="8" fill="#0066FF"/>
            <circle cx="700"  cy="330" r="8" fill="#0066FF"/>
            <circle cx="1140" cy="190" r="7" fill="#0066FF"/>
          </svg>

          <!-- NODO 1 — Welcome (izq, posición media-baja) -->
          <div class="absolute left-[1%] top-[42%] w-[270px] z-10" data-track-node>
            <div class="relative bg-white rounded-br-2xl p-5 border border-tef-dark/15 shadow-[0_6px_20px_rgba(3,26,52,0.06)]">
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-dark/60 mb-2" x-text="t('n1_meta')"></p>
              <h3 class="font-sans text-lg font-normal text-tef-dark mb-2" x-text="t('n1_title')"></h3>
              <p class="text-[13px] text-tef-dark/70 leading-snug" x-text="t('n1_body')"></p>
            </div>
          </div>

          <!-- NODO 2 — Self-Diagnosis (CLICKABLE) -->
          <a href="autodiagnostico.html"
             class="absolute left-[22%] top-[18%] w-[300px] z-10 group focus:outline-none focus-visible:ring-4 focus-visible:ring-tef-blue/40 rounded-br-2xl" data-track-node
             :aria-label="lang==='es' ? 'Autodiagnóstico, abrir' : 'Self-diagnosis, open'">
            <div class="relative bg-white rounded-br-2xl pb-20 pt-6 px-6 border border-tef-blue shadow-[0_12px_40px_rgba(0,102,255,0.18)] transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-[0_20px_50px_rgba(0,102,255,0.28)] overflow-hidden">
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-blue mb-3" x-text="t('n2_meta')"></p>
              <h3 class="font-sans text-xl font-normal text-tef-dark mb-2" x-text="t('n2_title')"></h3>
              <p class="text-sm text-tef-dark/75 leading-relaxed" x-text="t('n2_body')"></p>
              <span class="absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 group-hover:bg-blue-700 transition-colors">
                <span class="font-mono text-xs tracking-[0.18em] uppercase" x-text="t('n2_cta')"></span>
                <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </span>
            </div>
          </a>

          <!-- NODO 3 — ALW (CLICKABLE, destacado) -->
          <a href="agenda.html"
             class="absolute left-[48%] top-[3%] w-[320px] z-10 group focus:outline-none focus-visible:ring-4 focus-visible:ring-tef-blue/40 rounded-br-2xl" data-track-node
             :aria-label="lang==='es' ? 'Action Learning Week, abrir agenda' : 'Action Learning Week, open agenda'">
            <div class="relative bg-tef-dark rounded-br-2xl pb-20 pt-6 px-6 border border-tef-blue shadow-[0_12px_40px_rgba(0,102,255,0.25)] transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-[0_20px_55px_rgba(0,102,255,0.38)] overflow-hidden">
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-[#7FB3FF] mb-3" x-text="t('n3_meta')"></p>
              <h3 class="font-sans text-xl font-normal text-white mb-2" x-text="t('n3_title')"></h3>
              <p class="text-sm text-white/75 leading-relaxed" x-text="t('n3_body')"></p>
              <span class="absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 group-hover:bg-blue-700 transition-colors">
                <span class="font-mono text-xs tracking-[0.18em] uppercase" x-text="t('n3_cta')"></span>
                <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              </span>
            </div>
          </a>

          <!-- NODO 4 — Nadia (no clickable, arriba-derecha) -->
          <div class="absolute right-[1%] top-[1%] w-[260px] z-10" data-track-node>
            <div class="relative bg-white rounded-br-2xl p-5 border border-tef-blue/25 shadow-sm">
              <p class="font-mono text-[10px] font-normal uppercase tracking-widest text-tef-blue/80 mb-2" x-text="t('n4_meta')"></p>
              <h3 class="font-sans text-lg font-normal text-tef-dark mb-2" x-text="t('n4_title')"></h3>
              <p class="text-[13px] text-tef-dark/70 leading-snug" x-text="t('n4_body')"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FASES -->
    <section class="bg-paper py-20 md:py-28">
      <div class="max-w-7xl mx-auto px-6 md:px-10">
        <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-tef-blue mb-12 text-center" x-text="t('phase_eyebrow')"></p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-12">
          <!-- PHASE 1 -->
          <article class="relative">
            <p class="font-sans font-normal leading-none text-tef-blue/10 text-[8rem] md:text-[10rem] mb-2 select-none">01</p>
            <div class="flex items-center gap-3 mb-4">
              <span class="font-mono text-[10px] tracking-[0.25em] uppercase text-tef-blue" x-text="t('phase1_label')"></span>
              <span class="flex-1 h-px bg-ink/10"></span>
            </div>
            <h3 class="font-sans font-normal text-4xl md:text-5xl tracking-tight text-ink mb-2" x-text="t('phase1_title')"></h3>
            <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-mute mb-5" x-text="t('phase1_sub')"></p>
            <p class="text-[15px] text-ink-soft leading-relaxed" x-text="t('phase1_body')"></p>
          </article>

          <!-- PHASE 2 -->
          <article class="relative">
            <p class="font-sans font-normal leading-none text-tef-blue/10 text-[8rem] md:text-[10rem] mb-2 select-none">02</p>
            <div class="flex items-center gap-3 mb-4">
              <span class="font-mono text-[10px] tracking-[0.25em] uppercase text-tef-blue" x-text="t('phase2_label')"></span>
              <span class="flex-1 h-px bg-ink/10"></span>
            </div>
            <h3 class="font-sans font-normal text-4xl md:text-5xl tracking-tight text-ink mb-2" x-text="t('phase2_title')"></h3>
            <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-mute mb-5" x-text="t('phase2_sub')"></p>
            <p class="text-[15px] text-ink-soft leading-relaxed" x-text="t('phase2_body')"></p>
          </article>

          <!-- PHASE 3 -->
          <article class="relative">
            <p class="font-sans font-normal leading-none text-tef-blue/10 text-[8rem] md:text-[10rem] mb-2 select-none">03</p>
            <div class="flex items-center gap-3 mb-4">
              <span class="font-mono text-[10px] tracking-[0.25em] uppercase text-tef-blue" x-text="t('phase3_label')"></span>
              <span class="flex-1 h-px bg-ink/10"></span>
            </div>
            <h3 class="font-sans font-normal text-4xl md:text-5xl tracking-tight text-ink mb-2" x-text="t('phase3_title')"></h3>
            <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-mute mb-5" x-text="t('phase3_sub')"></p>
            <p class="text-[15px] text-ink-soft leading-relaxed" x-text="t('phase3_body')"></p>
          </article>
        </div>
      </div>
    </section>

    <!-- CTA NEXT -->
    <section class="bg-paper py-14 md:py-16">
      <div class="max-w-7xl mx-auto px-6 md:px-10">
        <div class="relative bg-tef-dark text-paper rounded-br-2xl px-8 md:px-12 pt-12 pb-20 overflow-hidden">
          <h3 class="font-sans font-normal text-3xl md:text-5xl leading-[1.05] tracking-tight mb-3">
            <span x-text="t('next_title_pre')"></span><em class="italic text-tef-blue" x-text="t('next_title_em')"></em>
          </h3>
          <p class="text-[15px] text-paper/70 max-w-xl leading-relaxed" x-text="t('next_body')"></p>
          <a href="autodiagnostico.html" class="group absolute bottom-0 right-0 inline-flex items-center gap-3 bg-tef-blue text-white px-7 py-4 rounded-br-2xl hover:bg-blue-700 transition-colors">
            <span class="font-mono text-xs tracking-[0.18em] uppercase" x-text="t('next_cta')"></span>
            <svg class="w-5 h-5 group-hover:translate-x-0.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer id="site-footer" class="bg-tef-dark text-paper mt-auto"></footer>

  <script src="components.js"></script>
</body>
</html>
