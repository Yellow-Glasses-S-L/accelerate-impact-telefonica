<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'journey',
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey — Accelerate Impact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"Telefonica Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    *, *::before, *::after { font-family: "Telefonica Sans", sans-serif !important; }
    body, p, span, a, li, td, th, label, input, button, textarea, select { font-family: "Telefonica Sans", sans-serif !important; }
    body { font-feature-settings: "cv11", "ss01"; }
    .bg-tef-gradient-dark { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-tef-gradient-light { background: linear-gradient(180deg, #F7F7FF 0%, #ECEEF7 50%, #F7F7FF 100%); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    @keyframes dashflow { to { stroke-dashoffset: -170; } }
    .ascent-breathe { animation: dashflow 20s linear infinite; }

    @keyframes orbit { to { transform: rotate(360deg); } }
    .orbit { animation: orbit 24s linear infinite; transform-origin: center; }

    @media (prefers-reduced-motion: reduce) {
      .ascent-breathe, .orbit, .reveal { animation: none; }
    }

    /* ── MOBILE: stack cards vertically, disable horizontal scroll ── */
    @media (max-width: 767px) {
      #journey-hscroll-pin {
        position: static !important;
        height: auto !important;
        display: block !important;
      }
      #journey-hscroll-section { height: auto !important; }
      #journey-track {
        flex-direction: column !important;
        width: 100% !important;
        padding: 1.5rem 1.5rem 2rem !important;
        transform: none !important;
        gap: 2rem;
      }
      .journey-card {
        width: 100% !important;
        height: auto !important;
        display: flex !important;
        flex-direction: column !important;
      }
      /* Image: relative flow, full width */
      .journey-card > div:first-child {
        position: relative !important;
        width: 100% !important;
        height: 56vw !important;
        left: auto !important; top: auto !important;
        aspect-ratio: auto !important;
        transform: none !important;
        box-shadow: none !important;
        flex-shrink: 0;
      }
      /* Text card: normal flow below image */
      .journey-card > div:nth-child(2) {
        position: relative !important;
        left: auto !important; bottom: auto !important;
        width: 100% !important;
        transform: none !important;
        margin-top: 0.75rem;
      }
      #journey-tabs,
      #journey-progress-wrap { display: none !important; }
      #journey-active-num { display: none !important; }
      [data-journey-header] {
        padding-top: 1.5rem !important;
        padding-bottom: 0.5rem !important;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },

      hero_title_1: { es: 'Un camino ascendente.', en: 'An ascending path.' },
      hero_title_2: { es: 'El tuyo.', en: 'Yours.' },
      hero_subtitle: {
        es: 'Cinco pasos. Una transformación.',
        en: 'Five steps. One transformation.'
      },

      /* Track nodos — claims rojos Laura + verbatim validados */
      n0_meta: { es: 'Correo de invitación', en: 'Invitation email' },
      n0_title: { es: 'El correo que lo cambia todo.', en: 'The email that changes everything.' },
      n0_body: { es: 'Te dará acceso a este reto. Será tu primer contacto con el programa y el punto de partida del recorrido.', en: 'It will give you access to this challenge. Your first contact with the program and the starting point of the journey.' },

      n1_meta: { es: 'Sesiones online para conocer Nadia', en: 'Online sessions to meet Nadia' },
      n1_title: { es: 'Conoce a tu coach.', en: 'Meet your coach.' },
      n1_body: { es: 'Nadia, tu AI Leadership Coach, que te acompañará a lo largo de todo el proceso. Aprenderás a sacar el máximo partido a su apoyo.', en: 'Nadia, your AI Leadership Coach, who will accompany you throughout the whole process. You will learn how to get the most from her support.' },

      n2_meta: { es: 'Paso 3 · Virtual', en: 'Step 3 · Virtual' },
      n2_title: { es: 'Sesión online de bienvenida.', en: 'Online welcome session.' },
      n2_body: { es: 'Conocerás el programa, su estructura y los compañeros con los que compartirás este camino.', en: 'You will get to know the program, its structure and the colleagues you will share this journey with.' },

      n3_meta: { es: 'Paso 4 · Online', en: 'Step 4 · Online' },
      n3_title: { es: 'Autodiagnóstico de liderazgo.', en: 'Leadership self-diagnosis.' },
      n3_body: { es: 'Te ayudará a comprender cómo lideras hoy e identificar cómo puedes amplificar tu impacto como líder.', en: 'It will help you understand how you lead today and identify how you can amplify your impact as a leader.' },
      n3_cta: { es: 'Más información', en: 'More information' },

      n4_meta: { es: 'Paso 5 · Presencial · Universitas', en: 'Step 5 · In-person · Universitas' },
      n4_title: { es: 'Residential Action Learning Week en Universitas.', en: 'Residential Action Learning Week at Universitas.' },
      n4_body: { es: 'Vivirás una experiencia presencial de tres días en Universitas. Es el corazón del programa y el momento en el que todo converge: reflexión, aprendizaje y acción.', en: 'Three in-person days at Universitas. The heart of the program — the moment where everything converges: reflection, learning and action.' },
      n4_cta: { es: 'Ver agenda', en: 'See agenda' },

      /* Fases */



      /* CTA final */
      track_title_1: { es: 'Cinco paradas,', en: 'Five stops,' },
      track_title_2: { es: 'un solo programa.', en: 'one program.' },

    };
  </script>
</head>
<body class="flex flex-col min-h-screen bg-paper text-ink font-sans antialiased">

  <!-- HEADER -->
  <header id="site-navbar" class="sticky top-0 z-50 bg-paper/90 backdrop-blur-md border-b border-ink/10"></header>

  <main class="flex-1">

    <!-- HERO -->
    <section class="bg-tef-gradient-dark text-paper relative overflow-hidden" data-journey-hero data-nav-dark style="margin-top:-79px;">
      <div class="relative max-w-[1920px] mx-auto px-6 md:px-12 lg:px-16 pt-32 pb-20 md:pt-40 md:pb-28">
        <h1 class="font-sans font-normal leading-[0.95] tracking-tight text-4xl md:text-8xl lg:text-[7rem] mb-6">
          <span x-text="t('hero_title_1')"></span>
          <em class="italic font-normal text-tef-blue" x-text="' ' + t('hero_title_2')"></em>
        </h1>
        <p class="text-sm md:text-base text-paper/70 max-w-2xl leading-relaxed" data-journey-sub x-text="t('hero_subtitle')"></p>
      </div>
    </section>

    <!-- TRACK — 5 paradas — misma estructura que home "La Comunidad de Líderes" -->
    <section id="journey-hscroll-section" class="bg-tef-gradient-light">

      <!-- Progress bar fija al fondo del viewport (igual que home) -->
      <div id="journey-progress-wrap" aria-hidden="true"
           style="position:fixed;bottom:0;left:0;right:0;height:4px;z-index:45;background:rgba(3,26,52,0.1);opacity:0;transition:opacity 0.3s ease;pointer-events:none;">
        <div id="journey-progress" style="width:0%;height:100%;background:#0066FF;transition:none;"></div>
      </div>

      <!-- CSS sticky — sin GSAP pin para evitar conflicto con Lenis -->
      <div id="journey-hscroll-pin" style="position:sticky; top:0; height:100vh; display:flex; flex-direction:column;">

        <!-- Header fijo dentro del pin -->
        <div class="px-6 md:px-12 lg:px-16 pt-12 md:pt-16 pb-6 max-w-[1920px] mx-auto w-full relative" data-journey-header>
          <div class="flex items-end justify-between gap-8">
            <div>
              <h2 class="font-sans font-normal tracking-tight text-tef-dark leading-[0.95]"
                  style="font-size: clamp(1.5rem, 5vw, 5.5rem)">
                <span x-text="t('track_title_1')"></span>
                <em class="font-normal italic text-tef-blue" x-text="' ' + t('track_title_2')"></em>
              </h2>
            </div>
            <!-- Número activo — igual que home -->
            <span id="journey-active-num" class="font-sans font-normal text-tef-blue leading-none flex-shrink-0 select-none"
                  style="font-size: clamp(40px, 11vw, 150px); letter-spacing:-0.05em; line-height:0.9;">01</span>
          </div>
        </div>

        <!-- Track horizontal -->
        <div class="relative overflow-hidden flex-1 flex items-center">
          <div id="journey-track" class="flex" style="width: max-content; padding-right: 4rem;">

            <!-- PASO 01 -->
            <article class="journey-card flex-shrink-0 relative" style="height:clamp(300px,min(42vw,62vh),650px);">
              <div class="absolute left-0 top-0 h-full overflow-hidden" style="aspect-ratio:32/27; box-shadow:8px 0 32px rgba(3,26,52,0.1); transform:rotate(-1.5deg);">
                <img src="https://images.unsplash.com/photo-1584438784894-089d6a62b8fa?w=1600&q=90&fit=crop&crop=center" alt="" class="w-full h-full object-cover">
              </div>
              <div class="absolute bottom-8 bg-paper border border-ink/15 px-7 py-6" style="left:calc(clamp(300px,min(42vw,62vh),650px)*1.185 - 210px); width:clamp(288px,31vw,368px); box-shadow:0 16px 56px rgba(3,26,52,0.28),0 2px 8px rgba(3,26,52,0.12); transform:rotate(0.7deg);">
                <span class="absolute top-3 left-3 w-3.5 h-3.5 border-t border-l border-ink/30"></span>
                <span class="absolute top-3 right-3 w-3.5 h-3.5 border-t border-r border-ink/30"></span>
                <span class="absolute bottom-3 left-3 w-3.5 h-3.5 border-b border-l border-ink/30"></span>
                <span class="absolute bottom-3 right-3 w-3.5 h-3.5 border-b border-r border-ink/30"></span>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase mb-3 flex items-center gap-2"><span class="text-tef-blue">01</span><span class="text-ink/20">·</span><span class="text-ink/50" x-text="t('n0_meta')"></span></p>
                <h3 class="font-sans font-normal text-2xl md:text-3xl leading-tight tracking-tight text-ink mb-4" x-text="t('n0_title')"></h3>
                <p class="text-[17px] text-ink/60 leading-relaxed" x-text="t('n0_body')"></p>
              </div>
            </article>

            <!-- PASO 02 -->
            <article class="journey-card flex-shrink-0 relative" style="height:clamp(300px,min(42vw,62vh),650px);">
              <div class="absolute left-0 top-0 h-full overflow-hidden" style="aspect-ratio:32/27; box-shadow:8px 0 32px rgba(3,26,52,0.1); transform:rotate(1.8deg);">
                <img src="https://images.unsplash.com/photo-1531746790731-6c087fecd65a?w=1600&q=90&fit=crop&crop=center" alt="" class="w-full h-full object-cover">
              </div>
              <div class="absolute bottom-8 bg-paper border border-ink/15 px-7 py-6" style="left:calc(clamp(300px,min(42vw,62vh),650px)*1.185 - 210px); width:clamp(288px,31vw,368px); box-shadow:0 16px 56px rgba(3,26,52,0.28),0 2px 8px rgba(3,26,52,0.12); transform:rotate(-0.5deg);">
                <span class="absolute top-3 left-3 w-3.5 h-3.5 border-t border-l border-ink/30"></span>
                <span class="absolute top-3 right-3 w-3.5 h-3.5 border-t border-r border-ink/30"></span>
                <span class="absolute bottom-3 left-3 w-3.5 h-3.5 border-b border-l border-ink/30"></span>
                <span class="absolute bottom-3 right-3 w-3.5 h-3.5 border-b border-r border-ink/30"></span>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase mb-3 flex items-center gap-2"><span class="text-tef-blue">02</span><span class="text-ink/20">·</span><span class="text-ink/50" x-text="t('n1_meta')"></span></p>
                <h3 class="font-sans font-normal text-2xl md:text-3xl leading-tight tracking-tight text-ink mb-4" x-text="t('n1_title')"></h3>
                <p class="text-[17px] text-ink/60 leading-relaxed" x-text="t('n1_body')"></p>
              </div>
            </article>

            <!-- PASO 03 -->
            <article class="journey-card flex-shrink-0 relative" style="height:clamp(300px,min(42vw,62vh),650px);">
              <div class="absolute left-0 top-0 h-full overflow-hidden" style="aspect-ratio:32/27; box-shadow:8px 0 32px rgba(3,26,52,0.1); transform:rotate(-2.2deg);">
                <img src="https://images.unsplash.com/photo-1612831455359-970e23a1e4e9?w=1600&q=90&fit=crop&crop=center" alt="" class="w-full h-full object-cover">
              </div>
              <div class="absolute bottom-8 bg-paper border border-ink/15 px-7 py-6" style="left:calc(clamp(300px,min(42vw,62vh),650px)*1.185 - 210px); width:clamp(288px,31vw,368px); box-shadow:0 16px 56px rgba(3,26,52,0.28),0 2px 8px rgba(3,26,52,0.12); transform:rotate(0.4deg);">
                <span class="absolute top-3 left-3 w-3.5 h-3.5 border-t border-l border-ink/30"></span>
                <span class="absolute top-3 right-3 w-3.5 h-3.5 border-t border-r border-ink/30"></span>
                <span class="absolute bottom-3 left-3 w-3.5 h-3.5 border-b border-l border-ink/30"></span>
                <span class="absolute bottom-3 right-3 w-3.5 h-3.5 border-b border-r border-ink/30"></span>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase mb-3 flex items-center gap-2"><span class="text-tef-blue">03</span><span class="text-ink/20">·</span><span class="text-ink/50" x-text="t('n2_meta')"></span></p>
                <h3 class="font-sans font-normal text-2xl md:text-3xl leading-tight tracking-tight text-ink mb-4" x-text="t('n2_title')"></h3>
                <p class="text-[17px] text-ink/60 leading-relaxed" x-text="t('n2_body')"></p>
              </div>
            </article>

            <!-- PASO 04 — Autodiagnóstico -->
            <article class="journey-card flex-shrink-0 relative" style="height:clamp(300px,min(42vw,62vh),650px);">
              <div class="absolute left-0 top-0 h-full overflow-hidden" style="aspect-ratio:32/27; box-shadow:8px 0 32px rgba(3,26,52,0.1); transform:rotate(1.4deg);">
                <img src="https://images.unsplash.com/flagged/photo-1569744068983-6dfc2f27deb8?w=1600&q=90&fit=crop&crop=center" alt="" class="w-full h-full object-cover">
              </div>
              <div class="absolute bottom-8 bg-paper border border-ink/15 px-7 py-6 flex flex-col" style="left:calc(clamp(300px,min(42vw,62vh),650px)*1.185 - 210px); width:clamp(288px,31vw,368px); box-shadow:0 16px 56px rgba(3,26,52,0.28),0 2px 8px rgba(3,26,52,0.12); transform:rotate(-0.8deg);">
                <span class="absolute top-3 left-3 w-3.5 h-3.5 border-t border-l border-ink/30"></span>
                <span class="absolute top-3 right-3 w-3.5 h-3.5 border-t border-r border-ink/30"></span>
                <span class="absolute bottom-3 left-3 w-3.5 h-3.5 border-b border-l border-ink/30"></span>
                <span class="absolute bottom-3 right-3 w-3.5 h-3.5 border-b border-r border-ink/30"></span>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase mb-3 flex items-center gap-2"><span class="text-tef-blue">04</span><span class="text-ink/20">·</span><span class="text-ink/50" x-text="t('n3_meta')"></span></p>
                <h3 class="font-sans font-normal text-2xl md:text-3xl leading-tight tracking-tight text-ink mb-4" x-text="t('n3_title')"></h3>
                <p class="text-[17px] text-ink/60 leading-relaxed mb-4" x-text="t('n3_body')"></p>
                <a href="autodiagnostico.html" class="inline-flex items-center gap-2 font-mono text-[10px] tracking-[0.18em] uppercase text-tef-blue border border-tef-blue px-4 py-2.5 rounded-full hover:bg-tef-blue hover:text-white transition-all w-fit">
                  <span x-text="t('n3_cta')"></span>
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                </a>
              </div>
            </article>

            <!-- PASO 05 — Action Learning Week -->
            <article class="journey-card flex-shrink-0 relative" style="height:clamp(300px,min(42vw,62vh),650px);">
              <div class="absolute left-0 top-0 h-full overflow-hidden" style="aspect-ratio:32/27; box-shadow:8px 0 32px rgba(3,26,52,0.1); transform:rotate(-1.1deg);">
                <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1600&q=90&fit=crop&crop=center" alt="" class="w-full h-full object-cover">
              </div>
              <div class="absolute bottom-8 bg-paper border border-ink/15 px-7 py-6 flex flex-col" style="left:calc(clamp(300px,min(42vw,62vh),650px)*1.185 - 210px); width:clamp(288px,31vw,368px); box-shadow:0 16px 56px rgba(3,26,52,0.28),0 2px 8px rgba(3,26,52,0.12); transform:rotate(0.6deg);">
                <span class="absolute top-3 left-3 w-3.5 h-3.5 border-t border-l border-ink/30"></span>
                <span class="absolute top-3 right-3 w-3.5 h-3.5 border-t border-r border-ink/30"></span>
                <span class="absolute bottom-3 left-3 w-3.5 h-3.5 border-b border-l border-ink/30"></span>
                <span class="absolute bottom-3 right-3 w-3.5 h-3.5 border-b border-r border-ink/30"></span>
                <p class="font-mono text-[11px] tracking-[0.2em] uppercase mb-3 flex items-center gap-2"><span class="text-tef-blue">05</span><span class="text-ink/20">·</span><span class="text-ink/50" x-text="t('n4_meta')"></span></p>
                <h3 class="font-sans font-normal text-2xl md:text-3xl leading-tight tracking-tight text-ink mb-4" x-text="t('n4_title')"></h3>
                <p class="text-[17px] text-ink/60 leading-relaxed mb-4" x-text="t('n4_body')"></p>
                <a href="agenda.html" class="inline-flex items-center gap-2 font-mono text-[10px] tracking-[0.18em] uppercase text-tef-blue border border-tef-blue px-4 py-2.5 rounded-full hover:bg-tef-blue hover:text-white transition-all w-fit">
                  <span x-text="t('n4_cta')"></span>
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                </a>
              </div>
            </article>

          </div>
        </div>

        <!-- Timeline de progreso — debajo del carrusel -->
        <div class="px-6 md:px-12 lg:px-16 py-6 max-w-[1920px] mx-auto w-full" id="journey-tabs">
          <!-- Contenedor relativo sin padding — para que top-[16px] centre la línea en los círculos (h-9=36px, centro=18px, línea 4px → top=16px) -->
          <div class="relative">
            <div class="absolute top-[16px] left-[10%] right-[10%] rounded-full bg-ink/10" style="height:4px;" aria-hidden="true"></div>
            <div id="journey-timeline-fill"
                 class="absolute top-[16px] left-[10%] right-[10%] rounded-full bg-tef-blue"
                 style="height:4px; transform-origin:left center; transform:scaleX(0);" aria-hidden="true"></div>
            <div class="grid grid-cols-5">
              <button data-tab="0" class="journey-tab flex flex-col items-center gap-2 bg-transparent border-none p-0 outline-none cursor-pointer">
                <div class="w-9 h-9 rounded-full border-2 border-tef-blue bg-tef-blue relative z-10 transition-all duration-300" data-tab-circle></div>
                <span class="font-mono text-[10px] tracking-[0.15em] text-tef-blue transition-colors duration-300">01</span>
              </button>
              <button data-tab="1" class="journey-tab flex flex-col items-center gap-2 bg-transparent border-none p-0 outline-none cursor-pointer">
                <div class="w-9 h-9 rounded-full border-2 border-ink/10 bg-paper relative z-10 transition-all duration-300" data-tab-circle></div>
                <span class="font-mono text-[10px] tracking-[0.15em] text-ink/40 transition-colors duration-300">02</span>
              </button>
              <button data-tab="2" class="journey-tab flex flex-col items-center gap-2 bg-transparent border-none p-0 outline-none cursor-pointer">
                <div class="w-9 h-9 rounded-full border-2 border-ink/10 bg-paper relative z-10 transition-all duration-300" data-tab-circle></div>
                <span class="font-mono text-[10px] tracking-[0.15em] text-ink/40 transition-colors duration-300">03</span>
