<!DOCTYPE html>
<html lang="es" x-data="{
  lang: localStorage.getItem('lang') || 'es',
  page: 'journey',
  init() {
    this.$watch('lang', v => localStorage.setItem('lang', v));
  },
  t(key) {
    return i18n[key] ? (i18n[key][this.lang] || i18n[key]['es']) : key;
  }
}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey — Accelerate Impact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tef: { blue: '#0066FF', dark: '#031A34', light: '#D1D5E4' },
            ink: { DEFAULT: '#031A34', soft: '#2B3447', mute: '#58617A' },
            paper: { DEFAULT: '#F7F7FF', warm: '#ECEEF7', deep: '#031A34' }
          },
          fontFamily: {
            sans: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            display: ['"Telefonica Sans"', 'Inter', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_DemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Telefonica Sans'; src: url('fonts/Telefonica_Sans_Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    body { font-feature-settings: "cv11", "ss01"; }
    .bg-tef-gradient-dark { background: radial-gradient(ellipse at 70% 0%, #0d3a7a 0%, #031A34 55%, #020d1f 100%); }
    .bg-tef-gradient-light { background: linear-gradient(135deg, #F0F5FF 0%, #F7F7FF 50%, #E4EEFF 100%); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { animation: fadeUp 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
    .reveal-1 { animation-delay: 0.1s; } .reveal-2 { animation-delay: 0.2s; } .reveal-3 { animation-delay: 0.3s; }

    @keyframes dashflow { to { stroke-dashoffset: -170; } }
    .ascent-breathe { animation: dashflow 20s linear infinite; }

    @keyframes orbit { to { transform: rotate(360deg); } }
    .orbit { animation: orbit 24s linear infinite; transform-origin: center; }
    .orbit-rev { animation: orbit 30s linear infinite reverse; transform-origin: center; }

    @media (prefers-reduced-motion: reduce) {
      .ascent-breathe, .orbit, .orbit-rev, .reveal { animation: none; }
    }

    /* Mobile override para track ascendente */
    @media (max-width: 768px) {
      .track-ascend { height: auto !important; }
      .track-ascend > [data-track-node] {
        position: relative !important;
        left: auto !important; right: auto !important;
        top: auto !important; bottom: auto !important;
        width: 100% !important;
        margin-bottom: 1rem;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    const i18n = {
      nav_journey: { es: 'Journey', en: 'Journey' },
      nav_info: { es: 'Contacto', en: 'Contact' },

      hero_eyebrow: { es: 'Your Journey', en: 'Your Journey' },
      hero_title_1: { es: 'Un camino', en: 'An ascending' },
      hero_title_2: { es: 'ascendente.', en: 'path.' },
      hero_subtitle: {
        es: 'Cuatro paradas conectadas. Dos clickables donde tú actúas. Dos que te acompañan.',
        en: 'Four connected stops. Two clickable where you act. Two that accompany you.'
      },

      /* Track nodos */
      n1_meta: { es: 'Virtual · antes de empezar', en: 'Virtual · before kick-off' },
      n1_title: { es: 'Sesión de bienvenida', en: 'Welcome Session' },
      n1_body: { es: 'Conoces el programa, a tu cohorte y el sentido del viaje que empiezas.', en: 'You meet the program, your cohort and the meaning of the journey ahead.' },
      n1_tag: { es: 'Informativo', en: 'Informational' },

      n2_meta: { es: 'Online · antes del ALW', en: 'Online · before ALW' },
      n2_title: { es: 'Autodiagnóstico', en: 'Self-Diagnosis' },
      n2_body: { es: 'Tres cuestionarios, dos informes. El punto de partida más honesto.', en: 'Three assessments, two reports. The most honest starting point.' },
      n2_cta: { es: 'Empezar ahora', en: 'Start now' },
      n2_tag: { es: 'Acción', en: 'Action' },

      n3_meta: { es: 'Presencial · Universitas', en: 'In-person · Universitas' },
      n3_title: { es: 'Action Learning Week', en: 'Action Learning Week' },
      n3_body: { es: 'Tres días residenciales. El corazón del programa y el momento donde todo converge.', en: 'Three residential days. The heart of the program where everything converges.' },
      n3_cta: { es: 'Ver agenda completa', en: 'See full agenda' },
      n3_tag: { es: 'Acción', en: 'Action' },

      n4_meta: { es: 'Online · todo el recorrido', en: 'Online · the whole journey' },
      n4_title: { es: 'Sesiones con Nadia', en: 'Nadia Sessions' },
      n4_body: { es: 'Tu AI Coach personal te acompaña antes, durante y después.', en: 'Your personal AI Coach accompanies you before, during and after.' },
      n4_tag: { es: 'Siempre disponible', en: 'Always on' },

      /* Fases */
      phase_eyebrow: { es: 'Tres fases. Un mismo compromiso.', en: 'Three phases. One commitment.' },
      phase1_label: { es: 'Fase 01', en: 'Phase 01' },
      phase1_title: { es: 'Assess', en: 'Assess' },
      phase1_sub: { es: 'Conócete antes de actuar', en: 'Know yourself before acting' },
      phase1_body: { es: 'Entiendes tu perfil de liderazgo y el punto desde el que partes. Sin diagnóstico no hay viaje.', en: 'You understand your leadership profile and the point from which you start. No diagnosis, no journey.' },

      phase2_label: { es: 'Fase 02', en: 'Phase 02' },
      phase2_title: { es: 'Activate', en: 'Activate' },
      phase2_sub: { es: 'Inmersión presencial', en: 'In-person immersion' },
      phase2_body: { es: 'Tres días de Action Learning Week en Universitas. Aprendizaje, pares y decisiones reales.', en: 'Three Action Learning Week days at Universitas. Learning, peers and real decisions.' },

      phase3_label: { es: 'Fase 03', en: 'Phase 03' },
      phase3_title: { es: 'Drive Action', en: 'Drive Action' },
      phase3_sub: { es: 'Del insight al impacto', en: 'From insight to impact' },
      phase3_body: { es: 'Aplicación sostenida con pares, comunidad y Nadia. Cambio de conducta, no sólo de información.', en: 'Sustained application with peers, community and Nadia. Behaviour change, not just information.' },

      /* CTA final */
      next_title: { es: 'Empieza con tu Autodiagnóstico.', en: 'Start with your Self-Diagnosis.' },
      next_body: { es: 'El primer paso real del Journey. Confidencial, no evaluativo, tuyo.', en: 'The first real step of the Journey. Confidential, non-evaluative, yours.' },
      next_cta: { es: 'Ir al Autodiagnóstico', en: 'Go to Self-Diagnosis' }
    };
  </script>
</head>
<body class="flex flex-col min-h-screen bg-paper text-ink font-sans antialiased">

  <!-- HEADER -->
  <header class="sticky top-0 z-40 bg-paper/90 backdrop-blur-md border-b border-ink/10">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-6">
      <a href="index.html" class="flex items-center gap-3 group">
        <svg class="w-5 h-6 flex-shrink-0" viewBox="0 0 20 24" fill="#0066FF" aria-hidden="true">
          <circle cx="3" cy="3" r="2.5"/><circle cx="10" cy="3" r="2.5"/><circle cx="17" cy="3" r="2.5"/>
          <circle cx="10" cy="12" r="2.5"/><circle cx="10" cy="21" r="2.5"/>
        </svg>
        <div class="leading-none">
          <p class="text-[15px] font-semibold text-ink tracking-tight">Accelerate Impact</p>
          <p class="font-mono text-[9px] tracking-[0.2em] uppercase text-ink-mute mt-0.5">by Telefónica · Universitas</p>
        </div>
      </a>
      <nav class="hidden md:flex items-center gap-8 text-[13px]">
        <a href="journey.html" class="relative py-1 text-ink">
          <span x-text="t('nav_journey')"></span>
          <span class="absolute left-0 right-0 -bottom-0.5 h-px bg-tef-blue"></span>
        </a>
        <a href="nadia.html" class="relative py-1 text-ink-mute hover:text-ink transition-colors">Nadia</a>
        <a href="info.html" class="relative py-1 text-ink-mute hover:text-ink transition-colors">
          <span x-text="t('nav_info')"></span>
        </a>
      </nav>
      <div class="flex items-center gap-0 font-mono text-[11px] tracking-widest">
        <button @click="lang='es'" :class="lang==='es' ? 'text-ink' : 'text-ink-mute hover:text-ink'" class="px-2 py-1 transition-colors">ES</button>
        <span class="text-ink/20">/</span>
        <button @click="lang='en'" :class="lang==='en' ? 'text-ink' : 'text-ink-mute hover:text-ink'" class="px-2 py-1 transition-colors">EN</button>
      </div>
    </div>
  </header>

  <main class="flex-1">

    <!-- HERO -->
    <section class="bg-tef-gradient-dark text-paper relative overflow-hidden">
      <div class="relative max-w-7xl mx-auto px-6 md:px-10 py-20 md:py-28">
        <div class="grid grid-cols-12 gap-6 items-end">
          <div class="col-span-12 md:col-span-3 reveal reveal-1">
            <div class="flex items-center gap-3 mb-2">
              <span class="w-8 h-px bg-paper/40"></span>
              <span class="font-mono text-[10px] tracking-[0.2em] uppercase text-paper/60" x-text="t('hero_eyebrow')"></span>
            </div>
          </div>
          <div class="col-span-12 md:col-span-9">
            <h1 class="font-sans font-light leading-[0.95] tracking-tight text-5xl md:text-7xl lg:text-[5.5rem] mb-6 reveal reveal-2">
              <span x-text="t('hero_title_1')"></span>
              <em class="italic font-normal" x-text="' ' + t('hero_title_2')"></em>
            </h1>
            <p class="text-sm md:text-base text-paper/70 max-w-2xl leading-relaxed reveal reveal-3" x-text="t('hero_subtitle')"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- TRACK VISUAL ASCENDENTE -->
    <section class="relative w-full overflow-hidden bg-tef-gradient-light py-20 md:py-28">
      <!-- Líneas topográficas -->
      <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
        <div class="absolute top-[20%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[40%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[60%] left-0 right-0 h-px bg-tef-dark/5"></div>
        <div class="absolute top-[80%] left-0 right-0 h-px bg-tef-dark/5"></div>
      </div>
      <!-- Orbital ambiente -->
      <svg class="absolute top-12 right-10 w-[420px] h-[420px] opacity-[0.08] pointer-events-none orbit" viewBox="0 0 400 400" fill="none" aria-hidden="true">
        <ellipse cx="200" cy="200" rx="180" ry="85" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 6" transform="rotate(-30 200 200)"/>
        <ellipse cx="200" cy="200" rx="155" ry="65" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 6" transform="rotate(20 200 200)"/>
        <circle cx="380" cy="165" r="4" fill="#0066FF"/>
      </svg>

      <div class="relative max-w-7xl mx-auto px-6">
        <!-- Header -->
        <div class="max-w-2xl mb-16 md:mb-20 reveal">
          <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-tef-blue mb-4">Track · It's on Us</p>
          <h2 class="font-sans font-light text-4xl md:text-5xl lg:text-6xl text-tef-dark leading-tight tracking-tight">
            <span x-text="lang==='es' ? 'Cuatro paradas.' : 'Four stops.'"></span>
            <span class="text-tef-blue block" x-text="lang==='es' ? 'Una dirección.' : 'One direction.'"></span>
          </h2>
        </div>

        <!-- Track ascendente -->
        <div class="relative track-ascend" style="height: 620px">
          <!-- SVG path ascendente -->
          <svg class="absolute inset-0 w-full h-full" viewBox="0 0 1200 620" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="pathB" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0066FF" stop-opacity="0.25"/>
                <stop offset="100%" stop-color="#0066FF" stop-opacity="1"/>
              </linearGradient>
              <linearGradient id="glowB" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0066FF" stop-opacity="0"/>
                <stop offset="100%" stop-color="#0066FF" stop-opacity="0.14"/>
              </linearGradient>
            </defs>
            <!-- glow bajo el path -->
            <path d="M 60 540 Q 280 500, 380 420 T 700 280 T 1140 100 L 1140 620 L 60 620 Z" fill="url(#glowB)"/>
            <!-- path principal -->
            <path d="M 60 540 Q 280 500, 380 420 T 700 280 T 1140 100"
                  stroke="url(#pathB)" stroke-width="3" fill="none"
                  stroke-dasharray="10 7" class="ascent-breathe"/>
            <!-- marcadores -->
            <circle cx="60"   cy="540" r="7" fill="#031A34"/>
            <circle cx="380"  cy="420" r="8" fill="#0066FF"/>
            <circle cx="700"  cy="280" r="8" fill="#0066FF"/>
            <circle cx="1140" cy="100" r="7" fill="#0066FF"/>
          </svg>

          <!-- NODO 1 — Welcome (abajo-izq, pequeño, no-clickable) -->
          <div class="absolute left-[1%] bottom-[4%] w-[270px]" data-track-node>
            <div class="relative bg-white/95 backdrop-blur rounded-xl p-5 border border-tef-dark/15 shadow-[0_6px_20px_rgba(3,26,52,0.06)]">
              <div class="flex items-center gap-2 mb-3">
                <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-tef-dark/5 text-[9px] font-bold uppercase tracking-widest text-tef-dark/70" x-text="t('n1_tag')"></span>
              </div>
              <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-tef-dark/60 mb-2" x-text="t('n1_meta')"></p>
              <h3 class="font-sans text-lg font-semibold text-tef-dark mb-2" x-text="t('n1_title')"></h3>
              <p class="text-[13px] text-tef-dark/70 leading-snug" x-text="t('n1_body')"></p>
            </div>
          </div>

          <!-- NODO 2 — Self-Diagnosis (CLICKABLE, altura media-baja) -->
          <a href="autodiagnostico.html"
             class="absolute left-[22%] top-[40%] w-[300px] group focus:outline-none focus-visible:ring-4 focus-visible:ring-tef-blue/40 rounded-2xl" data-track-node
             :aria-label="lang==='es' ? 'Autodiagnóstico, abrir' : 'Self-diagnosis, open'">
            <svg class="absolute -top-5 -right-5 w-14 h-14 pointer-events-none orbit" viewBox="0 0 56 56" fill="none" aria-hidden="true">
              <ellipse cx="28" cy="28" rx="24" ry="12" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="2 4"/>
              <circle cx="52" cy="28" r="3" fill="#0066FF"/>
            </svg>
            <div class="relative bg-white/95 backdrop-blur-md rounded-2xl p-6 border-2 border-tef-blue shadow-[0_14px_40px_rgba(0,102,255,0.18)] transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-[0_22px_55px_rgba(0,102,255,0.3)]">
              <div class="flex items-center justify-between mb-3">
                <span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-full bg-tef-blue/10 text-[10px] font-bold uppercase tracking-widest text-tef-blue">
                  <span class="w-1.5 h-1.5 rounded-full bg-tef-blue animate-pulse"></span>
                  <span x-text="t('n2_tag')"></span>
                </span>
                <span class="font-sans text-3xl font-bold text-tef-blue/15">02</span>
              </div>
              <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-tef-dark/60 mb-2" x-text="t('n2_meta')"></p>
              <h3 class="font-sans text-xl font-semibold text-tef-dark mb-2" x-text="t('n2_title')"></h3>
              <p class="text-sm text-tef-dark/75 leading-relaxed mb-4" x-text="t('n2_body')"></p>
              <span class="inline-flex items-center gap-2 text-sm font-semibold text-tef-blue">
                <span x-text="t('n2_cta')"></span>
                <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
              </span>
            </div>
          </a>

          <!-- NODO 3 — ALW (CLICKABLE, destacado, altura media-alta) -->
          <a href="agenda.html"
             class="absolute left-[48%] top-[18%] w-[320px] group focus:outline-none focus-visible:ring-4 focus-visible:ring-tef-blue/40 rounded-2xl" data-track-node
             :aria-label="lang==='es' ? 'Action Learning Week, abrir agenda' : 'Action Learning Week, open agenda'">
            <svg class="absolute -top-6 -left-6 w-20 h-20 pointer-events-none orbit-rev" viewBox="0 0 80 80" fill="none" aria-hidden="true">
              <ellipse cx="40" cy="40" rx="36" ry="18" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="2 4" transform="rotate(25 40 40)"/>
              <ellipse cx="40" cy="40" rx="30" ry="14" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="2 4" transform="rotate(-15 40 40)"/>
              <circle cx="8" cy="28" r="3" fill="#0066FF"/>
            </svg>
            <div class="relative bg-gradient-to-br from-tef-dark via-[#072547] to-tef-dark rounded-2xl p-6 border-2 border-tef-blue shadow-[0_16px_50px_rgba(0,102,255,0.3)] transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-[0_24px_65px_rgba(0,102,255,0.42)]">
              <div class="flex items-center justify-between mb-3">
                <span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-full bg-tef-blue/25 text-[10px] font-bold uppercase tracking-widest text-white">
                  <span class="w-1.5 h-1.5 rounded-full bg-[#7FB3FF] animate-pulse"></span>
                  <span x-text="lang==='es' ? 'Corazón del programa' : 'Program core'"></span>
                </span>
                <span class="font-sans text-3xl font-bold text-white/15">03</span>
              </div>
              <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#7FB3FF] mb-2" x-text="t('n3_meta')"></p>
              <h3 class="font-sans text-xl font-semibold text-white mb-2" x-text="t('n3_title')"></h3>
              <p class="text-sm text-white/75 leading-relaxed mb-4" x-text="t('n3_body')"></p>
              <span class="inline-flex items-center gap-2 text-sm font-semibold text-white">
                <span x-text="t('n3_cta')"></span>
                <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
              </span>
            </div>
          </a>

          <!-- NODO 4 — Nadia (no clickable, arriba-derecha) -->
          <div class="absolute right-[1%] top-[1%] w-[260px]" data-track-node>
            <!-- orbital que sale del frame -->
            <svg class="absolute -top-8 -right-8 w-24 h-24 pointer-events-none opacity-60" viewBox="0 0 96 96" fill="none" aria-hidden="true">
              <ellipse cx="48" cy="48" rx="44" ry="22" stroke="#0066FF" stroke-width="1.25" stroke-dasharray="3 5" transform="rotate(-20 48 48)"/>
              <circle cx="90" cy="38" r="3" fill="#0066FF"/>
            </svg>
            <div class="relative bg-white/95 backdrop-blur rounded-xl p-5 border border-tef-blue/25 shadow-sm">
              <div class="flex items-center gap-2 mb-3">
                <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-tef-blue/10 text-[9px] font-bold uppercase tracking-widest text-tef-blue" x-text="t('n4_tag')"></span>
              </div>
              <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-tef-blue/80 mb-2" x-text="t('n4_meta')"></p>
              <h3 class="font-sans text-lg font-semibold text-tef-dark mb-2" x-text="t('n4_title')"></h3>
              <p class="text-[13px] text-tef-dark/70 leading-snug" x-text="t('n4_body')"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FASES -->
    <section class="bg-paper py-20 md:py-28">
      <div class="max-w-7xl mx-auto px-6 md:px-10">
        <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-tef-blue mb-12 text-center" x-text="t('phase_eyebrow')"></p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-12">
          <!-- PHASE 1 -->
          <article class="relative">
            <p class="font-sans font-light leading-none text-tef-blue/10 text-[8rem] md:text-[10rem] mb-2 select-none">01</p>
            <div class="flex items-center gap-3 mb-4">
              <span class="font-mono text-[10px] tracking-[0.25em] uppercase text-tef-blue" x-text="t('phase1_label')"></span>
              <span class="flex-1 h-px bg-ink/10"></span>
            </div>
            <h3 class="font-sans font-light text-4xl md:text-5xl tracking-tight text-ink mb-2" x-text="t('phase1_title')"></h3>
            <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-ink-mute mb-5" x-text="t('phase1_sub')"></p>
            <p class="text-[15px] text-ink-soft leading-relaxed" x-text="t('phase1_body')"></p>
          </article>

          <!-- PHASE 2 -->
          <article class="relative">
            <p class="font-sans font-light leading-none text-tef-blue/10 text-[8rem] md:text-[10rem] mb-2 select-none">02</p>
            <div class="flex items-center gap-3 mb-4">
              <span class="font-mono text-[10px] tracking-[0.25em] uppercase text-tef-blue" x-text="t('phase2_label')"></span>
